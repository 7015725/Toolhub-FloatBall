name: One-shot organize docs and Python boundaries

on:
  push:
    branches:
      - agent/organize-docs-python-boundaries-20260720
    paths:
      - .github/workflows/oneshot-organize-docs-python.yml

permissions:
  contents: write

jobs:
  organize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout maintenance branch
        uses: actions/checkout@v4
        with:
          ref: agent/organize-docs-python-boundaries-20260720
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Apply bounded maintenance changes
        shell: bash
        run: |
          python3 - <<'PY'
          import ast
          import re
          from pathlib import Path

          ROOT = Path.cwd()

          def read(path):
              return (ROOT / path).read_text(encoding="utf-8")

          def write(path, text):
              (ROOT / path).write_text(text, encoding="utf-8")

          def replace_once(text, old, new, label):
              count = text.count(old)
              if count != 1:
                  raise SystemExit("expected one %s occurrence, found %s" % (label, count))
              return text.replace(old, new, 1)

          # 1. 修复回滚工作流中已经不存在的 ToolApp 校验脚本引用。
          rollback = read(".github/workflows/rollback-toolhub.yml")
          rollback = replace_once(
              rollback,
              "          python3 scripts/verify_toolapp_single_root.py\n"
              "          python3 scripts/verify_toolapp_adaptive_size.py\n",
              "          python3 scripts/verify_toolapp_layout.py\n"
              "          python3 scripts/verify_toolapp_main_thread_affinity.py\n",
              "obsolete rollback ToolApp checks",
          )
          write(".github/workflows/rollback-toolhub.yml", rollback)

          # 2. 清除 Python 非法转义，并让 py_compile 把 SyntaxWarning 当作错误。
          pointer_check = read("scripts/verify_pointer_regressions.py")
          pointer_check = replace_once(
              pointer_check,
              "and '.replace(/\\/+$/g, \"\")' in screenshot_dir",
              "and r'.replace(/\\/+$/g, \"\")' in screenshot_dir",
              "pointer regexp literal",
          )
          write("scripts/verify_pointer_regressions.py", pointer_check)

          manifest_check = read("scripts/verify_manifest.py")
          manifest_check = replace_once(
              manifest_check,
              '[sys.executable, "-m", "py_compile"] + py_files',
              '[sys.executable, "-W", "error::SyntaxWarning", "-m", "py_compile"] + py_files',
              "strict Python compilation",
          )
          write("scripts/verify_manifest.py", manifest_check)

          # 3. 新增工作流脚本引用存在性验证。
          workflow_ref_check = r'''#!/usr/bin/env python3
          """Verify that Python files referenced by GitHub Actions workflows exist."""
          import re
          from pathlib import Path

          ROOT = Path(__file__).resolve().parents[1]
          WORKFLOWS = ROOT / ".github" / "workflows"
          PYTHON_CALL = re.compile(
              r"(?:^|[\s;&|({])python(?:3(?:\.\d+)?)?\s+"
              r"(?!-)(?:['\"])?([A-Za-z0-9_./-]+\.py)(?:['\"])?"
          )


          def main():
              missing = []
              references = []
              for workflow in sorted(WORKFLOWS.glob("*.yml")):
                  text = workflow.read_text(encoding="utf-8")
                  for line_number, line in enumerate(text.splitlines(), 1):
                      if line.lstrip().startswith("#"):
                          continue
                      for match in PYTHON_CALL.finditer(line):
                          relative = match.group(1)
                          references.append((workflow, line_number, relative))
                          target = ROOT / relative
                          if not target.is_file():
                              missing.append((workflow, line_number, relative))

              if missing:
                  print("Workflow Python reference verification FAILED:")
                  for workflow, line_number, relative in missing:
                      print(" - %s:%d -> %s" % (
                          workflow.relative_to(ROOT), line_number, relative
                      ))
                  return 1

              print("OK workflow_python_references=%d workflows=%d" % (
                  len(references), len(list(WORKFLOWS.glob("*.yml")))
              ))
              return 0


          if __name__ == "__main__":
              raise SystemExit(main())
          '''
          workflow_ref_check = "\n".join(
              line[10:] if line.startswith("          ") else line
              for line in workflow_ref_check.splitlines()
          ).lstrip()
          write("scripts/verify_workflow_script_references.py", workflow_ref_check)

          verify_yml = read(".github/workflows/verify.yml")
          verify_yml = replace_once(
              verify_yml,
              "      - name: Verify module boundaries\n",
              "      - name: Verify workflow Python references\n"
              "        shell: bash\n"
              "        run: python3 scripts/verify_workflow_script_references.py\n\n"
              "      - name: Verify module boundaries\n",
              "workflow reference verification step",
          )
          write(".github/workflows/verify.yml", verify_yml)

          # 4. 文档一致性校验改为从代码动态读取模块清单，不再硬编码 27。
          doc_check = r'''#!/usr/bin/env python3
          """校验核心文档与当前模块、安全和存储架构保持一致。"""
          import ast
          import re
          from pathlib import Path

          ROOT = Path(__file__).resolve().parents[1]
          README = (ROOT / "README.md").read_text(encoding="utf-8")
          ARCH = (ROOT / "ARCHITECTURE.md").read_text(encoding="utf-8")
          STRUCTURE = (ROOT / "STRUCTURE.md").read_text(encoding="utf-8")
          SQLITE = (ROOT / "SQLITE_STORAGE.md").read_text(encoding="utf-8")
          ENTRY = (ROOT / "ToolHub.js").read_text(encoding="utf-8")
          SIGN_SCRIPT = ROOT / "scripts" / "generate_signed_manifest.py"


          def fail(message):
              raise SystemExit("FAIL documentation-consistency: " + message)


          def require(text, fragment, label):
              if fragment not in text:
                  fail("missing %s: %s" % (label, fragment))


          def forbid(text, fragment, label):
              if fragment in text:
                  fail("stale %s: %s" % (label, fragment))


          def entry_modules():
              match = re.search(r"var\s+modules\s*=\s*\[(.*?)\]\s*;", ENTRY, re.S)
              if not match:
                  fail("ToolHub.js modules list missing")
              pairs = re.findall(r'"([^\"]+\.js)"|\'([^\']+\.js)\'', match.group(1))
              return [left or right for left, right in pairs]


          def signing_modules():
              tree = ast.parse(SIGN_SCRIPT.read_text(encoding="utf-8"), filename=str(SIGN_SCRIPT))
              for node in tree.body:
                  if not isinstance(node, ast.Assign):
                      continue
                  if any(isinstance(target, ast.Name) and target.id == "MODULES" for target in node.targets):
                      return [str(item) for item in ast.literal_eval(node.value)]
              fail("generate_signed_manifest.py MODULES missing")


          modules = entry_modules()
          if modules != signing_modules():
              fail("ToolHub.js and signing MODULES differ")
          module_count = len(modules)
          if module_count <= 0:
              fail("module count is empty")

          for name, text in (("README", README), ("ARCHITECTURE", ARCH), ("STRUCTURE", STRUCTURE)):
              for module in modules:
                  require(text, module, name + " module " + module)

          expected_count = "%d 个子模块" % module_count
          require(ARCH, expected_count, "architecture module count")
          require(STRUCTURE, expected_count, "structure module count")
          for label, text in (("architecture", ARCH), ("structure", STRUCTURE)):
              for match in re.finditer(r"(\d+) 个子模块", text):
                  if int(match.group(1)) != module_count:
                      fail("stale %s module count: %s" % (label, match.group(0)))

          require(README, "默认启动 `intentUri`", "README shortcut behavior")
          require(ARCH, "intentUri", "architecture shortcut behavior")
          require(STRUCTURE, "intentUri", "structure shortcut behavior")
          forbid(README, "执行 ShortX 快捷方式代码", "README legacy shortcut default")
          forbid(STRUCTURE, "通过 shell 广播桥发送 base64 命令，默认 root", "structure root default")

          for text, label in ((ARCH, "architecture"), (STRUCTURE, "structure")):
              require(text, ".module_update_transaction.json", label + " transaction marker")
              require(text, ".module_update_transaction.committed", label + " commit marker")
              require(text, "toolhub.db", label + " structured storage")

          critical_modules = (
              "th_01_base.js",
              "th_02_core.js",
              "th_05_persistence.js",
              "th_16_entry.js",
              "th_19_position_state.js",
          )
          for name in critical_modules:
              require(ARCH, name, "architecture critical module " + name)
              require(STRUCTURE, name, "structure critical module " + name)
          forbid(STRUCTURE, "这两个模块失败会导致入口中断", "structure obsolete critical count")
          require(STRUCTURE, "任一加载失败都会中断启动", "structure critical failure behavior")
          require(STRUCTURE, "healthy / degraded / failed", "structure startup tri-state")

          require(ARCH, "ballRebuildActive", "architecture rebuild state")
          require(STRUCTURE, "ballRebuildActive", "structure rebuild state")
          require(STRUCTURE, "position_state", "structure final load stage")

          forbid(ARCH, "manifest.version = 20260703110021", "architecture frozen manifest version")
          forbid(STRUCTURE, "version: 20260703110021", "structure frozen manifest version")
          manifest_count = "files: %d 个模块" % module_count
          require(STRUCTURE, manifest_count, "structure manifest module count")
          for match in re.finditer(r"files:\s*(\d+) 个模块", STRUCTURE):
              if int(match.group(1)) != module_count:
                  fail("stale structure manifest module count: %s" % match.group(0))

          require(SQLITE, "intentUri", "SQLite shortcut intent field")
          require(SQLITE, "shortcutExecMode", "SQLite shortcut mode field")
          require(SQLITE, "toolhub_button_icons", "SQLite button icon table")
          require(SQLITE, "toolhub_pickword_images", "SQLite pickword image table")
          require(SQLITE, "toolhub_pickword_image_exports", "SQLite image export table")
          forbid(SQLITE, "shortcutCode\n", "SQLite obsolete shortcut field")

          require(README, "无效配置会强制回退到 `2`", "README secure fallback")
          require(ARCH, "无效值会强制回退到完整验签模式 `2`", "architecture secure fallback")
          require(STRUCTURE, "无效值强制回退到 `2`", "structure secure fallback")

          print("Documentation consistency verification passed modules=%d" % module_count)
          '''
          doc_check = "\n".join(
              line[10:] if line.startswith("          ") else line
              for line in doc_check.splitlines()
          ).lstrip()
          write("scripts/verify_documentation_consistency.py", doc_check)

          # 5. 更新 README 的模块、数据库表和文档索引。
          readme = read("README.md")
          readme = replace_once(
              readme,
              "STRUCTURE.md\nARCHITECTURE.md\nSQLITE_STORAGE.md\ndocs/security-config-clean.md",
              "ARCHITECTURE.md\nSTRUCTURE.md\nSQLITE_STORAGE.md\nBUTTON_ICON_STORAGE.md\ndocs/button-types.md\ndocs/security-config-clean.md",
              "README documentation index",
          )
          readme = replace_once(
              readme,
              "    │   ├── th_20_pickword.js\n"
              "    │   └── th_21_result_preview.js\n",
              "    │   ├── th_20_pickword.js\n"
              "    │   ├── th_21_result_preview.js\n"
              "    │   ├── th_22_image_viewer.js\n"
              "    │   └── th_23_screenshot_manager.js\n",
              "README module tree tail",
          )
          readme = replace_once(
              readme,
              "├── toolhub_button_values\n└── toolhub_schema_values",
              "├── toolhub_button_values\n"
              "├── toolhub_button_icons\n"
              "├── toolhub_schema_values\n"
              "├── toolhub_pickword_images\n"
              "└── toolhub_pickword_image_exports",
              "README database table tree",
          )
          readme = replace_once(
              readme,
              "| `th_21_result_preview.js` | 取字和 OCR 顶部两行全自绘结果预览 |\n",
              "| `th_21_result_preview.js` | 取字和 OCR 顶部两行全自绘结果预览 |\n"
              "| `th_22_image_viewer.js` | 拾字截图缩略图、原图查看、缩放平移、保存分享删除与图片记录 |\n"
              "| `th_23_screenshot_manager.js` | 截图管理器的内部截图、已保存副本、查看分享和受控删除 |\n",
              "README module responsibility tail",
          )
          write("README.md", readme)

          # 6. 修正架构文档模块数量，并将 th_22/th_23 纳入正式列表与职责。
          arch = read("ARCHITECTURE.md")
          arch = arch.replace("27 个子模块", "29 个子模块")
          arch = arch.replace("当前为 26 个", "当前为 29 个")
          arch = arch.replace("th_22_image_viewer.js：拾字截图缩略图、同窗原图查看、缩放平移与大图区域解码。\n", "")
          arch = replace_once(
              arch,
              "  th_20_pickword.js\n  th_21_result_preview.js\n",
              "  th_20_pickword.js\n"
              "  th_21_result_preview.js\n"
              "  th_22_image_viewer.js\n"
              "  th_23_screenshot_manager.js\n",
              "architecture module list tail",
          )
          arch = replace_once(
              arch,
              "th_21_result_preview.js\n  状态栏下方的两行全自绘结果预览、自动消失、连续结果替换和拾字入口。\n",
              "th_21_result_preview.js\n"
              "  状态栏下方的两行全自绘结果预览、自动消失、连续结果替换和拾字入口。\n\n"
              "th_22_image_viewer.js\n"
              "  拾字截图缩略图、同窗原图查看、缩放平移、大图区域解码，以及截图保存、分享、删除和图片记录维护。\n\n"
              "th_23_screenshot_manager.js\n"
              "  截图管理器页面，按内部截图和已保存副本分类展示，并提供查看、分享和边界受控删除。\n",
              "architecture module responsibility tail",
          )
          write("ARCHITECTURE.md", arch)

          # 7. 修正结构文档目录、模块数量、职责和 manifest 数量。
          structure = read("STRUCTURE.md")
          structure = structure.replace("27 个子模块", "29 个子模块")
          structure = structure.replace("files: 27 个模块", "files: 29 个模块")
          structure = replace_once(
              structure,
              "│   ├── th_20_pickword.js\n"
              "│   └── th_21_result_preview.js\n"
              "th_22_image_viewer.js：拾字截图缩略图、同窗原图查看、缩放平移与大图区域解码。\n"
              "└── scripts/",
              "│   ├── th_20_pickword.js\n"
              "│   ├── th_21_result_preview.js\n"
              "│   ├── th_22_image_viewer.js\n"
              "│   └── th_23_screenshot_manager.js\n"
              "└── scripts/",
              "structure repository tree tail",
          )
          structure = replace_once(
              structure,
              "| `th_21_result_preview.js` | 状态栏下方的两行全自绘结果预览、自动消失、连续结果替换和拾字入口 |\n",
              "| `th_21_result_preview.js` | 状态栏下方的两行全自绘结果预览、自动消失、连续结果替换和拾字入口 |\n"
              "| `th_22_image_viewer.js` | 拾字截图缩略图、原图查看、缩放平移、保存分享删除与图片记录 |\n"
              "| `th_23_screenshot_manager.js` | 截图管理器的内部截图、已保存副本、查看分享和受控删除 |\n",
              "structure module responsibility tail",
          )
          write("STRUCTURE.md", structure)

          # 8. 把新增存储表纳入 SQLite 正式数据模型，而不是只留在尾部补充说明。
          sqlite = read("SQLITE_STORAGE.md")
          sqlite_insert = '''### `toolhub_button_icons`

          按钮本地图片和快捷方式图标按内容 SHA-256 去重后保存为 SQLite BLOB。按钮主表通过 `icon_key` 引用图标记录；ShortX 内置图标和 App 图标不重复写入 BLOB。详细边界见 `BUTTON_ICON_STORAGE.md`。

          ### `toolhub_pickword_images`

          保存 ToolHub 内部拾字截图的路径、来源、尺寸、文件大小、创建时间、访问时间、公共保存副本和逻辑删除状态。内部截图文件仍位于 `ToolHub/screenshots/`，数据库记录不保存图片二进制。

          ### `toolhub_pickword_image_exports`

          记录保存副本和分享临时副本的精确路径、content URI、创建时间、过期时间和删除状态。自动清理只处理 ToolHub 管理的内部截图和分享临时副本，不删除用户选择的其他文件。

          '''
          sqlite_insert = "\n".join(
              line[10:] if line.startswith("          ") else line
              for line in sqlite_insert.splitlines()
          )
          sqlite = replace_once(
              sqlite,
              "### `toolhub_meta`\n",
              sqlite_insert + "### `toolhub_meta`\n",
              "SQLite extended table section",
          )
          write("SQLITE_STORAGE.md", sqlite)

          # 9. 删除已完成使命的高权限一次性工作流；当前补丁工作流也不进入最终分支。
          for obsolete in (
              ROOT / ".github" / "workflows" / "cleanup-non-main-branches-once.yml",
              ROOT / ".github" / "workflows" / "oneshot-organize-docs-python.yml",
          ):
              if obsolete.exists():
                  obsolete.unlink()
          PY

      - name: Validate bounded changes
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/verify_workflow_script_references.py
          python3 scripts/verify_documentation_consistency.py
          python3 -W error::SyntaxWarning -m py_compile scripts/*.py .github/scripts/*.py
          python3 scripts/verify_manifest.py
          git diff --check

      - name: Commit maintenance changes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "整理文档与 Python 验证边界"
          git push origin HEAD:agent/organize-docs-python-boundaries-20260720
