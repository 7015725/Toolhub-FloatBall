name: apply-position-transition-cleanup

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: apply-position-transition-cleanup
  cancel-in-progress: false

jobs:
  apply:
    if: >
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'fix/remove-position-transition-fallbacks' &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout cleanup branch
        uses: actions/checkout@v4
        with:
          ref: fix/remove-position-transition-fallbacks
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Apply cleanup
        run: python3 scripts/apply_position_transition_cleanup.py

      - name: Refresh dead code audit
        run: python3 scripts/report_dead_module_symbols.py --write DEAD_CODE_AUDIT.md

      - name: Verify cleanup before signing
        shell: bash
        run: |
          python3 .github/scripts/es5_scan.py
          python3 scripts/verify_js_syntax.py
          python3 scripts/verify_module_boundaries.py
          python3 scripts/verify_ball_position_state.py
          python3 -m compileall -q scripts .github/scripts
          git diff --check

      - name: Commit cleanup
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "删除位置过渡备用实现"
          git push origin HEAD:fix/remove-position-transition-fallbacks
