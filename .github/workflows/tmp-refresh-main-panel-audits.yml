name: tmp-refresh-main-panel-audits

on:
  push:
    branches:
      - fix/main-panel-paging-bounce-20260714

permissions:
  contents: write

concurrency:
  group: tmp-refresh-main-panel-audits
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repair branch
        uses: actions/checkout@v4
        with:
          ref: fix/main-panel-paging-bounce-20260714
          fetch-depth: 0

      - name: Refresh deterministic audit reports
        run: |
          python3 scripts/report_dead_module_symbols.py --write DEAD_CODE_AUDIT.md
          python3 scripts/report_th15_extra_symbols.py --write TH15_EXTRA_AUDIT.md

      - name: Verify refreshed reports
        run: |
          python3 scripts/report_dead_module_symbols.py --check DEAD_CODE_AUDIT.md
          python3 scripts/report_protected_wrapper_chains.py --check PROTECTED_WRAPPER_AUDIT.md
          python3 scripts/report_th15_extra_symbols.py --check TH15_EXTRA_AUDIT.md
          python3 scripts/report_th09_animation_symbols.py --check TH09_ANIMATION_AUDIT.md
          python3 scripts/verify_module_boundaries.py
          git diff --check

      - name: Remove temporary workflow
        run: rm -f .github/workflows/tmp-refresh-main-panel-audits.yml

      - name: Commit audit reports
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add DEAD_CODE_AUDIT.md TH15_EXTRA_AUDIT.md .github/workflows/tmp-refresh-main-panel-audits.yml
          git commit -m "更新主面板代码审计报告"
          git push origin HEAD:fix/main-panel-paging-bounce-20260714
