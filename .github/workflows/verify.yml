name: verify

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Verify module boundaries
        shell: bash
        run: |
          set -o pipefail
          python3 scripts/verify_module_boundaries.py 2>&1 | tee module-boundary-report.txt

      - name: Upload module boundary report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: module-boundary-report
          path: module-boundary-report.txt
          if-no-files-found: error
          retention-days: 7

      - name: Verify dead code audit
        shell: bash
        run: |
          set -o pipefail
          python3 scripts/report_dead_module_symbols.py --check DEAD_CODE_AUDIT.md 2>&1 | tee dead-code-audit-log.txt

      - name: Upload dead code audit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dead-code-audit-report
          path: |
            DEAD_CODE_AUDIT.md
            dead-code-audit-log.txt
          if-no-files-found: error
          retention-days: 7

      - name: Verify protected wrapper audit
        shell: bash
        run: |
          set -o pipefail
          python3 scripts/report_protected_wrapper_chains.py --check PROTECTED_WRAPPER_AUDIT.md 2>&1 | tee protected-wrapper-audit-log.txt

      - name: Upload protected wrapper audit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: protected-wrapper-audit-report
          path: |
            PROTECTED_WRAPPER_AUDIT.md
            protected-wrapper-audit-log.txt
          if-no-files-found: error
          retention-days: 7

      - name: Verify th_15 standalone audit
        shell: bash
        run: |
          set -o pipefail
          python3 scripts/report_th15_extra_symbols.py --check TH15_EXTRA_AUDIT.md 2>&1 | tee th15-extra-audit-log.txt

      - name: Upload th_15 standalone audit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: th15-extra-audit-report
          path: |
            TH15_EXTRA_AUDIT.md
            th15-extra-audit-log.txt
          if-no-files-found: error
          retention-days: 7

      - name: Verify th_09 standalone audit
        shell: bash
        run: |
          set -o pipefail
          python3 scripts/report_th09_animation_symbols.py --check TH09_ANIMATION_AUDIT.md 2>&1 | tee th09-animation-audit-log.txt

      - name: Upload th_09 standalone audit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: th09-animation-audit-report
          path: |
            TH09_ANIMATION_AUDIT.md
            th09-animation-audit-log.txt
          if-no-files-found: error
          retention-days: 7

      - name: Run ToolHub verification
        shell: bash
        run: |
          python3 .github/scripts/es5_scan.py
          python3 scripts/verify_js_syntax.py
          python3 scripts/verify_sqlite_storage.py
          python3 scripts/verify_ball_position_state.py
          python3 scripts/verify_toolapp_layout.py
          python3 scripts/verify_button_editor_layout.py
          python3 scripts/verify_schema_validator.py
          python3 scripts/verify_entry_lifecycle.py
          python3 scripts/verify_atomic_update.py
          python3 scripts/verify_pointer_regressions.py
          python3 .github/scripts/verify_manifest_signature.py

      - name: Check git whitespace
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --no-tags origin "${{ github.base_ref }}" --depth=1
            git diff --check "origin/${{ github.base_ref }}...HEAD"
          else
            git show --check --pretty=oneline --summary HEAD
          fi
