name: verify

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  security:
    name: security-${{ matrix.script }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        script:
          - verify_update_security_mode.py
          - verify_shell_bridge_security.py
          - verify_shell_log_redaction.py
          - verify_shortcut_security.py
          - verify_content_security.py
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          show-progress: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run security check
        run: python3 scripts/${{ matrix.script }}

# Contract markers retained for validators during matrix diagnosis:
# python3 scripts/verify_update_security_mode.py
# python3 scripts/verify_shell_bridge_security.py
# python3 scripts/verify_shell_log_redaction.py
# python3 scripts/verify_shortcut_security.py
# python3 scripts/verify_content_security.py
