name: verify

on:
  pull_request:
    branches: [main, beta]
  push:
    branches: [main, beta]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Verify workflow script references
        shell: bash
        run: python3 scripts/verify_workflow_script_references.py

      - name: Verify repository layout
        shell: bash
        run: python3 scripts/verify_repository_layout.py

      - name: Verify code constraint registry
        shell: bash
        run: python3 scripts/verify_constraint_registry.py

      - name: Verify unified code constraints
        shell: bash
        run: |
          set -eo pipefail
          python3 scripts/verify_code_constraints.py --output code-constraint-report.json 2>&1 | tee code-constraint-report.txt
          {
            echo '## ToolHub code constraints'
            grep -E '^(DOMAIN_RESULT|CODE_CONSTRAINTS_END)' code-constraint-report.txt
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload code constraint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: code-constraint-report
          path: |
            code-constraint-report.txt
            code-constraint-report.json
          if-no-files-found: error
          retention-days: 7

      - name: Build Python maintenance inventory
        shell: bash
        run: |
          set -o pipefail
          python3 scripts/report_python_script_inventory.py --output python-script-inventory.md 2>&1 | tee python-script-inventory-log.txt

      - name: Upload Python maintenance inventory
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-maintenance-inventory
          path: |
            python-script-inventory.md
            python-script-inventory-log.txt
          if-no-files-found: error
          retention-days: 7

      - name: Verify module boundaries
        shell: bash
        run: |
          set -o pipefail
          python3 scripts/verify_module_boundaries.py 2>&1 | tee module-boundary-report.txt

      - name: Upload module boundary report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: module-boundary-report
          path: module-boundary-report.txt
          if-no-files-found: error
          retention-days: 7

      - name: Verify dead code audit
        shell: bash
        run: |
          set -o pipefail
          python3 scripts/report_dead_module_symbols.py --check docs/audits/DEAD_CODE_AUDIT.md 2>&1 | tee dead-code-audit-log.txt

      - name: Upload dead code audit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dead-code-audit-report
          path: |
            docs/audits/DEAD_CODE_AUDIT.md
            dead-code-audit-log.txt
          if-no-files-found: error
          retention-days: 7

      - name: Verify protected wrapper audit
        shell: bash
        run: |
          set -o pipefail
          python3 scripts/report_protected_wrapper_chains.py --check docs/audits/PROTECTED_WRAPPER_AUDIT.md 2>&1 | tee protected-wrapper-audit-log.txt

      - name: Upload protected wrapper audit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: protected-wrapper-audit-report
          path: |
            docs/audits/PROTECTED_WRAPPER_AUDIT.md
            protected-wrapper-audit-log.txt
          if-no-files-found: error
          retention-days: 7

      - name: Verify module symbol audit
        shell: bash
        run: |
          set -o pipefail
          python3 scripts/report_module_symbol_audits.py --check docs/audits/MODULE_SYMBOL_AUDIT.md 2>&1 | tee module-symbol-audit-log.txt

      - name: Upload module symbol audit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: module-symbol-audit-report
          path: |
            docs/audits/MODULE_SYMBOL_AUDIT.md
            module-symbol-audit-log.txt
          if-no-files-found: error
          retention-days: 7

      - name: Run ToolHub verification
        shell: bash
        run: |
          set -eo pipefail
          {
            python3 .github/scripts/es5_scan.py
            python3 scripts/verify_js_syntax.py
            python3 scripts/report_entry_symbols.py --check docs/audits/ENTRY_SYMBOL_AUDIT.md
            python3 scripts/verify_entry_redundancy_cleanup.py
            python3 scripts/verify_entry_writable_probe.py
            python3 scripts/verify_sqlite_storage.py
            python3 scripts/verify_sqlite_debounce_race.py
            python3 scripts/verify_ball_position_state.py
            python3 scripts/verify_animation_callback_safety.py
            python3 scripts/verify_ball_rebuild_rollback.py
            python3 scripts/verify_toolapp_layout.py
            python3 scripts/verify_toolapp_main_thread_affinity.py
            python3 scripts/verify_settings_color_scheme.py
            python3 scripts/verify_legacy_theme_cleanup.py
            python3 scripts/verify_settings_color_roles.py
            python3 scripts/verify_coloros_rhino_color_safety.py
            python3 scripts/verify_rhino_color_api_safety.py
            python3 scripts/verify_button_editor_layout.py
            python3 scripts/verify_button_editor_direct_save.py
            python3 scripts/verify_button_shortcut_thread_affinity.py
            python3 scripts/verify_schema_validator.py
            python3 scripts/verify_pickword_translate_settings.py
            python3 scripts/verify_pickword_long_click_api34.py
            python3 scripts/verify_pickword_share_close_cleanup.py
            python3 scripts/verify_pickword_unified_cleanup.py
            python3 scripts/verify_pickword_emoji_grapheme.py
            python3 scripts/verify_entry_lifecycle.py
            python3 scripts/verify_atomic_update.py
            python3 scripts/verify_release_transaction.py
            python3 scripts/verify_startup_status.py
            python3 scripts/verify_main_panel_runtime_status.py
            python3 scripts/verify_main_panel_drag_sort.py
            python3 scripts/verify_main_panel_more_menu.py
            python3 scripts/verify_main_panel_paging.py
            python3 scripts/verify_main_panel_adaptive_layout.py
            python3 scripts/verify_panel_layout_settings_cleanup.py
            python3 scripts/verify_legacy_main_panel_cleanup.py
            python3 scripts/verify_main_panel_grid_sizing.py
            python3 scripts/verify_main_panel_visual_tuning.py
            python3 scripts/verify_main_panel_close_lifecycle.py
            python3 scripts/verify_update_security_mode.py
            python3 scripts/verify_shell_bridge_security.py
            python3 scripts/verify_shell_log_redaction.py
            python3 scripts/verify_shortcut_security.py
            python3 scripts/verify_content_security.py
            python3 scripts/verify_major_event_logging.py
            python3 scripts/verify_manifest.py
            python3 scripts/verify_module_versions.py
            python3 scripts/verify_changed_module_versions.py
            python3 scripts/verify_documentation_consistency.py
            python3 scripts/verify_github_only_source.py
            python3 scripts/verify_pointer_regressions.py
            python3 scripts/verify_result_preview.py
            python3 scripts/verify_pickword_image_viewer.py
            python3 scripts/verify_pickword_image_meta_handoff.py
            python3 scripts/verify_screenshot_manager.py
            python3 .github/scripts/verify_manifest_signature.py
          } 2>&1 | tee toolhub-verification-report.txt

      - name: Upload ToolHub verification report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: toolhub-verification-report
          path: toolhub-verification-report.txt
          if-no-files-found: error
          retention-days: 7

      - name: Check git whitespace
        shell: bash
        run: |
          set -o pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --no-tags origin "${{ github.base_ref }}"
            git diff --check "origin/${{ github.base_ref }}...HEAD" 2>&1 | tee whitespace-report.txt
          else
            git show --check --pretty=oneline --summary HEAD 2>&1 | tee whitespace-report.txt
          fi

      - name: Upload whitespace report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: whitespace-report
          path: whitespace-report.txt
          if-no-files-found: error
          retention-days: 7
