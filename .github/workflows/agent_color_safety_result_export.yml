name: Color safety result export migration

on:
  push:
    branches:
      - feat/color-safety-result-export-20260715
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write

jobs:
  migrate:
    if: github.event_name == 'push' || github.head_ref == 'feat/color-safety-result-export-20260715'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: feat/color-safety-result-export-20260715
          fetch-depth: 0

      - name: Apply result persistence and export
        run: python3 scripts/apply_color_safety_result_export.py

      - name: Refresh dead code audit
        run: python3 scripts/report_dead_module_symbols.py --write DEAD_CODE_AUDIT.md

      - name: Remove temporary executor
        run: |
          rm -f scripts/apply_color_safety_result_export.py
          rm -f .github/workflows/agent_color_safety_result_export.yml

      - name: Commit source changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "持久化并导出颜色安全自检结果"

      - name: Fetch main
        run: git fetch origin main

      - name: Verify changed module versions
        run: python3 scripts/verify_changed_module_versions.py --base-ref origin/main

      - name: Verify color safety and syntax
        run: |
          python3 scripts/verify_coloros_rhino_color_safety.py
          python3 scripts/verify_rhino_color_api_safety.py
          python3 .github/scripts/es5_scan.py
          python3 scripts/verify_js_syntax.py
          python3 scripts/verify_toolapp_layout.py
          python3 scripts/verify_settings_color_scheme.py

      - name: Push source commit
        run: git push origin HEAD:feat/color-safety-result-export-20260715
