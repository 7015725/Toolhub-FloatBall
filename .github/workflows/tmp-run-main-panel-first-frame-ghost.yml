name: tmp-run-main-panel-first-frame-ghost

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: tmp-run-main-panel-first-frame-ghost-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  patch:
    if: github.event.pull_request.head.ref == 'fix/main-panel-first-frame-ghost-20260714'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repair branch
        uses: actions/checkout@v4
        with:
          ref: fix/main-panel-first-frame-ghost-20260714
          fetch-depth: 0
          token: ${{ secrets.TOOLHUB_AUTOMATION_TOKEN || github.token }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Apply focused patch
        run: python3 scripts/tmp_fix_main_panel_first_frame_ghost.py

      - name: Verify changed module version
        run: |
          git fetch --no-tags origin main --depth=1
          python3 scripts/verify_changed_module_versions.py --base-ref origin/main

      - name: Verify Rhino ES5 and syntax
        run: |
          python3 .github/scripts/es5_scan.py
          python3 scripts/verify_js_syntax.py

      - name: Verify module audits
        run: |
          python3 scripts/verify_module_boundaries.py
          python3 scripts/report_dead_module_symbols.py --check DEAD_CODE_AUDIT.md
          python3 scripts/report_protected_wrapper_chains.py --check PROTECTED_WRAPPER_AUDIT.md
          python3 scripts/report_th15_extra_symbols.py --check TH15_EXTRA_AUDIT.md

      - name: Verify main panel paging and visuals
        run: |
          python3 scripts/verify_main_panel_paging.py
          python3 scripts/verify_main_panel_grid_sizing.py
          python3 scripts/verify_main_panel_adaptive_layout.py
          python3 scripts/verify_main_panel_visual_tuning.py
          python3 scripts/verify_main_panel_drag_sort.py
          python3 scripts/verify_main_panel_runtime_status.py
          python3 scripts/verify_main_panel_close_lifecycle.py
          python3 scripts/verify_panel_layout_settings_cleanup.py
          python3 scripts/verify_legacy_main_panel_cleanup.py

      - name: Check whitespace
        run: git diff --check

      - name: Remove temporary files
        run: |
          rm -f .github/workflows/tmp-run-main-panel-first-frame-ghost.yml
          rm -f scripts/tmp_fix_main_panel_first_frame_ghost.py

      - name: Commit repair
        env:
          TOOLHUB_AUTOMATION_TOKEN: ${{ secrets.TOOLHUB_AUTOMATION_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "修复主面板第二页首帧重影"
          if [ -n "$TOOLHUB_AUTOMATION_TOKEN" ]; then
            git remote set-url origin "https://x-access-token:${TOOLHUB_AUTOMATION_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          fi
          git push origin HEAD:fix/main-panel-first-frame-ghost-20260714
