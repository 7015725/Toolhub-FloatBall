name: refresh-dead-audit

on:
  push:
    branches:
      - fix/redact-shell-command-logs

permissions:
  contents: write

concurrency:
  group: refresh-dead-audit
  cancel-in-progress: true

jobs:
  refresh:
    if: ${{ !contains(github.event.head_commit.message, '刷新死代码审查报告') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: fix/redact-shell-command-logs
          fetch-depth: 0

      - name: Refresh report
        run: |
          python3 scripts/report_dead_module_symbols.py --write DEAD_CODE_AUDIT.md
          python3 scripts/report_dead_module_symbols.py --check DEAD_CODE_AUDIT.md
          git diff --check

      - name: Commit report
        run: |
          if git diff --quiet -- DEAD_CODE_AUDIT.md; then
            echo "Dead code audit already current"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add DEAD_CODE_AUDIT.md
          git commit -m "刷新死代码审查报告"
          git push origin HEAD:fix/redact-shell-command-logs
