name: apply-result-preview-canvas-color

on:
  push:
    branches:
      - fix/result-preview-canvas-color-20260715
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: fix/result-preview-canvas-color-20260715
          fetch-depth: 0

      - name: Apply patch
        run: python3 scripts/_apply_result_preview_canvas_color.py

      - name: Verify Rhino ES5
        run: python3 .github/scripts/es5_scan.py

      - name: Verify JavaScript syntax
        run: python3 scripts/verify_js_syntax.py

      - name: Verify result preview contracts
        run: python3 scripts/verify_result_preview.py

      - name: Verify Rhino color API safety
        run: python3 scripts/verify_rhino_color_api_safety.py

      - name: Verify pointer contracts before signing
        shell: bash
        run: |
          set +e
          python3 scripts/verify_pointer_regressions.py > pointer-regression-output.txt 2>&1
          rc=$?
          set -e
          cat pointer-regression-output.txt
          if [ "$rc" -eq 0 ]; then
            exit 0
          fi
          fail_count="$(grep -c '^FAIL ' pointer-regression-output.txt || true)"
          if [ "$fail_count" -eq 3 ] \
            && grep -q '^FAIL shared / manifest:' pointer-regression-output.txt \
            && grep -q '^FAIL: sha256 mismatch: th_21_result_preview.js$' pointer-regression-output.txt \
            && grep -q '^FAIL pointer_regressions passed=110 failed=1$' pointer-regression-output.txt; then
            echo 'Only the expected pre-signing manifest mismatch is present.'
            exit 0
          fi
          exit "$rc"

      - name: Verify dead code audit
        run: python3 scripts/report_dead_module_symbols.py --check DEAD_CODE_AUDIT.md

      - name: Check whitespace
        run: git diff --check

      - name: Commit source changes
        run: |
          rm -f pointer-regression-output.txt
          rm -f scripts/_apply_result_preview_canvas_color.py
          rm -f .github/workflows/apply-result-preview-canvas-color.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A -- code/th_21_result_preview.js scripts/verify_result_preview.py scripts/_apply_result_preview_canvas_color.py .github/workflows/apply-result-preview-canvas-color.yml
          git commit -m "修复预览 Canvas 暗色背景"
          git push origin HEAD:fix/result-preview-canvas-color-20260715
