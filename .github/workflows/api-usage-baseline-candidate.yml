name: api-usage-baseline-candidate

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  api-usage-baseline-candidate:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Verify API scanner
        shell: bash
        run: python3 scripts/verify_api_usage_scanner.py

      - name: Generate compact API usage baseline
        shell: bash
        run: |
          set -eo pipefail
          python3 scripts/generate_api_usage_baseline.py --refresh-legacy \
            2>&1 | tee api-usage-candidate-log.txt

      - name: Commit initial API baseline
        shell: bash
        run: |
          set -eo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add constraints/API_USAGE_BASELINE.json constraints/API_USAGE_LEGACY.json
          if git diff --cached --quiet; then
            echo "API baseline already current"
          else
            git commit -m "生成初始 API 使用基线"
            git push origin "HEAD:${{ github.head_ref }}"
          fi

      - name: Upload API usage candidate
        uses: actions/upload-artifact@v4
        with:
          name: api-usage-baseline-candidate
          path: |
            constraints/API_USAGE_BASELINE.json
            constraints/API_USAGE_LEGACY.json
            api-usage-candidate-log.txt
          if-no-files-found: error
          retention-days: 7
