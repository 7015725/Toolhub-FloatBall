name: apply-pointer-reference-release

on:
  push:
    branches: [fix/pointer-reference-release]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: fix/pointer-reference-release
          fetch-depth: 0

      - name: Apply patch and save diagnostics
        shell: bash
        run: |
          set +e
          python3 scripts/apply_pointer_reference_release.py > scripts/pointer_reference_patch.log 2>&1
          status=$?
          cat scripts/pointer_reference_patch.log
          echo "exit_status=$status" >> scripts/pointer_reference_patch.log
          exit 0

      - name: Check whitespace
        shell: bash
        run: git diff --check || true

      - name: Commit source and diagnostics
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add code/th_17_pointer.js code/th_19_position_state.js scripts/verify_ball_position_state.py scripts/pointer_reference_patch.log
          if git diff --cached --quiet; then
            echo "No changes required"
            exit 0
          fi
          git commit -m "记录参考取字补丁执行结果"
          git push origin HEAD:fix/pointer-reference-release
