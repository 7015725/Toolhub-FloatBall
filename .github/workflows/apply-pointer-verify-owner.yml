name: apply-pointer-verify-owner

on:
  push:
    branches: [fix/pointer-release-final-state]

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: fix/pointer-release-final-state
          fetch-depth: 0

      - name: Apply verifier patch
        run: python3 scripts/apply_pointer_verify_owner.py

      - name: Commit verifier
        shell: bash
        run: |
          if git diff --quiet -- scripts/verify_pointer_issue_85.py; then
            echo "No verifier change required"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/verify_pointer_issue_85.py
          git commit -m "更新指针状态机校验归属"
          git push origin HEAD:fix/pointer-release-final-state
