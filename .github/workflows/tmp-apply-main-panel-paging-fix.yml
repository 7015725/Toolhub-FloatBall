name: tmp-apply-main-panel-paging-fix

on:
  push:
    branches:
      - fix/main-panel-paging-bounce-20260714

permissions:
  contents: write

concurrency:
  group: tmp-apply-main-panel-paging-fix
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repair branch
        uses: actions/checkout@v4
        with:
          ref: fix/main-panel-paging-bounce-20260714
          fetch-depth: 0

      - name: Apply paging repair
        run: python3 .github/tmp/apply_main_panel_paging_fix.py

      - name: Verify Rhino ES5 and JavaScript syntax
        run: |
          python3 .github/scripts/es5_scan.py
          python3 scripts/verify_js_syntax.py

      - name: Verify main panel contracts
        run: |
          python3 scripts/verify_main_panel_paging.py
          python3 scripts/verify_main_panel_grid_sizing.py
          python3 scripts/verify_main_panel_adaptive_layout.py
          python3 scripts/verify_main_panel_visual_tuning.py
          python3 scripts/verify_main_panel_drag_sort.py
          python3 scripts/verify_main_panel_runtime_status.py
          python3 scripts/verify_main_panel_close_lifecycle.py
          python3 scripts/verify_panel_layout_settings_cleanup.py
          python3 scripts/verify_legacy_main_panel_cleanup.py

      - name: Verify patch scope
        shell: bash
        run: |
          test ! -e .github/tmp/apply_main_panel_paging_fix.py
          test ! -e .github/workflows/tmp-apply-main-panel-paging-fix.yml
          git diff --check
          git status --short

      - name: Commit repaired source
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add code/th_15_main_panel.js scripts/verify_main_panel_*.py scripts/verify_panel_layout_settings_cleanup.py scripts/verify_legacy_main_panel_cleanup.py .github/tmp/apply_main_panel_paging_fix.py .github/workflows/tmp-apply-main-panel-paging-fix.yml
          git commit -m "修复主面板分页滑动回弹"
          git push origin HEAD:fix/main-panel-paging-bounce-20260714
