name: apply-result-preview-render-init-cleanup

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]

permissions:
  contents: write
  pull-requests: read

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'fix/result-preview-render-init-cleanup-20260716'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout head branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ secrets.TOOLHUB_AUTOMATION_TOKEN || github.token }}

      - name: Apply cleanup
        run: python3 scripts/apply_result_preview_render_init_cleanup.py

      - name: Remove temporary executor
        run: |
          rm scripts/apply_result_preview_render_init_cleanup.py
          rm .github/workflows/apply-result-preview-render-init-cleanup.yml

      - name: Verify focused invariants
        id: focused
        shell: bash
        run: |
          set +e
          git fetch --no-tags origin main
          : > result-preview-render-init-diagnostic.txt
          status=0
          run_check() {
            name="$1"
            shift
            echo "== $name ==" >> result-preview-render-init-diagnostic.txt
            "$@" >> result-preview-render-init-diagnostic.txt 2>&1
            code=$?
            echo "exit=$code" >> result-preview-render-init-diagnostic.txt
            if [ "$code" -ne 0 ]; then status="$code"; fi
          }
          run_check es5 python3 .github/scripts/es5_scan.py
          run_check js_syntax python3 scripts/verify_js_syntax.py
          run_check result_preview python3 scripts/verify_result_preview.py
          run_check pointer_regressions python3 scripts/verify_pointer_regressions.py
          run_check changed_versions python3 scripts/verify_changed_module_versions.py --base-ref origin/main
          run_check diff_check git diff --check
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload focused diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: result-preview-render-init-diagnostic
          path: result-preview-render-init-diagnostic.txt
          if-no-files-found: error
          retention-days: 2

      - name: Commit verified cleanup
        if: steps.focused.outputs.status == '0'
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add code/th_21_result_preview.js scripts/verify_result_preview.py scripts/apply_result_preview_render_init_cleanup.py .github/workflows/apply-result-preview-render-init-cleanup.yml
          git commit -m "统一结果预览渲染状态初始化"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

      - name: Stop on focused failure
        if: steps.focused.outputs.status != '0'
        run: exit 1
