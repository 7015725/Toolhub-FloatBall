name: mirror-gitea

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mirror:
    name: mirror-gitea
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mirror to Gitea
        shell: bash
        env:
          GITEA_PUSH_URL: ${{ secrets.GITEA_PUSH_URL }}
        run: |
          if [ -z "$GITEA_PUSH_URL" ]; then
            echo "GITEA_PUSH_URL is empty, skip Gitea mirror"
            exit 0
          fi
          git remote add gitea "$GITEA_PUSH_URL"
          if [ "$GITHUB_REF_TYPE" = "branch" ]; then
            git push gitea HEAD:refs/heads/main
          fi
          git push gitea --tags
