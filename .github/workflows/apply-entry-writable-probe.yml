name: apply-entry-writable-probe

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: apply-entry-writable-probe
  cancel-in-progress: true

jobs:
  apply:
    if: ${{ github.head_ref == 'fix/toolhub-entry-writable-probe' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Apply refactor and capture verification
        shell: bash
        run: |
          debug=ENTRY_WRITABLE_PROBE_DEBUG.txt
          : > "$debug"
          status=0
          run_one() {
            printf '\n$ %s\n' "$*" >> "$debug"
            "$@" >> "$debug" 2>&1
            code=$?
            printf 'exit_status=%s\n' "$code" >> "$debug"
            if [ "$code" -ne 0 ]; then
              status="$code"
              return "$code"
            fi
            return 0
          }
          set +e
          run_one python3 scripts/apply_entry_writable_probe_refactor.py || true
          if [ "$status" -eq 0 ]; then run_one python3 scripts/report_entry_symbols.py --write ENTRY_SYMBOL_AUDIT.md || true; fi
          if [ "$status" -eq 0 ]; then run_one python3 scripts/report_entry_symbols.py --check ENTRY_SYMBOL_AUDIT.md || true; fi
          if [ "$status" -eq 0 ]; then run_one python3 scripts/verify_entry_redundancy_cleanup.py || true; fi
          if [ "$status" -eq 0 ]; then run_one python3 scripts/verify_entry_writable_probe.py || true; fi
          if [ "$status" -eq 0 ]; then run_one python3 .github/scripts/es5_scan.py || true; fi
          if [ "$status" -eq 0 ]; then run_one python3 scripts/verify_js_syntax.py || true; fi
          if [ "$status" -eq 0 ]; then run_one python3 scripts/verify_entry_lifecycle.py || true; fi
          if [ "$status" -eq 0 ]; then run_one python3 scripts/verify_update_security_mode.py || true; fi
          if [ "$status" -eq 0 ]; then run_one python3 scripts/verify_github_only_source.py || true; fi
          if [ "$status" -eq 0 ]; then run_one git diff --check || true; fi
          set -e
          printf '\nfinal_status=%s\n' "$status" >> "$debug"
          cat "$debug"

      - name: Commit generated files and debug
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add ToolHub.js ENTRY_SYMBOL_AUDIT.md .github/workflows/verify.yml scripts/verify_entry_writable_probe.py ENTRY_WRITABLE_PROBE_DEBUG.txt
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "生成入口目录可写探针重构"
          git push origin HEAD:${{ github.head_ref }}
