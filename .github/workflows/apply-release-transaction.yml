name: apply-release-transaction

on:
  push:
    branches:
      - fix/release-transactional-update

permissions:
  contents: write

concurrency:
  group: apply-release-transaction
  cancel-in-progress: true

jobs:
  apply:
    if: ${{ !contains(github.event.head_commit.message, '应用整批模块事务更新') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: fix/release-transactional-update
          fetch-depth: 0

      - name: Apply transaction patch
        run: python3 scripts/apply_release_transaction_patch.py

      - name: Verify generated JavaScript
        run: |
          python3 .github/scripts/es5_scan.py
          python3 scripts/verify_js_syntax.py
          git diff --check

      - name: Commit generated entry
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ToolHub.js
          git commit -m "应用整批模块事务更新"
          git push origin HEAD:fix/release-transactional-update
