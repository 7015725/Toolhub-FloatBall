name: apply pointer text fix

on:
  push:
    branches:
      - agent/fix-pointer-accessibility-text-pick
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: agent/fix-pointer-accessibility-text-pick
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Apply fix
        run: python3 .github/scripts/apply_pointer_text_fix.py

      - name: Verify
        shell: bash
        run: |
          python3 .github/scripts/es5_scan.py
          python3 scripts/verify_sqlite_persistence.py
          python3 scripts/verify_button_icon_blob.py
          python3 scripts/verify_ball_position_state.py
          python3 scripts/verify_manifest.py
          python3 scripts/verify_toolapp_single_root.py
          python3 scripts/verify_toolapp_adaptive_size.py
          python3 scripts/verify_button_editor_layout.py
          python3 scripts/verify_schema_validator.py
          python3 scripts/verify_pointer_issue_85.py
          python3 scripts/verify_pointer_text_release.py
          python3 .github/scripts/verify_manifest_signature.py
          git diff --check

      - name: Export verified files
        uses: actions/upload-artifact@v4
        with:
          name: pointer-text-fix-files
          path: |
            ToolHub.js
            ToolHub.js.sha256
            scripts/verify_pointer_text_release.py
            .github/workflows/verify.yml
          if-no-files-found: error
          retention-days: 1
