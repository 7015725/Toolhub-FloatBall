name: apply pointer text fix

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: apply-pointer-text-fix
  cancel-in-progress: true

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    environment: signing
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: agent/fix-pointer-accessibility-text-pick
          fetch-depth: 0
          token: ${{ secrets.TOOLHUB_AUTOMATION_TOKEN || github.token }}
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Apply fix
        run: python3 .github/scripts/apply_pointer_text_fix.py

      - name: Verify
        shell: bash
        run: |
          python3 .github/scripts/es5_scan.py
          python3 scripts/verify_sqlite_persistence.py
          python3 scripts/verify_button_icon_blob.py
          python3 scripts/verify_ball_position_state.py
          python3 scripts/verify_manifest.py
          python3 scripts/verify_toolapp_single_root.py
          python3 scripts/verify_toolapp_adaptive_size.py
          python3 scripts/verify_button_editor_layout.py
          python3 scripts/verify_schema_validator.py
          python3 scripts/verify_pointer_issue_85.py
          python3 scripts/verify_pointer_text_release.py
          python3 .github/scripts/verify_manifest_signature.py
          git diff --check

      - name: Commit fix
        shell: bash
        env:
          TOOLHUB_AUTOMATION_TOKEN: ${{ secrets.TOOLHUB_AUTOMATION_TOKEN }}
        run: |
          if [ -z "$TOOLHUB_AUTOMATION_TOKEN" ]; then
            echo "TOOLHUB_AUTOMATION_TOKEN is empty"
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ToolHub.js ToolHub.js.sha256 scripts/verify_pointer_text_release.py .github/workflows/verify.yml
          git commit -m "彻底修复指针无障碍取字提交链路"
          git remote set-url origin "https://x-access-token:${TOOLHUB_AUTOMATION_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin "HEAD:agent/fix-pointer-accessibility-text-pick"
