name: debug-pointer-regression

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  debug:
    if: ${{ github.head_ref == 'fix/toolhub-entry-writable-probe' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Capture pointer regression
        shell: bash
        run: |
          set +e
          python3 scripts/verify_pointer_regressions.py > POINTER_REGRESSION_DEBUG.txt 2>&1
          status=$?
          set -e
          printf '\nexit_status=%s\n' "$status" >> POINTER_REGRESSION_DEBUG.txt
          cat POINTER_REGRESSION_DEBUG.txt

      - name: Commit debug output
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add POINTER_REGRESSION_DEBUG.txt
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "记录指针回归失败项"
          git push origin HEAD:${{ github.head_ref }}
