name: apply-shell-secure-defaults

on:
  push:
    branches:
      - fix/shell-bridge-secure-defaults

permissions:
  contents: write

concurrency:
  group: apply-shell-secure-defaults
  cancel-in-progress: true

jobs:
  apply:
    if: ${{ !contains(github.event.head_commit.message, '应用 Shell 安全默认值') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: fix/shell-bridge-secure-defaults
          fetch-depth: 0

      - name: Apply patch
        run: python3 scripts/apply_shell_secure_defaults.py

      - name: Verify generated JavaScript
        run: |
          python3 .github/scripts/es5_scan.py
          python3 scripts/verify_js_syntax.py
          git diff --check

      - name: Commit generated modules
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add code/th_11_action.js code/th_14_button_editor.js
          git commit -m "应用 Shell 安全默认值"
          git push origin HEAD:fix/shell-bridge-secure-defaults
