name: apply-pickword-compact-ui-pr

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'fix/pickword-compact-image-ui-20260719'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix/pickword-compact-image-ui-20260719
          fetch-depth: 0
          token: ${{ secrets.TOOLHUB_AUTOMATION_TOKEN || github.token }}
          persist-credentials: false

      - name: Apply verified patch
        shell: bash
        run: |
          set -euo pipefail
          PATCH_GZ_B64="$(cat .github/patches/pickword-ui.part* | tr -d '\r\n')"
          test "${#PATCH_GZ_B64}" -eq 11736
          printf '%s' "$PATCH_GZ_B64" | sha256sum | grep -q '^b91b3345b99db6db9f319f9b3f8e1c60813f2955f37bfd4eb1893a521b4a2508  -$'
          printf '%s' "$PATCH_GZ_B64" | base64 -d | gzip -d > /tmp/pickword-compact-ui.patch
          git apply --check /tmp/pickword-compact-ui.patch
          git apply /tmp/pickword-compact-ui.patch
          rm -rf .github/patches
          rm -f .github/workflows/export-ui-source.yml
          rm -f .github/workflows/apply-pickword-ui-pr.yml
          rm -f .github/apply-pickword-ui.trigger

      - name: Verify focused changes
        shell: bash
        run: |
          set -euo pipefail
          python3 .github/scripts/es5_scan.py
          python3 scripts/verify_js_syntax.py
          python3 scripts/verify_pickword_image_viewer.py
          python3 scripts/verify_pickword_image_meta_handoff.py
          python3 scripts/verify_pickword_emoji_grapheme.py
          python3 scripts/verify_pickword_long_click_api34.py
          python3 scripts/verify_pickword_unified_cleanup.py
          python3 scripts/verify_screenshot_manager.py
          python3 scripts/verify_result_preview.py
          git fetch --no-tags origin main
          python3 scripts/verify_changed_module_versions.py --base-ref origin/main
          git diff --check

      - name: Commit changes
        shell: bash
        env:
          TOOLHUB_AUTOMATION_TOKEN: ${{ secrets.TOOLHUB_AUTOMATION_TOKEN }}
        run: |
          set -euo pipefail
          test -n "$TOOLHUB_AUTOMATION_TOKEN"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "优化拾字截图与原图紧凑布局"
          git remote set-url origin "https://x-access-token:${TOOLHUB_AUTOMATION_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin HEAD:fix/pickword-compact-image-ui-20260719
