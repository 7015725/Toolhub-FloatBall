name: agent-runtime-cleanup-pr

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  cleanup:
    if: github.head_ref == 'agent/cleanup-runtime-redundancy-20260716'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout head branch
        uses: actions/checkout@v4
        with:
          ref: agent/cleanup-runtime-redundancy-20260716
          fetch-depth: 0

      - name: Apply cleanup
        run: python3 scripts/agent_runtime_cleanup.py

      - name: Verify cleanup
        shell: bash
        run: |
          set -euo pipefail
          python3 -m py_compile \
            scripts/verify_button_editor_direct_save.py \
            scripts/verify_shortcut_launcher_path.py \
            scripts/verify_result_preview.py
          python3 .github/scripts/es5_scan.py
          python3 scripts/verify_js_syntax.py
          python3 scripts/verify_button_editor_layout.py
          python3 scripts/verify_button_editor_direct_save.py
          python3 scripts/verify_button_shortcut_thread_affinity.py
          python3 scripts/verify_shortcut_security.py
          python3 scripts/verify_shortcut_launcher_path.py
          python3 scripts/verify_result_preview.py
          python3 scripts/verify_changed_module_versions.py
          git diff --check

      - name: Commit verified cleanup
        shell: bash
        run: |
          set -euo pipefail
          rm -f \
            scripts/agent_runtime_cleanup.py \
            .github/workflows/agent-runtime-cleanup.yml \
            .github/workflows/agent-runtime-cleanup-pr.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "清理运行时冗余代码"
          git push origin HEAD:agent/cleanup-runtime-redundancy-20260716
