name: One-shot trigger docs and Python organization

on:
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write

jobs:
  trigger:
    if: github.event.issue.title == '[ToolHub Maintenance] Organize docs and Python'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout maintenance branch
        uses: actions/checkout@v4
        with:
          ref: agent/organize-docs-python-boundaries-20260720
          fetch-depth: 0

      - name: Apply and validate bounded maintenance
        id: maintenance
        shell: bash
        run: |
          set -o pipefail
          {
            python3 scripts/oneshot_organize_docs_python_wrapper.py
            python3 scripts/verify_workflow_script_references.py
            python3 scripts/verify_documentation_consistency.py
            python3 -W error::SyntaxWarning -m py_compile scripts/*.py .github/scripts/*.py
            python3 scripts/verify_manifest.py
            git diff --check
          } 2>&1 | tee maintenance.log

      - name: Build verified maintenance payload
        if: steps.maintenance.outcome == 'success'
        shell: bash
        run: |
          set -euo pipefail
          payload="$RUNNER_TEMP/toolhub-maintenance-payload"
          mkdir -p "$payload/.github/workflows" "$payload/scripts"
          cp README.md ARCHITECTURE.md STRUCTURE.md SQLITE_STORAGE.md "$payload/"
          cp .github/workflows/rollback-toolhub.yml .github/workflows/verify.yml "$payload/.github/workflows/"
          cp scripts/verify_pointer_regressions.py "$payload/scripts/"
          cp scripts/verify_manifest.py "$payload/scripts/"
          cp scripts/verify_documentation_consistency.py "$payload/scripts/"
          cp scripts/verify_workflow_script_references.py "$payload/scripts/"
          cat > "$payload/DELETE_PATHS.txt" <<'EOF'
          .github/workflows/cleanup-non-main-branches-once.yml
          .github/workflows/oneshot-organize-docs-python.yml
          .github/workflows/oneshot-trigger-organize-docs.yml
          EOF
          cp maintenance.log "$payload/VALIDATION.log"

      - name: Upload verified maintenance payload
        if: steps.maintenance.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: toolhub-docs-python-maintenance-payload
          path: ${{ runner.temp }}/toolhub-maintenance-payload
          if-no-files-found: error
          retention-days: 7

      - name: Report maintenance result
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          OUTCOME: ${{ steps.maintenance.outcome }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          RUN_ID: ${{ github.run_id }}
        run: |
          {
            echo "## 一次性整理执行结果"
            echo
            echo "状态：\`$OUTCOME\`"
            echo
            echo "工作流运行 ID：\`$RUN_ID\`"
            echo
            echo '```text'
            if [ -f maintenance.log ]; then
              tail -n 120 maintenance.log
            else
              echo "maintenance.log unavailable"
            fi
            echo '```'
          } > maintenance-report.md
          gh issue comment "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" --body-file maintenance-report.md
