name: One-shot trigger docs and Python organization

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  trigger:
    if: github.event.issue.title == '[ToolHub Maintenance] Organize docs and Python'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout final maintenance branch
        uses: actions/checkout@v4
        with:
          ref: agent/organize-docs-python-final-20260720
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Load verified bounded patch
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin agent/organize-docs-python-boundaries-20260720
          git show origin/agent/organize-docs-python-boundaries-20260720:scripts/oneshot_organize_docs_python.py > scripts/oneshot_organize_docs_python.py
          git show origin/agent/organize-docs-python-boundaries-20260720:scripts/oneshot_organize_docs_python_wrapper.py > scripts/oneshot_organize_docs_python_wrapper.py

      - name: Apply, validate and publish non-workflow maintenance
        id: maintenance
        shell: bash
        run: |
          set -o pipefail
          {
            python3 scripts/oneshot_organize_docs_python_wrapper.py
            python3 scripts/verify_workflow_script_references.py
            python3 scripts/verify_documentation_consistency.py
            python3 -W error::SyntaxWarning -m py_compile scripts/*.py .github/scripts/*.py
            python3 scripts/verify_manifest.py
            git diff --check
            git restore --source=HEAD -- .github/workflows
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add README.md ARCHITECTURE.md STRUCTURE.md SQLITE_STORAGE.md
            git add scripts/verify_pointer_regressions.py
            git add scripts/verify_manifest.py
            git add scripts/verify_documentation_consistency.py
            git add scripts/verify_workflow_script_references.py
            git diff --cached --check
            git commit -m "整理文档与 Python 验证边界"
            git push origin HEAD:agent/organize-docs-python-final-20260720
          } 2>&1 | tee maintenance.log

      - name: Report maintenance result
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          OUTCOME: ${{ steps.maintenance.outcome }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          RUN_ID: ${{ github.run_id }}
        run: |
          {
            echo "## 正式分支整理执行结果"
            echo
            echo "状态：\`$OUTCOME\`"
            echo
            echo "工作流运行 ID：\`$RUN_ID\`"
            echo
            echo '```text'
            if [ -f maintenance.log ]; then
              tail -n 120 maintenance.log
            else
              echo "maintenance.log unavailable"
            fi
            echo '```'
          } > maintenance-report.md
          gh issue comment "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" --body-file maintenance-report.md
