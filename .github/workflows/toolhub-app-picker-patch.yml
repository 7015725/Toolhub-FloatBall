name: ToolHub 应用按钮选择器补丁

on:
  push:
    branches:
      - agent/app-picker-cleanup-20260715
    paths:
      - .github/workflows/toolhub-app-picker-patch.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 应用补丁
        shell: bash
        run: |
          printf '%s' '' | base64 -d | gzip -d > /tmp/toolhub_patch.py
          python3 /tmp/toolhub_patch.py

      - name: 静态验证
        shell: bash
        run: |
          node --check code/th_14_button_editor.js
          node --check code/th_11_action.js
          git diff --check
          if [ -f scripts/verify_button_editor_direct_save.py ]; then python3 scripts/verify_button_editor_direct_save.py; fi
          if [ -f scripts/verify_coloros_rhino_color_safety.py ]; then python3 scripts/verify_coloros_rhino_color_safety.py; fi
          python3 - <<'PY'
          from pathlib import Path
          editor = Path('code/th_14_button_editor.js').read_text(encoding='utf-8')
          action = Path('code/th_11_action.js').read_text(encoding='utf-8')
          assert 'val: "open_settings"' not in editor
          assert 'if (t === "intent") return "Intent"' not in editor
          assert 'buildButtonAppPickerInline' in editor
          assert 'launcherApps.getActivityList(null, userHandle)' in editor
          assert 'launcherApps.getActivityList(pkg, userHandle)' in action
          assert 'shortcutExecMode = "intent"' in editor
          print('OK app_picker type_cleanup shortcut_intent_preserved')
          PY

      - name: 提交修改
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m '优化应用按钮选择并清理旧类型'
          git push origin HEAD:agent/app-picker-cleanup-20260715
