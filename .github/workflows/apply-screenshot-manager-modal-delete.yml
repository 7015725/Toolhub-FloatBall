name: apply-screenshot-manager-modal-delete

on:
  push:
    branches: [fix/screenshot-manager-modal-delete]
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: apply-screenshot-manager-modal-delete-${{ github.event.pull_request.number || github.ref_name }}
  cancel-in-progress: true

jobs:
  apply:
    if: >
      (github.event_name == 'push' && github.ref_name == 'fix/screenshot-manager-modal-delete') ||
      (
        github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name == github.repository &&
        github.event.pull_request.head.ref == 'fix/screenshot-manager-modal-delete'
      )
    runs-on: ubuntu-latest
    env:
      TARGET_BRANCH: fix/screenshot-manager-modal-delete
    steps:
      - name: Checkout fix branch
        uses: actions/checkout@v4
        with:
          ref: fix/screenshot-manager-modal-delete
          fetch-depth: 0
          token: ${{ secrets.TOOLHUB_AUTOMATION_TOKEN || github.token }}
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Apply source fix
        shell: bash
        run: |
          set -euo pipefail
          base64 -d .github/scripts/apply_screenshot_manager_modal_delete.py.gz.b64 | gzip -dc | python3 -

      - name: Fetch main baseline
        run: git fetch --no-tags origin main

      - name: Verify changed module versions
        run: python3 scripts/verify_changed_module_versions.py --base-ref origin/main

      - name: Verify pending update record
        run: python3 scripts/verify_update_history.py --require-one-pending

      - name: Verify ES5 scan
        run: python3 .github/scripts/es5_scan.py

      - name: Verify JavaScript syntax
        run: python3 scripts/verify_js_syntax.py

      - name: Verify image viewer
        run: python3 scripts/verify_pickword_image_viewer.py

      - name: Verify screenshot manager
        run: python3 scripts/verify_screenshot_manager.py

      - name: Verify module boundaries
        run: python3 scripts/verify_module_boundaries.py

      - name: Verify whitespace
        run: git diff --check

      - name: Remove one-shot files
        run: |
          rm -f .github/scripts/apply_screenshot_manager_modal_delete.py.gz.b64
          rm -f .github/workflows/apply-screenshot-manager-modal-delete.yml

      - name: Commit source fix
        env:
          TOOLHUB_AUTOMATION_TOKEN: ${{ secrets.TOOLHUB_AUTOMATION_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "修复截图管理查看器层级与删除链路"
          if [ -n "$TOOLHUB_AUTOMATION_TOKEN" ]; then
            git remote set-url origin "https://x-access-token:${TOOLHUB_AUTOMATION_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          fi
          git push origin "HEAD:${TARGET_BRANCH}"
