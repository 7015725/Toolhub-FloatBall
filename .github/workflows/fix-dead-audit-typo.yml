name: fix-dead-audit-typo

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: fix/content-strict-write-allowlist
          fetch-depth: 0

      - name: Replace typo and commit
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path('DEAD_CODE_AUDIT.md')
          text = p.read_text(encoding='utf-8')
          old = '文奷'
          new = '文字'
          if old not in text:
              print('audit typo already fixed')
          else:
              p.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
          if git diff --quiet -- DEAD_CODE_AUDIT.md; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add DEAD_CODE_AUDIT.md
          git commit -m "修正死代码审查基线错字"
          git push origin HEAD:fix/content-strict-write-allowlist
