name: refresh-dead-code-audit

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: fix/content-strict-write-allowlist
          fetch-depth: 0

      - name: Generate and commit audit baseline
        run: |
          python3 scripts/report_dead_module_symbols.py --write DEAD_CODE_AUDIT.md
          python3 scripts/report_dead_module_symbols.py --check DEAD_CODE_AUDIT.md
          if git diff --quiet -- DEAD_CODE_AUDIT.md; then
            echo "Dead-code audit baseline already current"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add DEAD_CODE_AUDIT.md
          git commit -m "刷新死代码审查基线"
          git push origin HEAD:fix/content-strict-write-allowlist
