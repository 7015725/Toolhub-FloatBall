name: Run preview boundary fix on new PR

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  fix:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'agent/result-preview-position-percent-v2'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Extract and run boundary fix
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          source = Path('.github/workflows/fix-result-preview-position-boundaries.yml').read_text(encoding='utf-8')
          marker = "          python3 - <<'PY'\n"
          start = source.index(marker) + len(marker)
          end = source.index("\n          PY\n", start)
          lines = source[start:end].splitlines()
          script = "\n".join(line[10:] if line.startswith("          ") else line for line in lines) + "\n"
          Path('/tmp/fix_result_preview_position_boundaries.py').write_text(script, encoding='utf-8')
          PY
          python3 /tmp/fix_result_preview_position_boundaries.py
          python3 scripts/report_th09_animation_symbols.py --write TH09_ANIMATION_AUDIT.md
          python3 scripts/report_entry_symbols.py --write ENTRY_SYMBOL_AUDIT.md

      - name: Validate corrected branch
        shell: bash
        run: |
          node --check code/th_01_base.js
          node --check code/th_05_persistence.js
          node --check code/th_09_animation.js
          node --check code/th_13_panel_ui.js
          node --check code/th_14_panels.js
          node --check code/th_16_entry.js
          node --check code/th_21_result_preview.js
          python3 scripts/verify_module_boundaries.py
          python3 scripts/report_dead_module_symbols.py --check DEAD_CODE_AUDIT.md
          python3 scripts/report_protected_wrapper_chains.py --check PROTECTED_WRAPPER_AUDIT.md
          python3 scripts/report_th15_extra_symbols.py --check TH15_EXTRA_AUDIT.md
          python3 scripts/report_th09_animation_symbols.py --check TH09_ANIMATION_AUDIT.md
          python3 scripts/report_entry_symbols.py --check ENTRY_SYMBOL_AUDIT.md
          python3 scripts/verify_result_preview.py
          python3 scripts/verify_schema_validator.py
          python3 .github/scripts/es5_scan.py
          python3 scripts/verify_js_syntax.py

      - name: Commit correction and remove temporary files
        shell: bash
        run: |
          rm -f .github/workflows/fix-result-preview-position-boundaries.yml
          rm -f .github/workflows/run-boundary-fix-on-new-pr.yml
          rm -f .result-preview-position-boundary-trigger
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add code/th_05_persistence.js code/th_13_panel_ui.js code/th_16_entry.js code/th_21_result_preview.js scripts/verify_result_preview.py scripts/verify_schema_validator.py TH09_ANIMATION_AUDIT.md ENTRY_SYMBOL_AUDIT.md .github/workflows/fix-result-preview-position-boundaries.yml .github/workflows/run-boundary-fix-on-new-pr.yml .result-preview-position-boundary-trigger
          git commit -m "收紧结果预览位置边界"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
