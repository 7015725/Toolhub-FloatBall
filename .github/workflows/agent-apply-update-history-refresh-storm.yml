name: agent-apply-update-history-refresh-storm

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]

permissions:
  contents: write

concurrency:
  group: agent-apply-update-history-refresh-storm
  cancel-in-progress: false

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'fix/update-history-refresh-storm'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix/update-history-refresh-storm
          fetch-depth: 0

      - name: Apply fix
        run: python3 .agent/apply_update_history_refresh_storm.py

      - name: Restore workflow files for connector cleanup
        run: git checkout -- .github/workflows

      - name: Verify JavaScript and versions
        run: |
          python3 .github/scripts/es5_scan.py
          python3 scripts/verify_js_syntax.py
          python3 scripts/verify_changed_module_versions.py --base-ref origin/main

      - name: Verify update page and architecture
        run: |
          python3 scripts/verify_update_version_page.py
          python3 scripts/verify_module_boundaries.py
          python3 scripts/verify_toolapp_layout.py
          python3 scripts/verify_toolapp_main_thread_affinity.py
          python3 scripts/report_dead_module_symbols.py --check DEAD_CODE_AUDIT.md

      - name: Verify diff
        run: git diff --check

      - name: Commit fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add code/th_14_panels.js scripts/verify_update_version_page.py updates/records/fix-update-history-refresh-storm.json
          if git diff --cached --quiet; then
            echo "No fix changes"
            exit 1
          fi
          git commit -m "修复更新页历史加载刷新风暴"
          git push origin HEAD:fix/update-history-refresh-storm
