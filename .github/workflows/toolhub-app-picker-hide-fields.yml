name: ToolHub App 内部字段清理

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'fix/app-picker-hide-internal-fields-20260715'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/app-picker-hide-internal-fields-20260715
          fetch-depth: 0

      - name: 修改 App 选择器主模块
        shell: bash
        run: |
          printf '%s' '' | base64 -d | gzip -d > /tmp/toolhub_app_picker_patch.py
          python3 /tmp/toolhub_app_picker_patch.py
          rm -f APP_PICKER_PATCH_REQUEST.md

      - name: 验证主模块
        shell: bash
        run: |
          node --check code/th_14_button_editor.js
          python3 .github/scripts/es5_scan.py
          python3 scripts/verify_js_syntax.py
          git diff --check

      - name: 提交修改
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "隐藏应用按钮内部配置字段"
          git push origin HEAD:fix/app-picker-hide-internal-fields-20260715
