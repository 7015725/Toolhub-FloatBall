name: Cleanup maintenance branches once

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/cleanup-maintenance-branches-once.yml

permissions:
  contents: write
  issues: write

jobs:
  cleanup:
    if: github.repository == '7015725/Toolhub-FloatBall'
    runs-on: ubuntu-latest
    steps:
      - name: Delete every branch except main
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
          GH_API_URL: ${{ github.api_url }}
        run: |
          python3 - <<'PY'
          import json
          import os
          from urllib.error import HTTPError
          from urllib.parse import quote
          from urllib.request import Request, urlopen

          token = os.environ["GH_TOKEN"]
          repo = os.environ["GH_REPOSITORY"]
          api_root = os.environ["GH_API_URL"].rstrip("/")
          keep = "main"

          def request(method, path, payload=None):
              data = None if payload is None else json.dumps(payload).encode("utf-8")
              req = Request(
                  api_root + path,
                  data=data,
                  method=method,
                  headers={
                      "Accept": "application/vnd.github+json",
                      "Authorization": "Bearer " + token,
                      "X-GitHub-Api-Version": "2022-11-28",
                      "Content-Type": "application/json",
                  },
              )
              try:
                  with urlopen(req, timeout=60) as response:
                      raw = response.read()
                      return None if not raw else json.loads(raw.decode("utf-8"))
              except HTTPError as exc:
                  detail = exc.read().decode("utf-8", "replace")
                  raise RuntimeError("HTTP %s %s: %s" % (exc.code, path, detail))

          def list_branches():
              result = []
              page = 1
              while True:
                  items = request("GET", "/repos/%s/branches?per_page=100&page=%d" % (repo, page))
                  if not items:
                      break
                  result.extend(str(item["name"]) for item in items)
                  if len(items) < 100:
                      break
                  page += 1
              return sorted(set(result))

          info = request("GET", "/repos/%s" % repo)
          if str(info.get("default_branch", "")) != keep:
              raise SystemExit("default branch is not main")

          before = list_branches()
          deleted = []
          failures = []
          for name in before:
              if name == keep:
                  continue
              try:
                  ref = quote("heads/" + name, safe="/")
                  request("DELETE", "/repos/%s/git/refs/%s" % (repo, ref))
                  deleted.append(name)
              except Exception as exc:
                  failures.append({"branch": name, "error": str(exc)})

          remaining = list_branches()
          result = {
              "ok": remaining == [keep] and not failures,
              "before": before,
              "deleted": deleted,
              "remaining": remaining,
              "failures": failures,
          }
          request(
              "POST",
              "/repos/%s/issues/388/comments" % repo,
              {"body": "## 维护分支清理结果\n\n```json\n" + json.dumps(result, ensure_ascii=False, indent=2) + "\n```"},
          )
          if not result["ok"]:
              raise SystemExit(json.dumps(result, ensure_ascii=False))
          PY
