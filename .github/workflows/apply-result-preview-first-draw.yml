name: apply-result-preview-first-draw

on:
  push:
    branches:
      - fix/result-preview-first-draw-20260715

permissions:
  contents: write

concurrency:
  group: apply-result-preview-first-draw
  cancel-in-progress: true

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/result-preview-first-draw-20260715
          fetch-depth: 0

      - name: Apply Canvas preview lifecycle fix
        shell: bash
        env:
          PREVIEW_GZ_B64: ''
          VERIFY_GZ_B64: ''
        run: |
          printf '%s' "$PREVIEW_GZ_B64" | base64 -d | gzip -d > code/th_21_result_preview.js
          printf '%s' "$VERIFY_GZ_B64" | base64 -d | gzip -d > scripts/verify_result_preview.py
          chmod +x scripts/verify_result_preview.py

      - name: Validate
        shell: bash
        run: |
          python3 .github/scripts/es5_scan.py
          python3 scripts/verify_js_syntax.py
          python3 scripts/verify_result_preview.py
          python3 scripts/verify_pointer_regressions.py
          git diff --check

      - name: Commit changes
        shell: bash
        run: |
          if git diff --quiet -- code/th_21_result_preview.js scripts/verify_result_preview.py; then
            echo 'Target files are already current'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add code/th_21_result_preview.js scripts/verify_result_preview.py
          git commit -m '修复顶部预览首帧与计时竞态'
          git push origin HEAD:fix/result-preview-first-draw-20260715
