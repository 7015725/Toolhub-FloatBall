name: apply-shortcut-verifier-consolidation

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]

permissions:
  contents: write
  pull-requests: read

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'agent/consolidate-shortcut-verifiers-20260716'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout head branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ secrets.TOOLHUB_AUTOMATION_TOKEN || github.token }}

      - name: Consolidate verifiers
        run: python3 scripts/apply_shortcut_verifier_consolidation.py

      - name: Remove temporary executor
        run: |
          rm scripts/apply_shortcut_verifier_consolidation.py
          rm .github/workflows/apply-shortcut-verifier-consolidation.yml

      - name: Verify consolidated coverage
        run: |
          git fetch --no-tags origin main
          python3 -m py_compile scripts/verify_shortcut_security.py
          python3 scripts/verify_shortcut_security.py
          python3 scripts/verify_button_editor_direct_save.py
          python3 scripts/verify_button_shortcut_thread_affinity.py
          test ! -e scripts/verify_shortcut_launcher_path.py
          ! grep -q 'verify_shortcut_launcher_path.py' .github/workflows/verify.yml
          python3 .github/scripts/es5_scan.py
          python3 scripts/verify_js_syntax.py
          python3 scripts/verify_changed_module_versions.py --base-ref origin/main
          git diff --check

      - name: Commit verified consolidation
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "整合快捷方式安全与启动验证"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
