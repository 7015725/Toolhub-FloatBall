name: apply-coloros-rhino-color-safety

on:
  push:
    branches:
      - fix/coloros-rhino-color-safety-20260714

permissions:
  contents: write

concurrency:
  group: apply-coloros-rhino-color-safety
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix/coloros-rhino-color-safety-20260714
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Apply source patch
        run: python3 scripts/apply_coloros_rhino_color_safety_patch.py

      - name: Verify focused safety contract
        run: python3 scripts/verify_coloros_rhino_color_safety.py

      - name: Verify JavaScript
        run: |
          python3 .github/scripts/es5_scan.py
          python3 scripts/verify_js_syntax.py

      - name: Verify affected UI contracts
        run: |
          python3 scripts/verify_settings_color_scheme.py
          python3 scripts/verify_settings_color_roles.py
          python3 scripts/verify_main_panel_adaptive_layout.py
          python3 scripts/verify_main_panel_grid_sizing.py
          python3 scripts/verify_main_panel_visual_tuning.py
          python3 scripts/verify_main_panel_close_lifecycle.py
          python3 scripts/verify_pointer_regressions.py
          python3 scripts/verify_result_preview.py

      - name: Check whitespace
        run: git diff --check

      - name: Remove temporary executor
        run: |
          rm -f scripts/apply_coloros_rhino_color_safety_patch.py
          rm -f .github/workflows/apply-coloros-rhino-color-safety.yml

      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add code/th_04_theme.js code/th_15_main_panel.js \
            scripts/verify_coloros_rhino_color_safety.py \
            .github/workflows/verify.yml .github/workflows/sign-toolhub.yml \
            scripts/apply_coloros_rhino_color_safety_patch.py \
            .github/workflows/apply-coloros-rhino-color-safety.yml
          git commit -m "修复 ColorOS 水波纹导致的系统软重启"
          git push origin HEAD:fix/coloros-rhino-color-safety-20260714
