name: Apply ColorOS press safety corrective PR

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]

permissions:
  contents: write
  pull-requests: read

jobs:
  apply:
    if: >
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'fix/coloros-press-feedback-safety-corrective-20260715' &&
      github.event.pull_request.draft == true
    runs-on: ubuntu-latest
    environment: signing
    steps:
      - name: Checkout corrective branch
        uses: actions/checkout@v4
        with:
          ref: fix/coloros-press-feedback-safety-corrective-20260715
          fetch-depth: 0
          token: ${{ secrets.TOOLHUB_AUTOMATION_TOKEN || github.token }}
          persist-credentials: false

      - name: Apply targeted migration
        run: python3 scripts/apply_coloros_press_feedback_safety.py

      - name: Commit source changes and remove temporary executors
        shell: bash
        env:
          TOOLHUB_AUTOMATION_TOKEN: ${{ secrets.TOOLHUB_AUTOMATION_TOKEN }}
        run: |
          if [ -z "$TOOLHUB_AUTOMATION_TOKEN" ]; then
            echo "TOOLHUB_AUTOMATION_TOKEN is empty"
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/agent_apply_coloros_press_safety.yml
          git rm .github/workflows/agent_apply_coloros_press_safety_pr.yml
          git rm scripts/apply_coloros_press_feedback_safety.py
          git add code/th_04_theme.js code/th_13_panel_ui.js scripts/verify_coloros_rhino_color_safety.py scripts/verify_rhino_color_api_safety.py
          git commit -m "消除设置页间接水波纹风险"
          git remote set-url origin "https://x-access-token:${TOOLHUB_AUTOMATION_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin "HEAD:fix/coloros-press-feedback-safety-corrective-20260715"

      - name: Verify committed corrective changes
        shell: bash
        run: |
          git fetch --no-tags origin main
          python3 scripts/verify_changed_module_versions.py --base-ref origin/main
          python3 scripts/verify_coloros_rhino_color_safety.py
          python3 scripts/verify_rhino_color_api_safety.py
          python3 scripts/verify_settings_color_scheme.py
          python3 scripts/verify_settings_color_roles.py
          python3 scripts/verify_toolapp_layout.py
          python3 .github/scripts/es5_scan.py
          python3 scripts/verify_js_syntax.py
          git diff --check
