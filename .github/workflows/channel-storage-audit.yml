name: channel-storage-audit

on:
  push:
    branches: [fix/channel-private-storage-isolation]
  pull_request:
    branches: [main, beta]

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Report channel storage paths
        shell: bash
        run: python3 scripts/report_channel_storage_paths.py > channel-storage-audit.txt

      - name: Dry-run private storage patch
        id: patch
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          {
            python3 scripts/apply_channel_private_storage_isolation_once.py
            python3 .github/scripts/es5_scan.py
            python3 scripts/verify_js_syntax.py
            python3 scripts/verify_channel_private_storage_isolation.py
            python3 scripts/verify_coloros_rhino_color_safety.py
            python3 scripts/verify_pickword_emoji_grapheme.py
            python3 scripts/verify_pickword_long_click_api34.py
            python3 scripts/verify_pickword_image_meta_handoff.py
            python3 scripts/verify_pickword_unified_cleanup.py
            python3 scripts/verify_code_constraints.py --output /tmp/channel-private-storage-constraints.json
            git diff --check
            git diff --stat
          } 2>&1 | tee channel-private-storage-patch.txt

      - name: Upload channel storage diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: channel-storage-audit
          path: |
            channel-storage-audit.txt
            channel-private-storage-patch.txt
          if-no-files-found: error
          retention-days: 3
