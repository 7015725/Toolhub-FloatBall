name: channel-storage-audit

on:
  push:
    branches: [fix/channel-private-storage-isolation]
  pull_request:
    branches: [main, beta]

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Report channel storage paths
        shell: bash
        run: python3 scripts/report_channel_storage_paths.py
