name: generate-settings-type-wrapper-analysis

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: read

jobs:
  generate:
    if: github.event.pull_request.head.ref == 'audit/settings-type-wrappers'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ secrets.TOOLHUB_AUTOMATION_TOKEN || github.token }}
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate and verify analysis
        shell: bash
        run: |
          python3 scripts/verify_settings_type_wrappers.py --write SETTINGS_TYPE_WRAPPER_ANALYSIS.md
          python3 scripts/verify_settings_type_wrappers.py --check SETTINGS_TYPE_WRAPPER_ANALYSIS.md
          python3 -m py_compile scripts/verify_settings_type_wrappers.py
          git diff --check

      - name: Commit analysis
        shell: bash
        env:
          TOOLHUB_AUTOMATION_TOKEN: ${{ secrets.TOOLHUB_AUTOMATION_TOKEN }}
          TARGET_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          if [ -z "$TOOLHUB_AUTOMATION_TOKEN" ]; then
            echo "TOOLHUB_AUTOMATION_TOKEN is empty"
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add SETTINGS_TYPE_WRAPPER_ANALYSIS.md
          git rm .github/workflows/generate-settings-type-wrapper-analysis.yml
          git add .github/workflows/verify.yml scripts/verify_settings_type_wrappers.py
          if git diff --cached --quiet; then
            echo "No analysis changes"
            exit 0
          fi
          git commit -m "生成设置类型包装分析报告"
          git remote set-url origin "https://x-access-token:${TOOLHUB_AUTOMATION_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin "HEAD:${TARGET_BRANCH}"
