name: apply-shell-log-redaction

on:
  push:
    branches:
      - fix/redact-shell-command-logs

permissions:
  contents: write

concurrency:
  group: apply-shell-log-redaction
  cancel-in-progress: true

jobs:
  apply:
    if: ${{ !contains(github.event.head_commit.message, '应用 Shell 日志脱敏') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: fix/redact-shell-command-logs
          fetch-depth: 0

      - name: Apply and verify
        run: |
          python3 scripts/apply_shell_log_redaction.py
          python3 .github/scripts/es5_scan.py
          python3 scripts/verify_js_syntax.py
          python3 scripts/verify_shell_bridge_security.py
          python3 scripts/verify_shell_log_redaction.py
          git diff --check

      - name: Commit generated modules
        run: |
          if git diff --quiet -- code/th_10_shell.js code/th_11_action.js; then
            echo "Shell log redaction already current"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add code/th_10_shell.js code/th_11_action.js
          git commit -m "应用 Shell 日志脱敏"
          git push origin HEAD:fix/redact-shell-command-logs
