name: apply-ball-position-module

on:
  push:
    branches: [fix/ball-position-state-machine]

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: fix/ball-position-state-machine
          fetch-depth: 0

      - name: Apply module list patch
        run: python3 scripts/apply_ball_position_module.py

      - name: Commit patch
        shell: bash
        run: |
          if git diff --quiet -- ToolHub.js; then
            echo "No ToolHub.js change required"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ToolHub.js
          git commit -m "加载悬浮球定位状态模块"
          git push origin HEAD:fix/ball-position-state-machine
