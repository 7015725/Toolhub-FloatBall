name: apply-startup-error-priority

on:
  push:
    branches:
      - fix/degraded-startup-status

permissions:
  contents: write

concurrency:
  group: apply-startup-error-priority
  cancel-in-progress: true

jobs:
  apply:
    if: ${{ !contains(github.event.head_commit.message, '修正启动错误优先级') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: fix/degraded-startup-status
          fetch-depth: 0

      - name: Apply patch
        run: python3 scripts/fix_startup_error_priority.py

      - name: Verify generated JavaScript
        run: |
          python3 .github/scripts/es5_scan.py
          python3 scripts/verify_js_syntax.py
          git diff --check

      - name: Commit generated entry
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ToolHub.js
          git commit -m "修正启动错误优先级"
          git push origin HEAD:fix/degraded-startup-status
