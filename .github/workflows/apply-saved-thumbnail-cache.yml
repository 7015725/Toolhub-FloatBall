name: apply-saved-thumbnail-cache

on:
  push:
    branches: [fix/saved-thumbnail-cache]

permissions:
  contents: write

concurrency:
  group: apply-saved-thumbnail-cache
  cancel-in-progress: true

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fix branch
        uses: actions/checkout@v4
        with:
          ref: fix/saved-thumbnail-cache
          fetch-depth: 0
          token: ${{ secrets.TOOLHUB_AUTOMATION_TOKEN || github.token }}
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Apply saved thumbnail fix
        shell: bash
        run: |
          set -euo pipefail
          base64 -d .github/scripts/apply_saved_thumbnail_cache.py.gz.b64 | gzip -dc | python3 -

      - name: Fetch main baseline
        run: git fetch --no-tags origin main

      - name: Verify changed module versions
        run: python3 scripts/verify_changed_module_versions.py --base-ref origin/main

      - name: Verify pending update record
        run: python3 scripts/verify_update_history.py --require-one-pending

      - name: Verify ES5 and JavaScript syntax
        run: |
          python3 .github/scripts/es5_scan.py
          python3 scripts/verify_js_syntax.py

      - name: Verify image viewer and screenshot manager
        run: |
          python3 scripts/verify_pickword_image_viewer.py
          python3 scripts/verify_screenshot_manager.py
          python3 scripts/verify_module_boundaries.py
          git diff --check

      - name: Remove one-shot files
        run: |
          rm -f .github/scripts/apply_saved_thumbnail_cache.py.gz.b64
          rm -f .github/workflows/apply-saved-thumbnail-cache.yml

      - name: Commit source fix
        env:
          TOOLHUB_AUTOMATION_TOKEN: ${{ secrets.TOOLHUB_AUTOMATION_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "修复截图管理器已保存缩略图"
          if [ -n "$TOOLHUB_AUTOMATION_TOKEN" ]; then
            git remote set-url origin "https://x-access-token:${TOOLHUB_AUTOMATION_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          fi
          git push origin "HEAD:fix/saved-thumbnail-cache"
