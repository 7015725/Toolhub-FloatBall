name: agent-fix-animation-callback-crash

on:
  push:
    branches:
      - fix/animation-callback-crash-20260716

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix/animation-callback-crash-20260716
          fetch-depth: 0

      - name: Apply targeted source fixes
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          ROOT = Path('.')

          def read(path):
              return (ROOT / path).read_text(encoding='utf-8')

          def write(path, text):
              (ROOT / path).write_text(text, encoding='utf-8', newline='\n')

          def replace_once(path, old, new):
              text = read(path)
              count = text.count(old)
              if count != 1:
                  raise SystemExit('replace_once %s expected=1 actual=%d' % (path, count))
              write(path, text.replace(old, new, 1))

          def regex_once(path, pattern, replacement):
              text = read(path)
              updated, count = re.subn(pattern, replacement, text, count=1, flags=re.S)
              if count != 1:
                  raise SystemExit('regex_once %s expected=1 actual=%d pattern=%s' % (path, count, pattern))
              write(path, updated)

          def bump(path, old, new):
              replace_once(path, '// @version ' + old, '// @version ' + new)

          bump('code/th_19_position_state.js', '1.0.11', '1.0.12')
          new_animation = r'''  proto.animateBallLayout = function(toX, toY, toW, durMs, endCb) {
            var st = this.state;
            var self = this;
            var token = 0;
            var cancelled = false;
            var callbackCompleted = false;
            var updateMethodWarningLogged = false;

            function checkpointAnimation(phase, fields, sync) {
              try {
                if (self.L && typeof self.L.checkpoint === "function") {
                  self.L.checkpoint(phase, fields || {}, sync === true);
                }
              } catch (eCheckpoint) {
                logPosition(self, "w", "ball animation checkpoint fail phase=" + String(phase || "") + " err=" + String(eCheckpoint));
              }
            }

            function invokeEndCallback(reason) {
              if (callbackCompleted) return false;
              callbackCompleted = true;
              if (endCb === null || typeof endCb === "undefined") return true;
              if (typeof endCb !== "function") {
                logPosition(self, "e", "ball animation callback invalid reason=" + String(reason || "") + " type=" + String(typeof endCb));
                checkpointAnimation("BALL_ANIM_CALLBACK_FAIL", {
                  reason: String(reason || ""),
                  token: token,
                  error: "invalid_callback_type:" + String(typeof endCb)
                }, true);
                return false;
              }
              checkpointAnimation("BALL_ANIM_CALLBACK_BEGIN", {
                reason: String(reason || ""),
                token: token
              }, false);
              try {
                endCb();
                checkpointAnimation("BALL_ANIM_CALLBACK_DONE", {
                  reason: String(reason || ""),
                  token: token
                }, false);
                return true;
              } catch (eCb) {
                logPosition(self, "e", "ball animation callback fail reason=" + String(reason || "") + " err=" + String(eCb));
                checkpointAnimation("BALL_ANIM_CALLBACK_FAIL", {
                  reason: String(reason || ""),
                  token: token,
                  error: String(eCb)
                }, true);
              }
              return false;
            }

            function canUpdateLayout(stateObj, reason) {
              var ok = !!(
                stateObj &&
                stateObj.wm &&
                typeof stateObj.wm.updateViewLayout === "function" &&
                stateObj.ballRoot &&
                stateObj.ballLp
              );
              if (!ok && !updateMethodWarningLogged) {
                updateMethodWarningLogged = true;
                logPosition(self, "e", "ball animation updateViewLayout unavailable reason=" + String(reason || "") +
                  " wm=" + String(!!(stateObj && stateObj.wm)) +
                  " method=" + String(stateObj && stateObj.wm ? typeof stateObj.wm.updateViewLayout : "missing") +
                  " root=" + String(!!(stateObj && stateObj.ballRoot)) +
                  " lp=" + String(!!(stateObj && stateObj.ballLp)));
              }
              return ok;
            }

            function commitFinalLayout(reason) {
              if (!st || st.closing || !st.addedBall || !st.ballRoot || !st.ballLp) return false;
              st.ballLp.x = toX;
              st.ballLp.y = toY;
              st.ballLp.width = toW;
              if (!canUpdateLayout(st, reason)) return false;
              try {
                st.wm.updateViewLayout(st.ballRoot, st.ballLp);
                return true;
              } catch (eLayout) {
                logPosition(self, "e", "ball animation final layout fail reason=" + String(reason || "") + " err=" + String(eLayout));
              }
              return false;
            }

            if (!st || !st.addedBall || !st.ballRoot || !st.ballLp) {
              invokeEndCallback("no_view");
              return false;
            }

            this.cancelBallLayoutAnimation("replace");
            token = Number(st.ballAnimationToken || 0) + 1;
            st.ballAnimationToken = token;

            var fromX = Number(st.ballLp.x || 0);
            var fromY = Number(st.ballLp.y || 0);
            var fromW = Number(st.ballLp.width || toW);
            var duration = Math.max(0, numberOr(durMs, 0));

            try {
              var va = android.animation.ValueAnimator.ofFloat(0.0, 1.0);
              va.setDuration(duration);
              try { va.setInterpolator(new android.view.animation.DecelerateInterpolator()); } catch (eInterpolator) {}

              va.addUpdateListener(new android.animation.ValueAnimator.AnimatorUpdateListener({
                onAnimationUpdate: function(anim) {
                  try {
                    if (cancelled || self.state.closing || !self.state.addedBall) return;
                    if (Number(self.state.ballAnimationToken || 0) !== token) return;
                    if (self.state.ballAnimator !== va) return;
                    var f = Number(anim.getAnimatedValue());
                    var nx = Math.round(fromX + (toX - fromX) * f);
                    var ny = Math.round(fromY + (toY - fromY) * f);
                    var nw = Math.round(fromW + (toW - fromW) * f);
                    if (nx === self.state.ballLp.x && ny === self.state.ballLp.y && nw === self.state.ballLp.width) return;
                    self.state.ballLp.x = nx;
                    self.state.ballLp.y = ny;
                    self.state.ballLp.width = nw;
                    if (!canUpdateLayout(self.state, "frame_update")) return;
                    self.state.wm.updateViewLayout(self.state.ballRoot, self.state.ballLp);
                  } catch (eUpdate) {
                    logPosition(self, "w", "ball animation update fail: " + String(eUpdate));
                  }
                }
              }));

              va.addListener(new android.animation.Animator.AnimatorListener({
                onAnimationStart: function() {},
                onAnimationRepeat: function() {},
                onAnimationCancel: function() {
                  cancelled = true;
                  try { if (self.state.ballAnimator === va) self.state.ballAnimator = null; } catch (eClearCancel) {}
                },
                onAnimationEnd: function() {
                  if (cancelled) return;
                  if (Number(self.state.ballAnimationToken || 0) !== token) return;
                  if (self.state.ballAnimator !== va) return;
                  self.state.ballAnimator = null;
                  if (self.state.closing || !self.state.addedBall) return;
                  var layoutOk = commitFinalLayout("animation_end");
                  checkpointAnimation("BALL_ANIM_END", {
                    token: token,
                    layoutOk: layoutOk
                  }, !layoutOk);
                  invokeEndCallback("animation_end");
                }
              }));

              st.ballAnimator = va;
              va.start();
              return true;
            } catch (eStart) {
              if (Number(st.ballAnimationToken || 0) === token && !st.closing && st.addedBall) {
                st.ballAnimator = null;
                commitFinalLayout("start_fallback");
              }
              invokeEndCallback("start_fallback");
              logPosition(this, "w", "ball animation fallback: " + String(eStart));
              return false;
            }
          };'''
          regex_once(
              'code/th_19_position_state.js',
              r'  proto\.animateBallLayout = function\(toX, toY, toW, durMs, endCb\) \{.*?\n  \};\n\n  proto\.applyConfiguredBallPosition',
              new_animation + '\n\n  proto.applyConfiguredBallPosition'
          )

          bump('code/th_09_animation.js', '1.0.8', '1.0.9')
          new_undock = r'''FloatBallAppWM.prototype.undockToFull = function(withAnim, endCb) {
            var self = this;
            var callbackCompleted = false;
            var undockSide = String(this.state && this.state.dockSide || "right");

            function undockCheckpoint(phase, reason, error, sync) {
              try {
                if (self.L && typeof self.L.checkpoint === "function") {
                  self.L.checkpoint(phase, {
                    reason: String(reason || ""),
                    side: undockSide,
                    error: error ? String(error) : ""
                  }, sync === true);
                }
              } catch (eCheckpoint) {
                try { safeLog(self.L, 'w', "undock checkpoint fail phase=" + String(phase || "") + " err=" + String(eCheckpoint)); } catch (eLog) {}
              }
            }

            function completeUndock(reason) {
              if (callbackCompleted) return false;
              callbackCompleted = true;
              if (endCb === null || typeof endCb === "undefined") return true;
              if (typeof endCb !== "function") {
                safeLog(self.L, 'e', "undock callback invalid reason=" + String(reason || "") + " type=" + String(typeof endCb));
                undockCheckpoint("BALL_UNDOCK_CALLBACK_FAIL", reason, "invalid_callback_type:" + String(typeof endCb), true);
                return false;
              }
              undockCheckpoint("BALL_UNDOCK_CALLBACK_BEGIN", reason, "", false);
              try {
                endCb();
                undockCheckpoint("BALL_UNDOCK_CALLBACK_DONE", reason, "", false);
                return true;
              } catch (eCb) {
                safeLog(self.L, 'e', "undock callback fail reason=" + String(reason || "") + " err=" + String(eCb));
                undockCheckpoint("BALL_UNDOCK_CALLBACK_FAIL", reason, eCb, true);
              }
              return false;
            }

            function commitUndockedLayout(x, y, width, reason) {
              self.state.ballLp.x = x;
              self.state.ballLp.y = y;
              self.state.ballLp.width = width;
              if (!self.state.wm || typeof self.state.wm.updateViewLayout !== "function") {
                safeLog(self.L, 'e', "undock updateViewLayout unavailable reason=" + String(reason || "") +
                  " method=" + String(self.state.wm ? typeof self.state.wm.updateViewLayout : "missing"));
                return false;
              }
              try {
                self.state.wm.updateViewLayout(self.state.ballRoot, self.state.ballLp);
              } catch (eLayout) {
                safeLog(self.L, 'e', "undock layout commit fail reason=" + String(reason || "") + " err=" + String(eLayout));
                return false;
              }
              try {
                if (typeof self.savePos === "function") self.savePos(self.state.ballLp.x, self.state.ballLp.y);
              } catch (eSave) {
                safeLog(self.L, 'w', "undock save position fail: " + String(eSave));
              }
              return true;
            }

            if (this.state.closing) { completeUndock("closing"); return false; }
            if (!this.state.docked) { completeUndock("already_full"); return true; }
            if (!this.state.addedBall || !this.state.ballLp || !this.state.ballRoot) {
              completeUndock("ball_missing");
              return false;
            }

            var di = this.getDockInfo();
            var ballSize = di.ballSize;
            var targetW = ballSize;
            var targetY = this.clamp(this.state.ballLp.y, 0, this.state.screen.h - ballSize);
            var targetX = undockSide === "left" ? 0 : this.state.screen.w - ballSize;

            try { this.state.ballContent.setX(0); } catch (e0) { safeLog(null, 'e', "catch " + String(e0)); }

            this.state.docked = false;
            this.state.dockSide = null;

            if (withAnim === true && typeof this.animateBallLayout === "function") {
              this.animateBallLayout(targetX, targetY, targetW, this.config.UNDOCK_ANIM_MS, function() {
                completeUndock("animation_end");
              });
            } else {
              if (withAnim === true && typeof this.animateBallLayout !== "function") {
                safeLog(this.L, 'e', "undock animateBallLayout is not function type=" + String(typeof this.animateBallLayout));
              }
              commitUndockedLayout(targetX, targetY, targetW, withAnim === true ? "animation_unavailable" : "direct");
              completeUndock(withAnim === true ? "animation_unavailable" : "direct");
            }

            try {
              if (withAnim && this.config.ENABLE_ANIMATIONS) {
                this.state.ballContent.animate().alpha(1.0).setDuration(150).start();
              } else {
                this.state.ballContent.setAlpha(1.0);
              }
            } catch (eA) { safeLog(null, 'e', "catch " + String(eA)); }

            safeLog(this.L, 'i', "undock from " + undockSide);
            return true;
          };'''
          regex_once(
              'code/th_09_animation.js',
              r'FloatBallAppWM\.prototype\.undockToFull = function\(withAnim, endCb\) \{.*?\n\};\n\nFloatBallAppWM\.prototype\.cancelDockTimer',
              new_undock + '\n\nFloatBallAppWM.prototype.cancelDockTimer'
          )

          bump('code/th_15_extra.js', '1.1.16', '1.1.17')
          replace_once(
              'code/th_15_extra.js',
              '''  var doShow = function() {
    try {
      if (self.state.closing) return;

      self.showMask();

      var type = which;
      var rawPanel = self.buildPanelView(type);
''',
              '''  var doShow = function() {
    var maskAddedByCallback = false;

    function panelStage(phase, extra, sync) {
      var fields = extra || {};
      fields.which = String(which || "");
      try {
        if (self.L && typeof self.L.checkpoint === "function") {
          self.L.checkpoint(phase, fields, sync === true);
        } else {
          safeLog(self.L, sync === true ? 'e' : 'd', phase + " which=" + String(which || ""));
        }
      } catch (eStage) {
        try { safeLog(self.L, 'w', "panel stage log fail phase=" + String(phase || "") + " err=" + String(eStage)); } catch (eLog) {}
      }
    }

    try {
      if (self.state.closing) return;
      panelStage("PANEL_SHOW_CALLBACK_BEGIN", {}, false);

      if (typeof self.showMask !== "function") throw "showMask is not function";
      panelStage("PANEL_SHOW_MASK_BEGIN", {}, false);
      var maskWasAdded = self.state.addedMask === true;
      self.showMask();
      maskAddedByCallback = !maskWasAdded && self.state.addedMask === true;
      panelStage("PANEL_SHOW_MASK_DONE", { added: self.state.addedMask === true }, false);

      if (typeof self.buildPanelView !== "function") throw "buildPanelView is not function";
      var type = which;
      panelStage("PANEL_BUILD_CALL_BEGIN", { type: String(type || "") }, false);
      var rawPanel = self.buildPanelView(type);
      panelStage("PANEL_BUILD_CALL_DONE", { type: String(type || ""), built: !!rawPanel }, false);
'''
          )
          replace_once(
              'code/th_15_extra.js',
              '''      self.addPanel(panelView, pos.x, pos.y, which);

      // 绑定拖拽事件
''',
              '''      if (typeof self.addPanel !== "function") throw "addPanel is not function";
      panelStage("PANEL_ADD_CALL_BEGIN", { x: pos.x, y: pos.y }, false);
      self.addPanel(panelView, pos.x, pos.y, which);
      panelStage("PANEL_ADD_CALL_DONE", {
        x: pos.x,
        y: pos.y,
        added: which === "main" ? self.state.addedPanel === true :
          (which === "settings" ? self.state.addedSettings === true : self.state.addedViewer === true)
      }, false);

      // 绑定拖拽事件
'''
          )
          replace_once(
              'code/th_15_extra.js',
              '''    } catch (e) {
      if (self.L) self.L.e("showPanelAvoidBall callback err=" + String(e));
      try { self.toast("面板显示失败: " + String(e));  } catch(et) { safeLog(null, 'e', "catch " + String(et)); }
    }
  };

  if (which === "settings") {
      doShow();
  } else {
      this.undockToFull(true, doShow);
  }
''',
              '''    } catch (e) {
      panelStage("PANEL_SHOW_CALLBACK_FAIL", { error: String(e) }, true);
      if (self.L && typeof self.L.e === "function") self.L.e("showPanelAvoidBall callback err=" + String(e));
      if (maskAddedByCallback && typeof self.hideMaskIfNoPanelVisible === "function") {
        try { self.hideMaskIfNoPanelVisible(); } catch (eMaskRollback) {
          try { safeLog(self.L, 'w', "panel mask rollback fail: " + String(eMaskRollback)); } catch (eRollbackLog) {}
        }
      }
      try { self.toast("面板显示失败: " + String(e)); } catch(et) { safeLog(null, 'e', "catch " + String(et)); }
    }
  };

  if (which === "settings") {
      doShow();
  } else if (typeof this.undockToFull !== "function") {
      safeLog(this.L, 'e', "showPanelAvoidBall undockToFull is not function type=" + String(typeof this.undockToFull));
      doShow();
  } else {
      this.undockToFull(true, doShow);
  }
'''
          )

          bump('code/th_01_base.js', '1.1.12', '1.1.13')
          new_base_handler = r'''function isToolHubSystemServerProcess(logger) {
            var processName = "";
            try {
              processName = String(logger && logger.proc && logger.proc.processName || "");
            } catch (eLoggerProc) { processName = ""; }
            if (processName === "system_server") return true;
            try {
              if (android.app.ActivityThread && typeof android.app.ActivityThread.currentProcessName === "function") {
                processName = String(android.app.ActivityThread.currentProcessName() || "");
              }
            } catch (eActivityThread) {}
            return processName === "system_server";
          }

          function installCrashHandler(logger) {
            try {
              if (!logger) return false;
              if (isToolHubSystemServerProcess(logger)) {
                try {
                  if (typeof logger.i === "function") {
                    logger.i("global crash handler skipped in system_server; restart once to clear legacy chain");
                  }
                } catch (eSkipLog) {}
                return true;
              }
              var old = java.lang.Thread.getDefaultUncaughtExceptionHandler();
              var h = new JavaAdapter(java.lang.Thread.UncaughtExceptionHandler, {
                uncaughtException: function(t, e) {
                  try {
                    var tn = "";
                    try { tn = (t ? String(t.getName()) : ""); } catch (eT) {}
                    var es = "";
                    try { es = (e ? String(e) : ""); } catch (eE) {}
                    if (typeof logger.fatal === "function") {
                      logger.fatal("UNCAUGHT thread=" + tn + " err=" + es);
                      try {
                        var sw = new java.io.StringWriter();
