                        e.printStackTrace(pw);
                        pw.flush();
                        logger.fatal("STACKTRACE " + String(sw.toString()));
                      } catch (eST) {}
                    }
                  } catch (e0) {}
                  try {
                    if (old && typeof old.uncaughtException === "function") old.uncaughtException(t, e);
