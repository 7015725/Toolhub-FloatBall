name: apply-pointer-hover-gate

on:
  push:
    branches: [fix/pointer-hover-gate]

permissions:
  contents: write

concurrency:
  group: apply-pointer-hover-gate
  cancel-in-progress: false

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: fix/pointer-hover-gate
          fetch-depth: 0

      - name: Apply patch
        run: python3 scripts/apply_pointer_hover_gate.py

      - name: Validate
        run: |
          python3 scripts/verify_ball_position_state.py
          python3 scripts/verify_schema_validator.py
          python3 .github/scripts/es5_scan.py
          git diff --check

      - name: Commit source changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            code/th_01_base.js \
            code/th_14_panels.js \
            code/th_17_pointer.js \
            code/th_19_position_state.js \
            scripts/verify_ball_position_state.py
          if git diff --cached --quiet; then
            echo "No source changes required"
            exit 0
          fi
          git commit -m "修复取字悬停门槛并调整框选时间"
          git push origin HEAD:fix/pointer-hover-gate
