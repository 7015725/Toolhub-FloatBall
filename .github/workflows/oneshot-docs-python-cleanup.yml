name: One-shot docs and Python cleanup

on:
  push:
    branches:
      - 'agent/cleanup-docs-python-workflows-20260720'
    paths:
      - '.github/workflows/oneshot-docs-python-cleanup.yml'

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout cleanup branch
        uses: actions/checkout@v4
        with:
          ref: agent/cleanup-docs-python-workflows-20260720
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Apply focused cleanup
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          root = Path.cwd()

          def read(path):
              return (root / path).read_text(encoding="utf-8")

          def write(path, text):
              (root / path).parent.mkdir(parents=True, exist_ok=True)
              (root / path).write_text(text, encoding="utf-8")

          def replace_once(text, old, new, label):
              count = text.count(old)
              if count != 1:
                  raise SystemExit("%s replacement count=%s" % (label, count))
              return text.replace(old, new, 1)

          # Python warning cleanup.
          path = "scripts/verify_pointer_regressions.py"
          text = read(path)
          text = replace_once(
              text,
              "and '.replace(/\\/+$/g, \"\")' in screenshot_dir",
              "and r'.replace(/\\/+$/g, \"\")' in screenshot_dir",
              path + " raw regex literal",
          )
          write(path, text)

          # Treat SyntaxWarning as a verification failure when compiling Python files.
          path = "scripts/verify_manifest.py"
          text = read(path)
          text = replace_once(
              text,
              '[sys.executable, "-m", "py_compile"] + py_files, cwd=str(ROOT)',
              '[sys.executable, "-W", "error::SyntaxWarning", "-m", "py_compile"] + py_files, cwd=str(ROOT)',
              path + " strict py_compile",
          )
          write(path, text)

          workflow_reference_verifier = '''#!/usr/bin/env python3
          """Verify that Python file references in GitHub Actions workflows exist."""
          import re
          from pathlib import Path

          ROOT = Path(__file__).resolve().parents[1]
          WORKFLOWS = ROOT / ".github" / "workflows"
          PYTHON_FILE_RE = re.compile(
              r"(?:^|[\\s;&|({])python(?:3(?:\\.\\d+)?)?\\s+"
              r"(?P<path>(?:\\./)?[A-Za-z0-9_.\\/-]+\\.py)\\b"
          )


          def fail(message):
              raise SystemExit("FAIL workflow-script-references: " + message)


          def main():
              missing = []
              references = []
              workflow_files = sorted(WORKFLOWS.glob("*.yml")) + sorted(WORKFLOWS.glob("*.yaml"))
              for workflow in workflow_files:
                  text = workflow.read_text(encoding="utf-8")
                  for match in PYTHON_FILE_RE.finditer(text):
                      rel = match.group("path").lstrip("./")
                      candidate = Path(rel)
                      if candidate.is_absolute() or ".." in candidate.parts:
                          missing.append((workflow.relative_to(ROOT), rel, "unsafe path"))
                          continue
                      references.append((workflow.relative_to(ROOT), rel))
                      if not (ROOT / candidate).is_file():
                          missing.append((workflow.relative_to(ROOT), rel, "missing"))
              if missing:
                  detail = "; ".join("%s -> %s (%s)" % item for item in missing)
                  fail(detail)
              print(
                  "Workflow script reference verification passed workflows=%d references=%d"
                  % (len(workflow_files), len(references))
              )


          if __name__ == "__main__":
              main()
          '''
          workflow_reference_verifier = "\n".join(
              line[10:] if line.startswith("          ") else line
              for line in workflow_reference_verifier.splitlines()
          ) + "\n"
          write("scripts/verify_workflow_script_references.py", workflow_reference_verifier)

          # Run workflow reference verification before feature-specific checks.
          path = ".github/workflows/verify.yml"
          text = read(path)
          marker = "      - name: Verify module boundaries\n"
          inserted = (
              "      - name: Verify workflow script references\n"
              "        shell: bash\n"
              "        run: python3 scripts/verify_workflow_script_references.py\n\n"
              + marker
          )
          text = replace_once(text, marker, inserted, path + " workflow reference step")
          write(path, text)

          documentation_verifier = '''#!/usr/bin/env python3
          """Verify core documents against the current module, security, and storage model."""
          import ast
          import re
          from pathlib import Path

          ROOT = Path(__file__).resolve().parents[1]
          README = (ROOT / "README.md").read_text(encoding="utf-8")
          ARCH = (ROOT / "ARCHITECTURE.md").read_text(encoding="utf-8")
          STRUCTURE = (ROOT / "STRUCTURE.md").read_text(encoding="utf-8")
          SQLITE = (ROOT / "SQLITE_STORAGE.md").read_text(encoding="utf-8")
          ENTRY = (ROOT / "ToolHub.js").read_text(encoding="utf-8")
          SIGN_SCRIPT = ROOT / "scripts" / "generate_signed_manifest.py"


          def fail(message):
              raise SystemExit("FAIL documentation-consistency: " + message)


          def require(text, fragment, label):
              if fragment not in text:
                  fail("missing %s: %s" % (label, fragment))


          def forbid(text, fragment, label):
              if fragment in text:
                  fail("stale %s: %s" % (label, fragment))


          def parse_signing_modules():
              tree = ast.parse(SIGN_SCRIPT.read_text(encoding="utf-8"), filename=str(SIGN_SCRIPT))
              for node in tree.body:
                  if not isinstance(node, ast.Assign):
                      continue
                  if any(isinstance(target, ast.Name) and target.id == "MODULES" for target in node.targets):
                      return [str(item) for item in ast.literal_eval(node.value)]
              fail("generate_signed_manifest.py MODULES missing")


          def parse_entry_modules():
              match = re.search(r"var\\s+modules\\s*=\\s*\\[(.*?)\\]\\s*;", ENTRY, re.S)
              if not match:
                  fail("ToolHub.js modules list missing")
              pairs = re.findall(r'"([^\"]+\\.js)"|\\'([^\\']+\\.js)\\'', match.group(1))
              return [left or right for left, right in pairs]


          modules = parse_signing_modules()
          entry_modules = parse_entry_modules()
          if modules != entry_modules:
              fail("ToolHub.js and signing MODULES differ")
          module_count = len(modules)
          expected_count = "%d 个子模块" % module_count

          for name, text in (("README", README), ("ARCHITECTURE", ARCH), ("STRUCTURE", STRUCTURE)):
              for module in modules:
                  require(text, module, name + " module " + module)

          require(ARCH, expected_count, "architecture module count")
          require(STRUCTURE, expected_count, "structure module count")
          require(STRUCTURE, "files: %d 个模块" % module_count, "structure manifest module count")
          for name, text in (("ARCHITECTURE", ARCH), ("STRUCTURE", STRUCTURE)):
              for match in re.finditer(r"(\\d+) 个子模块", text):
                  if int(match.group(1)) != module_count:
                      fail("%s stale module count: %s" % (name, match.group(0)))

          require(README, "BUTTON_ICON_STORAGE.md", "README button icon document")
          require(README, "docs/button-types.md", "README button type document")
          require(README, "docs/security-config-clean.md", "README security document")
          for table_name in (
              "toolhub_button_icons",
              "toolhub_pickword_images",
              "toolhub_pickword_image_exports",
          ):
              require(README, table_name, "README table " + table_name)
              require(SQLITE, table_name, "SQLite table " + table_name)

          require(README, "默认启动 `intentUri`", "README shortcut behavior")
          require(ARCH, "intentUri", "architecture shortcut behavior")
          require(STRUCTURE, "intentUri", "structure shortcut behavior")
          forbid(README, "执行 ShortX 快捷方式代码", "README legacy shortcut default")
          forbid(STRUCTURE, "通过 shell 广播桥发送 base64 命令，默认 root", "structure root default")

          for text, label in ((ARCH, "architecture"), (STRUCTURE, "structure")):
              require(text, ".module_update_transaction.json", label + " transaction marker")
              require(text, ".module_update_transaction.committed", label + " commit marker")
              require(text, "toolhub.db", label + " structured storage")

          critical_modules = (
              "th_01_base.js",
              "th_02_core.js",
              "th_05_persistence.js",
              "th_16_entry.js",
              "th_19_position_state.js",
          )
          for name in critical_modules:
              require(ARCH, name, "architecture critical module " + name)
              require(STRUCTURE, name, "structure critical module " + name)
          forbid(STRUCTURE, "这两个模块失败会导致入口中断", "structure obsolete critical count")
          require(STRUCTURE, "任一加载失败都会中断启动", "structure critical failure behavior")
          require(STRUCTURE, "healthy / degraded / failed", "structure startup tri-state")

          require(ARCH, "ballRebuildActive", "architecture rebuild state")
          require(STRUCTURE, "ballRebuildActive", "structure rebuild state")
          require(STRUCTURE, "position_state", "structure final load stage")
          forbid(ARCH, "manifest.version = 20260703110021", "architecture frozen manifest version")
          forbid(STRUCTURE, "version: 20260703110021", "structure frozen manifest version")

          require(SQLITE, "intentUri", "SQLite shortcut intent field")
          require(SQLITE, "shortcutExecMode", "SQLite shortcut mode field")
          forbid(SQLITE, "shortcutCode\\n", "SQLite obsolete shortcut field")

          require(README, "无效配置会强制回退到 `2`", "README secure fallback")
          require(ARCH, "无效值会强制回退到完整验签模式 `2`", "architecture secure fallback")
          require(STRUCTURE, "无效值强制回退到 `2`", "structure secure fallback")

          print("Documentation consistency verification passed modules=%d" % module_count)
          '''
          documentation_verifier = "\n".join(
              line[10:] if line.startswith("          ") else line
              for line in documentation_verifier.splitlines()
          ) + "\n"
          write("scripts/verify_documentation_consistency.py", documentation_verifier)

          # README: complete document index, runtime modules, storage tables, and module responsibilities.
          path = "README.md"
          text = read(path)
          text = replace_once(
              text,
              "STRUCTURE.md\nARCHITECTURE.md\nSQLITE_STORAGE.md\ndocs/security-config-clean.md",
              "STRUCTURE.md\nARCHITECTURE.md\nSQLITE_STORAGE.md\nBUTTON_ICON_STORAGE.md\ndocs/button-types.md\ndocs/security-config-clean.md",
              path + " document index",
          )
          text = replace_once(
              text,
              "    │   └── th_21_result_preview.js",
              "    │   ├── th_21_result_preview.js\n    │   ├── th_22_image_viewer.js\n    │   └── th_23_screenshot_manager.js",
              path + " runtime module tree",
          )
          text = replace_once(
              text,
              "├── toolhub_button_values\n└── toolhub_schema_values",
              "├── toolhub_button_values\n├── toolhub_schema_values\n├── toolhub_button_icons\n├── toolhub_pickword_images\n└── toolhub_pickword_image_exports",
              path + " database table tree",
          )
          text = replace_once(
              text,
              "| `th_21_result_preview.js` | 取字和 OCR 顶部两行全自绘结果预览 |",
              "| `th_21_result_preview.js` | 取字和 OCR 顶部两行全自绘结果预览 |\n| `th_22_image_viewer.js` | 拾字截图缩略图、原图查看、缩放平移、保存分享删除及自动清理 |\n| `th_23_screenshot_manager.js` | 截图管理器列表、内部/已保存分类、缩略图缓存与外部打开 |",
              path + " module responsibility table",
          )
          text = replace_once(
              text,
              "- 支持悬浮球拖动唤出指针、悬停取字、小框回退和框选 OCR。",
              "- 支持悬浮球拖动唤出指针、悬停取字、小框回退和框选 OCR。\n- 支持拾字截图查看、保存、分享、删除、自动清理和截图管理。",
              path + " screenshot capability",
          )
          write(path, text)

          # Architecture: use the runtime/signing module list as the sole count source.
          path = "ARCHITECTURE.md"
          text = read(path)
          text = text.replace("更新时间：2026-07-14", "更新时间：2026-07-20", 1)
          text = replace_once(
              text,
              "本文基于当前 `main` 分支整理，只描述仓库中已经存在的代码结构与机制。项目当前实际加载 **27 个子模块**；`th_07_shortcut.js` 已退役，快捷方式选择能力由 `th_14_button_shortcut.js` 承载，指针取字能力由 `th_17_pointer.js` 承载，框选 OCR 由 `th_18_pointer_ocr.js` 承载，固定位置、指针布局和悬浮球重建回滚由 `th_19_position_state.js` 承载，主按钮面板由 `th_15_main_panel.js` 承载，拾字工具由 `th_20_pickword.js` 承载，顶部结果预览由 `th_21_result_preview.js` 承载。\nth_22_image_viewer.js：拾字截图缩略图、同窗原图查看、缩放平移与大图区域解码。",
              "本文基于当前 `main` 分支整理，只描述仓库中已经存在的代码结构与机制。项目当前实际加载 **29 个子模块**；`th_07_shortcut.js` 已退役，快捷方式选择能力由 `th_14_button_shortcut.js` 承载，指针取字能力由 `th_17_pointer.js` 承载，框选 OCR 由 `th_18_pointer_ocr.js` 承载，固定位置、指针布局和悬浮球重建回滚由 `th_19_position_state.js` 承载，主按钮面板由 `th_15_main_panel.js` 承载，拾字工具由 `th_20_pickword.js` 承载，顶部结果预览由 `th_21_result_preview.js` 承载，拾字截图查看与生命周期由 `th_22_image_viewer.js` 承载，截图管理列表由 `th_23_screenshot_manager.js` 承载。",
              path + " introduction",
          )
          text = text.replace("当前为 26 个", "当前为 29 个")
          text = text.replace("当前实际加载 27 个子模块", "当前实际加载 29 个子模块")
          text = text.replace("27 个子模块", "29 个子模块")
          text = replace_once(
              text,
              "结果与拾字 UI 层\n  th_20_pickword.js\n  th_21_result_preview.js",
              "结果与拾字 UI 层\n  th_20_pickword.js\n  th_21_result_preview.js\n\n拾字截图与管理层\n  th_22_image_viewer.js\n  th_23_screenshot_manager.js",
              path + " module layer",
          )
          text = replace_once(
              text,
              "th_21_result_preview.js\n  状态栏下方的两行全自绘结果预览、自动消失、连续结果替换和拾字入口。\n```",
              "th_21_result_preview.js\n  状态栏下方的两行全自绘结果预览、自动消失、连续结果替换和拾字入口。\n\nth_22_image_viewer.js\n  拾字截图缩略图、同窗原图查看、缩放平移、大图区域解码、保存、分享、删除和自动清理。\n\nth_23_screenshot_manager.js\n  截图管理器列表、内部与已保存分类、缩略图缓存、外部打开和删除入口。\n```",
              path + " module responsibilities",
          )
          write(path, text)

          # Structure: repair the tree and keep it as the concrete repository/module index.
          path = "STRUCTURE.md"
          text = read(path)
          text = text.replace("更新时间：2026-07-14", "更新时间：2026-07-20", 1)
          text = replace_once(
              text,
              "│   ├── th_20_pickword.js\n│   └── th_21_result_preview.js\nth_22_image_viewer.js：拾字截图缩略图、同窗原图查看、缩放平移与大图区域解码。\n└── scripts/",
              "│   ├── th_20_pickword.js\n│   ├── th_21_result_preview.js\n│   ├── th_22_image_viewer.js\n│   └── th_23_screenshot_manager.js\n└── scripts/",
              path + " repository tree",
          )
          text = text.replace("当前实际加载 **27 个子模块**", "当前实际加载 **29 个子模块**")
          text = text.replace("27 个子模块", "29 个子模块")
          text = text.replace("files: 27 个模块", "files: 29 个模块")
          text = replace_once(
              text,
              "│   ├── th_20_pickword.js\n│   ├── th_21_result_preview.js\n│   ├── .installed_manifest.json",
              "│   ├── th_20_pickword.js\n│   ├── th_21_result_preview.js\n│   ├── th_22_image_viewer.js\n│   ├── th_23_screenshot_manager.js\n│   ├── .installed_manifest.json",
              path + " runtime directory",
          )
          text = replace_once(
              text,
              "| `th_21_result_preview.js` | 顶部两行全自绘结果预览、倒计时、动效与拾字入口 |",
              "| `th_21_result_preview.js` | 顶部两行全自绘结果预览、倒计时、动效与拾字入口 |\n| `th_22_image_viewer.js` | 拾字截图查看、缩放平移、保存分享删除、图片记录和自动清理 |\n| `th_23_screenshot_manager.js` | 截图列表、内部/已保存分类、缩略图缓存、外部打开和删除入口 |",
              path + " module responsibility table",
          )
          write(path, text)

          # SQLite: move image/icon tables into the formal schema section.
          path = "SQLITE_STORAGE.md"
          text = read(path)
          marker = "### `toolhub_meta`\n"
          addition = '''### `toolhub_button_icons`

          按钮使用本地图片或快捷方式图片时，图片内容以去重后的 SHA-256 为键保存到 BLOB 表：

          ```sql
          CREATE TABLE toolhub_button_icons (
            icon_key TEXT PRIMARY KEY NOT NULL,
            mime_type TEXT NOT NULL,
            image_data BLOB NOT NULL,
            byte_size INTEGER NOT NULL,
            width INTEGER NOT NULL,
            height INTEGER NOT NULL,
            sha256 TEXT NOT NULL,
            original_name TEXT,
            created_at INTEGER NOT NULL,
            updated_at INTEGER NOT NULL
          );
          ```

          详细导入限制、去重和孤立图标清理规则见 `BUTTON_ICON_STORAGE.md`。

          ### `toolhub_pickword_images`

          记录 ToolHub 内部拾字截图及其公共保存状态：

          ```sql
          CREATE TABLE toolhub_pickword_images (
            internal_path TEXT PRIMARY KEY NOT NULL,
            created_at INTEGER NOT NULL,
            source_type TEXT NOT NULL,
            width INTEGER NOT NULL DEFAULT 0,
            height INTEGER NOT NULL DEFAULT 0,
            file_size INTEGER NOT NULL DEFAULT 0,
            saved_public_path TEXT NOT NULL DEFAULT '',
            saved_content_uri TEXT NOT NULL DEFAULT '',
            saved_at INTEGER NOT NULL DEFAULT 0,
            deleted_at INTEGER NOT NULL DEFAULT 0,
            last_access_at INTEGER NOT NULL DEFAULT 0
          );
          ```

          ### `toolhub_pickword_image_exports`

          记录保存副本和有过期时间的分享临时副本：

          ```sql
          CREATE TABLE toolhub_pickword_image_exports (
            export_id INTEGER PRIMARY KEY AUTOINCREMENT,
            internal_path TEXT NOT NULL,
            export_kind TEXT NOT NULL,
            public_path TEXT NOT NULL DEFAULT '',
            content_uri TEXT NOT NULL DEFAULT '',
            created_at INTEGER NOT NULL,
            expires_at INTEGER NOT NULL DEFAULT 0,
            deleted_at INTEGER NOT NULL DEFAULT 0
          );
          ```

          '''
          addition = "\n".join(
              line[10:] if line.startswith("          ") else line
              for line in addition.splitlines()
          ) + "\n"
          text = replace_once(text, marker, addition + marker, path + " image tables")
          write(path, text)

          # Remove this one-shot workflow from the resulting branch.
          (root / ".github" / "workflows" / "oneshot-docs-python-cleanup.yml").unlink()
          PY

      - name: Validate cleanup
        shell: bash
        run: |
          python3 scripts/verify_workflow_script_references.py
          python3 scripts/verify_documentation_consistency.py
          python3 -W error::SyntaxWarning -m py_compile $(find scripts .github/scripts -name '*.py' -print)
          python3 scripts/verify_manifest.py
          python3 scripts/verify_pointer_regressions.py
          git diff --check

      - name: Commit cleanup
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "整理文档、Python 校验与工作流"
          git push origin "HEAD:agent/cleanup-docs-python-workflows-20260720"
