name: ToolHub 应用按钮补丁触发器

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'agent/app-picker-cleanup-20260715'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/app-picker-cleanup-20260715
          fetch-depth: 0

      - name: 提取并执行补丁
        shell: bash
        run: |
          python3 - <<'PY'
          import re
          from pathlib import Path
          workflow = Path('.github/workflows/toolhub-app-picker-patch.yml').read_text(encoding='utf-8')
          match = re.search(r"printf '%s' '([^']+)' \| base64", workflow)
          if not match:
              raise SystemExit('patch payload missing')
          Path('/tmp/toolhub_patch.b64').write_text(match.group(1), encoding='ascii')
          PY
          base64 -d /tmp/toolhub_patch.b64 | gzip -d > /tmp/toolhub_patch.py
          python3 /tmp/toolhub_patch.py
          rm -f .github/workflows/toolhub-app-picker-pr-trigger.yml

      - name: 记录静态验证
        shell: bash
        run: |
          set +e
          {
            echo '== node editor =='
            node --check code/th_14_button_editor.js
            echo "status=$?"
            echo '== node action =='
            node --check code/th_11_action.js
            echo "status=$?"
            echo '== diff check =='
            git diff --check
            echo "status=$?"
            echo '== button editor verifier =='
            if [ -f scripts/verify_button_editor_direct_save.py ]; then python3 scripts/verify_button_editor_direct_save.py; else echo 'missing'; fi
            echo "status=$?"
            echo '== color safety verifier =='
            if [ -f scripts/verify_coloros_rhino_color_safety.py ]; then python3 scripts/verify_coloros_rhino_color_safety.py; else echo 'missing'; fi
            echo "status=$?"
          } 2>&1 | tee TOOLHUB_PATCH_DIAGNOSTICS.txt
          exit 0

      - name: 提交修改和诊断
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m '优化应用按钮选择并记录验证结果'
          git push origin HEAD:agent/app-picker-cleanup-20260715
