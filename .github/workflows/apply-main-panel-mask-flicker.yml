name: apply-main-panel-mask-flicker

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'fix/main-panel-mask-flicker-20260717'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repair branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Apply focused repair
        run: python3 scripts/_apply_main_panel_mask_flicker_fix.py

      - name: Regenerate deterministic audits
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/report_dead_module_symbols.py --write DEAD_CODE_AUDIT.md
          python3 scripts/report_protected_wrapper_chains.py --write PROTECTED_WRAPPER_AUDIT.md
          python3 scripts/report_th15_extra_symbols.py --write TH15_EXTRA_AUDIT.md
          python3 scripts/report_th09_animation_symbols.py --write TH09_ANIMATION_AUDIT.md

      - name: Verify ES5 and JavaScript syntax
        run: |
          python3 .github/scripts/es5_scan.py
          python3 scripts/verify_js_syntax.py

      - name: Verify module boundaries
        run: python3 scripts/verify_module_boundaries.py

      - name: Verify deterministic audits
        run: |
          python3 scripts/report_dead_module_symbols.py --check DEAD_CODE_AUDIT.md
          python3 scripts/report_protected_wrapper_chains.py --check PROTECTED_WRAPPER_AUDIT.md
          python3 scripts/report_th15_extra_symbols.py --check TH15_EXTRA_AUDIT.md
          python3 scripts/report_th09_animation_symbols.py --check TH09_ANIMATION_AUDIT.md

      - name: Capture main panel mask lifecycle verification
        shell: bash
        run: |
          set +e
          python3 scripts/verify_main_panel_close_lifecycle.py > main-panel-mask-lifecycle.txt 2>&1
          status=$?
          cat main-panel-mask-lifecycle.txt
          echo "$status" > main-panel-mask-lifecycle.status
          exit 0

      - name: Upload lifecycle diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: main-panel-mask-lifecycle-diagnostic
          path: |
            main-panel-mask-lifecycle.txt
            main-panel-mask-lifecycle.status
          if-no-files-found: error
          retention-days: 7

      - name: Gate main panel mask lifecycle
        shell: bash
        run: test "$(cat main-panel-mask-lifecycle.status)" = "0"

      - name: Verify animation callback safety
        run: python3 scripts/verify_animation_callback_safety.py

      - name: Verify ToolApp thread affinity
        run: python3 scripts/verify_toolapp_main_thread_affinity.py

      - name: Verify main panel adaptive layout
        run: python3 scripts/verify_main_panel_adaptive_layout.py

      - name: Verify main panel grid sizing
        run: python3 scripts/verify_main_panel_grid_sizing.py

      - name: Verify main panel visual tuning
        run: python3 scripts/verify_main_panel_visual_tuning.py

      - name: Verify changed module versions
        run: python3 scripts/verify_changed_module_versions.py

      - name: Check whitespace
        run: git diff --check

      - name: Commit repair and remove temporary executor
        shell: bash
        env:
          BRANCH: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          rm -f .github/workflows/apply-main-panel-mask-flicker.yml
          rm -f scripts/_apply_main_panel_mask_flicker_fix.py
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m '修复主面板打开时全屏闪烁'
          git push origin "HEAD:${BRANCH}"
