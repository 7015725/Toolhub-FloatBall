name: apply-long-press-cleanup

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: apply-long-press-cleanup
  cancel-in-progress: false

jobs:
  apply:
    if: >
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'fix/remove-long-press-fallbacks' &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout cleanup branch
        uses: actions/checkout@v4
        with:
          ref: fix/remove-long-press-fallbacks
          fetch-depth: 0
          token: ${{ secrets.TOOLHUB_AUTOMATION_TOKEN || github.token }}
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Apply cleanup
        run: python3 scripts/apply_long_press_cleanup.py

      - name: Refresh dead code audit
        run: python3 scripts/report_dead_module_symbols.py --write DEAD_CODE_AUDIT.md

      - name: Verify ES5 and JS syntax
        run: |
          python3 .github/scripts/es5_scan.py
          python3 scripts/verify_js_syntax.py

      - name: Verify module boundaries
        run: python3 scripts/verify_module_boundaries.py

      - name: Verify dead code audit
        run: python3 scripts/report_dead_module_symbols.py --check DEAD_CODE_AUDIT.md

      - name: Verify ball position state
        run: python3 scripts/verify_ball_position_state.py

      - name: Verify ToolApp layout
        run: python3 scripts/verify_toolapp_layout.py

      - name: Verify button editor layout
        run: python3 scripts/verify_button_editor_layout.py

      - name: Verify schema validator
        run: python3 scripts/verify_schema_validator.py

      - name: Verify Python and whitespace
        run: |
          python3 -m compileall -q scripts .github/scripts
          git diff --check

      - name: Commit cleanup
        shell: bash
        env:
          TOOLHUB_AUTOMATION_TOKEN: ${{ secrets.TOOLHUB_AUTOMATION_TOKEN }}
        run: |
          if [ -z "$TOOLHUB_AUTOMATION_TOKEN" ]; then
            echo "TOOLHUB_AUTOMATION_TOKEN is empty"
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "删除长按备用实现"
          git remote set-url origin "https://x-access-token:${TOOLHUB_AUTOMATION_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin HEAD:fix/remove-long-press-fallbacks
