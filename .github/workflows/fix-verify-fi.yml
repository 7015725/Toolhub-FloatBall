name: fix-verify-fi

on:
  pull_request:
    branches: [main]
    types: [synchronize]

permissions:
  contents: write

jobs:
  fix:
    if: github.event.pull_request.head.ref == 'fix/main-panel-grid-sizing-locked-20260714-1156'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ secrets.TOOLHUB_AUTOMATION_TOKEN || github.token }}
          persist-credentials: false
      - name: Restore shell terminator
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('.github/workflows/verify.yml')
          text = path.read_text(encoding='utf-8')
          anchor = '          else\n            git show --check --pretty=oneline --summary HEAD\n'
          replacement = anchor + '          fi\n'
          if replacement in text:
              pass
          elif text.count(anchor) == 1:
              text = text.replace(anchor, replacement, 1)
          else:
              raise SystemExit('verify.yml closing anchor mismatch')
          path.write_text(text, encoding='utf-8', newline='\n')
          PY
          bash -n <(python3 - <<'PY'
          from pathlib import Path
          text = Path('.github/workflows/verify.yml').read_text(encoding='utf-8')
          block = text.split('      - name: Check git whitespace', 1)[1]
          print('if true; then\n  :\nelse\n  :\nfi')
          PY
          )
      - name: Remove temporary workflows
        run: |
          rm -f .github/workflows/diagnose-main-panel-grid.yml
          rm -f .github/workflows/fix-verify-fi.yml
      - name: Commit cleanup
        env:
          TOOLHUB_AUTOMATION_TOKEN: ${{ secrets.TOOLHUB_AUTOMATION_TOKEN }}
        run: |
          test -n "$TOOLHUB_AUTOMATION_TOKEN"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "修复验证工作流收尾并清理诊断文件"
          git remote set-url origin "https://x-access-token:${TOOLHUB_AUTOMATION_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
