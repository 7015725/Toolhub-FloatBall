name: export-stage3-snapshot

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Pack repository snapshot
        shell: bash
        run: |
          tar --exclude=.git -czf /tmp/toolhub-stage3-main.tar.gz .
      - name: Upload repository snapshot
        uses: actions/upload-artifact@v4
        with:
          name: toolhub-stage3-main-snapshot
          path: /tmp/toolhub-stage3-main.tar.gz
          if-no-files-found: error
          retention-days: 1
