name: apply pointer module syntax fix

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: apply-pointer-module-syntax-fix
  cancel-in-progress: true

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    environment: signing
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: fix/pointer-module-load-syntax
          fetch-depth: 0
          token: ${{ secrets.TOOLHUB_AUTOMATION_TOKEN || github.token }}
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Apply syntax hotfix
        run: python3 .github/scripts/fix_pointer_module_syntax.py

      - name: Install signing key
        shell: bash
        env:
          TOOLHUB_SIGNING_PRIVATE_KEY_PEM: ${{ secrets.TOOLHUB_SIGNING_PRIVATE_KEY_PEM }}
        run: |
          if [ -z "$TOOLHUB_SIGNING_PRIVATE_KEY_PEM" ]; then
            echo "TOOLHUB_SIGNING_PRIVATE_KEY_PEM is empty"
            exit 1
          fi
          mkdir -p "$HOME/.hermes/toolhub_signing"
          printf '%s\n' "$TOOLHUB_SIGNING_PRIVATE_KEY_PEM" > "$HOME/.hermes/toolhub_signing/private_key.pem"
          chmod 600 "$HOME/.hermes/toolhub_signing/private_key.pem"

      - name: Generate signed manifest
        shell: bash
        run: |
          python3 scripts/generate_signed_manifest.py --yes \
            --title "修复指针模块加载异常" \
            --change "修复 th_17_pointer.js 花括号结构并增加 JS 语法解析检查"

      - name: Verify JavaScript syntax
        run: python3 scripts/verify_js_syntax.py

      - name: Verify ToolHub
        shell: bash
        run: |
          python3 .github/scripts/es5_scan.py
          python3 scripts/verify_sqlite_persistence.py
          python3 scripts/verify_button_icon_blob.py
          python3 scripts/verify_ball_position_state.py
          python3 scripts/verify_manifest.py
          python3 scripts/verify_toolapp_single_root.py
          python3 scripts/verify_toolapp_adaptive_size.py
          python3 scripts/verify_button_editor_layout.py
          python3 scripts/verify_schema_validator.py
          python3 scripts/verify_pointer_issue_85.py
          python3 scripts/verify_pointer_text_release.py
          python3 .github/scripts/verify_manifest_signature.py
          git diff --check

      - name: Commit hotfix
        shell: bash
        env:
          TOOLHUB_AUTOMATION_TOKEN: ${{ secrets.TOOLHUB_AUTOMATION_TOKEN }}
        run: |
          if [ -z "$TOOLHUB_AUTOMATION_TOKEN" ]; then
            echo "TOOLHUB_AUTOMATION_TOKEN is empty"
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            .github/workflows/verify.yml \
            code/th_17_pointer.js \
            ToolHub.js \
            ToolHub.js.sha256 \
            manifest.json \
            manifest.sig \
            scripts/verify_js_syntax.py \
            scripts/verify_ball_position_state.py \
            scripts/verify_pointer_text_release.py
          git commit -m "修复指针模块加载语法异常"
          git remote set-url origin "https://x-access-token:${TOOLHUB_AUTOMATION_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin "HEAD:fix/pointer-module-load-syntax"
