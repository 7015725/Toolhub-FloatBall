name: fix-entry-audit-whitespace

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: fix-entry-audit-whitespace
  cancel-in-progress: true

jobs:
  fix:
    if: ${{ github.head_ref == 'fix/toolhub-entry-redundancy' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Fix report ending and regenerate
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('scripts/report_entry_symbols.py')
          text = path.read_text(encoding='utf-8')
          old = '    return "\\n".join(lines) + "\\n"\n'
          new = '    return "\\n".join(lines).rstrip("\\n") + "\\n"\n'
          if old not in text:
              raise SystemExit('report return anchor missing')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
          python3 scripts/report_entry_symbols.py --write ENTRY_SYMBOL_AUDIT.md
          python3 scripts/report_entry_symbols.py --check ENTRY_SYMBOL_AUDIT.md
          rm -f ENTRY_WHITESPACE_DEBUG.txt

      - name: Verify whitespace
        shell: bash
        run: |
          git fetch --no-tags origin main --depth=1
          git diff --check origin/main...HEAD

      - name: Commit corrected files
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A ENTRY_SYMBOL_AUDIT.md ENTRY_WHITESPACE_DEBUG.txt scripts/report_entry_symbols.py
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "修正入口审计报告结尾换行"
          git push origin HEAD:${{ github.head_ref }}
