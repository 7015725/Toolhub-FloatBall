name: fix-entry-audit-whitespace

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: fix-entry-audit-whitespace
  cancel-in-progress: true

jobs:
  fix:
    if: ${{ github.head_ref == 'fix/toolhub-entry-redundancy' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Normalize changed text files
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          paths = [
              Path('.github/workflows/verify.yml'),
              Path('ENTRY_SYMBOL_AUDIT.md'),
              Path('ToolHub.js'),
              Path('scripts/report_entry_symbols.py'),
              Path('scripts/verify_entry_redundancy_cleanup.py'),
          ]
          for path in paths:
              text = path.read_text(encoding='utf-8')
              normalized = '\n'.join(line.rstrip(' \t') for line in text.splitlines()) + '\n'
              if normalized != text:
                  path.write_text(normalized, encoding='utf-8')
                  print('normalized', path)
          PY

      - name: Verify whitespace
        shell: bash
        run: |
          git fetch --no-tags origin main --depth=1
          git diff --check origin/main...HEAD

      - name: Commit normalization
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .github/workflows/verify.yml ENTRY_SYMBOL_AUDIT.md ToolHub.js scripts/report_entry_symbols.py scripts/verify_entry_redundancy_cleanup.py
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "规范化入口审计文件空白"
          git push origin HEAD:${{ github.head_ref }}
