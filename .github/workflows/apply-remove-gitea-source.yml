name: apply-remove-gitea-source

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: apply-remove-gitea-source
  cancel-in-progress: true

jobs:
  apply:
    if: ${{ github.head_ref == 'fix/remove-gitea-source' && !contains(github.event.pull_request.title, '[generated]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix/remove-gitea-source
          fetch-depth: 0

      - name: Apply and verify
        shell: bash
        run: |
          python3 scripts/apply_remove_gitea_source.py
          python3 scripts/verify_update_security_mode.py
          python3 scripts/verify_github_only_source.py
          python3 scripts/verify_documentation_consistency.py
          python3 .github/scripts/es5_scan.py
          python3 scripts/verify_js_syntax.py
          git diff --check

      - name: Commit generated files
        shell: bash
        run: |
          if git diff --quiet; then
            echo "Gitea source removal already applied"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ToolHub.js README.md ARCHITECTURE.md STRUCTURE.md
          git commit -m "应用取消 Gitea 更新源修改"
          git push origin HEAD:fix/remove-gitea-source
