name: Apply pointer draw self-heal

on:
  push:
    branches:
      - agent/fix-pointer-draw-self-heal-20260715

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Apply patch
        run: python3 scripts/apply_pointer_draw_self_heal.py

      - name: Verify JavaScript syntax
        run: node --check code/th_17_pointer.js

      - name: Verify pointer draw contracts
        run: |
          python3 - <<'PY'
          import importlib.util
          from pathlib import Path

          path = Path('scripts/verify_pointer_regressions.py')
          spec = importlib.util.spec_from_file_location('verify_pointer_regressions', path)
          module = importlib.util.module_from_spec(spec)
          spec.loader.exec_module(module)
          result = module.CheckResult()
          pointer = module.read_text(module.POINTER)
          module.verify_pointer_draw_visibility(result, pointer)
          for name in result.passed:
              print('PASS ' + name)
          if result.failed:
              for name, detail in result.failed:
                  print('FAIL ' + name + ': ' + detail)
              raise SystemExit(1)
          print('OK pointer_draw_contracts=%d' % len(result.passed))
          PY

      - name: Verify Rhino color safety
        run: |
          python3 scripts/verify_rhino_color_api_safety.py
          python3 scripts/verify_coloros_rhino_color_safety.py

      - name: Check diff
        run: git diff --check

      - name: Commit patched source
        run: |
          rm -f scripts/apply_pointer_draw_self_heal.py
          rm -f .github/workflows/apply-pointer-draw-self-heal.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add code/th_17_pointer.js scripts/verify_pointer_regressions.py
          git add -u scripts/apply_pointer_draw_self_heal.py .github/workflows/apply-pointer-draw-self-heal.yml
          git commit -m "修复指针绘制空白并增加自愈"
          git push origin HEAD
