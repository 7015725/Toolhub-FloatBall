name: agent-refresh-entry-audit-runtime-cleanup

on:
  push:
    branches:
      - refactor/update-version-dead-code-cleanup
  pull_request:
    branches:
      - main
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  refresh:
    if: github.event_name == 'push' || github.event.pull_request.head.ref == 'refactor/update-version-dead-code-cleanup'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout cleanup branch
        uses: actions/checkout@v4
        with:
          ref: refactor/update-version-dead-code-cleanup
          fetch-depth: 0

      - name: Refresh entry symbol audit
        run: |
          python3 scripts/report_entry_symbols.py --write ENTRY_SYMBOL_AUDIT.md
          python3 scripts/report_entry_symbols.py --check ENTRY_SYMBOL_AUDIT.md

      - name: Commit refreshed report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ENTRY_SYMBOL_AUDIT.md
          if git diff --cached --quiet; then
            echo "Entry symbol audit already current"
            exit 0
          fi
          git commit -m "同步运行时清理入口符号审计"
          git push origin HEAD:refactor/update-version-dead-code-cleanup
