name: agent-verify-release-record-source

on:
  push:
    branches:
      - fix/release-record-source-of-truth
  pull_request:
    branches:
      - main
    types: [opened, reopened, synchronize]

permissions:
  contents: read

concurrency:
  group: agent-verify-release-record-source
  cancel-in-progress: true

jobs:
  verify:
    if: github.event_name == 'push' || github.event.pull_request.head.ref == 'fix/release-record-source-of-truth'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix/release-record-source-of-truth
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Verify Python syntax
        run: python3 -m py_compile scripts/build_update_history.py scripts/generate_signed_manifest.py scripts/verify_update_history.py scripts/verify_manifest.py scripts/verify_release_record_flow.py

      - name: Verify one pending release record
        run: python3 scripts/verify_update_history.py --require-one-pending

      - name: Verify release source policy
        run: python3 scripts/verify_release_record_flow.py

      - name: Check workflow YAML and whitespace
        run: |
          python3 - <<'PY'
          from pathlib import Path
          for path in (
              '.github/workflows/sign-toolhub.yml',
              '.github/workflows/rollback-toolhub.yml',
              '.github/workflows/verify.yml',
          ):
              text = Path(path).read_text(encoding='utf-8')
              if '\t' in text:
                  raise SystemExit('tab found in ' + path)
          print('OK workflow text files')
          PY
          git diff --check origin/main...HEAD
