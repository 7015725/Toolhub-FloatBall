name: apply-pickword-result-preview-verifier-update

on:
  pull_request:
    branches: [main]
    types: [synchronize, reopened]

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'fix/pickword-unified-cleanup-20260718'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix/pickword-unified-cleanup-20260718
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Apply verifier update
        run: python3 scripts/apply_pickword_result_preview_verifier_update.py

      - name: Verify affected contracts
        shell: bash
        run: |
          set -euo pipefail
          python3 .github/scripts/es5_scan.py
          python3 scripts/verify_js_syntax.py
          python3 scripts/verify_pickword_long_click_api34.py
          python3 scripts/verify_pickword_share_close_cleanup.py
          python3 scripts/verify_pickword_unified_cleanup.py
          python3 scripts/verify_result_preview.py
          python3 scripts/verify_changed_module_versions.py --base-ref origin/main
          python3 scripts/verify_update_history.py --require-one-pending
          git diff --check

      - name: Commit verifier update
        shell: bash
        run: |
          set -euo pipefail
          rm -f scripts/apply_pickword_result_preview_verifier_update.py
          rm -f .github/workflows/apply-pickword-result-preview-verifier-update.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/verify_result_preview.py scripts/apply_pickword_result_preview_verifier_update.py .github/workflows/apply-pickword-result-preview-verifier-update.yml
          git commit -m "同步拾字透明浮窗稳定化验证契约"
          git push origin HEAD:fix/pickword-unified-cleanup-20260718
