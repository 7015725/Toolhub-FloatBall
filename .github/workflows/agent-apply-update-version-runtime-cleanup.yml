name: agent-apply-update-version-runtime-cleanup

on:
  push:
    branches:
      - refactor/update-version-dead-code-cleanup
  pull_request:
    branches:
      - main
    types: [opened, reopened, synchronize]

permissions:
  contents: write

concurrency:
  group: agent-apply-update-version-runtime-cleanup
  cancel-in-progress: false

jobs:
  apply:
    if: github.event_name == 'push' || github.event.pull_request.head.ref == 'refactor/update-version-dead-code-cleanup'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout cleanup branch
        uses: actions/checkout@v4
        with:
          ref: refactor/update-version-dead-code-cleanup
          fetch-depth: 0

      - name: Apply bounded runtime cleanup
        run: python3 .agent/apply_update_version_runtime_cleanup.py

      - name: Refresh deterministic audit reports
        run: |
          python3 scripts/report_dead_module_symbols.py --write DEAD_CODE_AUDIT.md
          python3 scripts/report_protected_wrapper_chains.py --write PROTECTED_WRAPPER_AUDIT.md
          python3 scripts/report_dead_module_symbols.py --check DEAD_CODE_AUDIT.md
          python3 scripts/report_protected_wrapper_chains.py --check PROTECTED_WRAPPER_AUDIT.md

      - name: Verify JavaScript and module version
        run: |
          python3 .github/scripts/es5_scan.py
          python3 scripts/verify_js_syntax.py
          python3 scripts/verify_changed_module_versions.py --base-ref origin/main

      - name: Verify update page compatibility boundary
        run: |
          python3 scripts/verify_update_version_page.py
          python3 scripts/verify_module_boundaries.py
          python3 scripts/verify_toolapp_layout.py
          python3 scripts/verify_toolapp_main_thread_affinity.py
          python3 scripts/verify_settings_color_scheme.py
          python3 scripts/verify_settings_color_roles.py

      - name: Verify diff
        run: git diff --check

      - name: Commit runtime cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add code/th_14_panels.js scripts/verify_update_version_page.py DEAD_CODE_AUDIT.md PROTECTED_WRAPPER_AUDIT.md
          if git diff --cached --quiet; then
            echo "No cleanup changes"
            exit 1
          fi
          git commit -m "清理更新与版本旧运行时链路"
          git push origin HEAD:refactor/update-version-dead-code-cleanup
