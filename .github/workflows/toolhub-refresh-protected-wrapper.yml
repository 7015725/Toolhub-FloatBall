name: 刷新受保护包装链报告

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  refresh:
    if: github.head_ref == 'agent/app-picker-cleanup-20260715'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/app-picker-cleanup-20260715
          fetch-depth: 0

      - name: 重新生成并验证报告
        shell: bash
        run: |
          python3 scripts/report_protected_wrapper_chains.py --write PROTECTED_WRAPPER_AUDIT.md
          python3 scripts/report_protected_wrapper_chains.py --check PROTECTED_WRAPPER_AUDIT.md
          rm -f .github/workflows/toolhub-refresh-protected-wrapper.yml
          git diff --check

      - name: 提交生成结果
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m '刷新受保护包装链审查报告'
          git push origin HEAD:agent/app-picker-cleanup-20260715
