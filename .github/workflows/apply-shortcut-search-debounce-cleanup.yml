name: apply-shortcut-search-debounce-cleanup

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]

permissions:
  contents: write
  pull-requests: read

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'fix/shortcut-search-debounce-cleanup-20260716'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout head branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ secrets.TOOLHUB_AUTOMATION_TOKEN || github.token }}

      - name: Apply cleanup
        run: python3 scripts/apply_shortcut_search_debounce_cleanup.py

      - name: Remove temporary executor
        run: |
          rm scripts/apply_shortcut_search_debounce_cleanup.py
          rm .github/workflows/apply-shortcut-search-debounce-cleanup.yml

      - name: Verify focused invariants
        run: |
          git fetch --no-tags origin main
          python3 .github/scripts/es5_scan.py
          python3 scripts/verify_js_syntax.py
          python3 scripts/verify_button_shortcut_thread_affinity.py
          python3 scripts/verify_shortcut_launcher_path.py
          python3 scripts/verify_shortcut_security.py
          python3 scripts/verify_changed_module_versions.py --base-ref origin/main
          git diff --check

      - name: Commit verified cleanup
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add code/th_14_button_shortcut.js scripts/verify_button_shortcut_thread_affinity.py scripts/apply_shortcut_search_debounce_cleanup.py .github/workflows/apply-shortcut-search-debounce-cleanup.yml
          git commit -m "简化快捷方式搜索防抖链路"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
