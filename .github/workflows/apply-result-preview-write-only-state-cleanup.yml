name: apply-result-preview-write-only-state-cleanup

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]

permissions:
  contents: write
  pull-requests: read

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'fix/result-preview-write-only-state-cleanup-20260716'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout head branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ secrets.TOOLHUB_AUTOMATION_TOKEN || github.token }}

      - name: Apply cleanup
        id: apply
        continue-on-error: true
        run: python3 scripts/apply_result_preview_write_only_state_cleanup.py > apply-cleanup.log 2>&1

      - name: Upload apply failure diagnostic
        if: steps.apply.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: result-preview-write-only-state-diagnostic
          path: apply-cleanup.log
          retention-days: 2

      - name: Stop on apply failure
        if: steps.apply.outcome == 'failure'
        run: |
          cat apply-cleanup.log
          exit 1

      - name: Remove temporary executor
        if: steps.apply.outcome == 'success'
        run: |
          rm scripts/apply_result_preview_write_only_state_cleanup.py
          rm .github/workflows/apply-result-preview-write-only-state-cleanup.yml

      - name: Verify focused invariants
        if: steps.apply.outcome == 'success'
        run: |
          git fetch --no-tags origin main
          python3 .github/scripts/es5_scan.py
          python3 scripts/verify_js_syntax.py
          python3 scripts/verify_result_preview.py
          python3 scripts/verify_changed_module_versions.py --base-ref origin/main
          git diff --check

      - name: Commit verified cleanup
        if: steps.apply.outcome == 'success'
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add code/th_21_result_preview.js scripts/verify_result_preview.py scripts/apply_result_preview_write_only_state_cleanup.py .github/workflows/apply-result-preview-write-only-state-cleanup.yml
          git commit -m "清理结果预览写入型状态"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
