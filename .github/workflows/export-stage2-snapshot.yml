name: export-stage2-snapshot

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pack repository snapshot
        shell: bash
        run: |
          set -euo pipefail
          tar --exclude=.git -czf /tmp/toolhub-main-snapshot.tar.gz .

      - name: Upload repository snapshot
        uses: actions/upload-artifact@v4
        with:
          name: toolhub-main-snapshot-stage2
          path: /tmp/toolhub-main-snapshot.tar.gz
          if-no-files-found: error
          retention-days: 1
