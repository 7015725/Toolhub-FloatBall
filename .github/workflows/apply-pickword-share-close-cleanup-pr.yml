name: apply-pickword-share-close-cleanup-pr

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'fix/pickword-share-close-cleanup-20260717'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix/pickword-share-close-cleanup-20260717
          fetch-depth: 0
          token: ${{ secrets.TOOLHUB_AUTOMATION_TOKEN || github.token }}

      - name: Apply guarded cleanup
        run: python3 scripts/apply_pickword_share_close_cleanup.py

      - name: Run focused verification
        shell: bash
        run: |
          python3 .github/scripts/es5_scan.py
          python3 scripts/verify_js_syntax.py
          python3 scripts/verify_pickword_long_click_api34.py
          python3 scripts/verify_pickword_share_close_cleanup.py
          git diff --check

      - name: Commit applied changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -f \
            .github/workflows/apply-pickword-share-close-cleanup.yml \
            .github/workflows/apply-pickword-share-close-cleanup-pr.yml \
            scripts/apply_pickword_share_close_cleanup.py
          git add \
            code/th_20_pickword.js \
            scripts/verify_pickword_share_close_cleanup.py \
            .github/workflows/verify.yml \
            updates/records/fix-pickword-share-close-cleanup.json
          git commit -m "修复拾字分享关闭并清理旧字号代码"
          git push origin HEAD:fix/pickword-share-close-cleanup-20260717
