name: patch-clean-legacy-position-persistence

on:
  push:
    branches:
      - fix/clean-legacy-position-persistence
  pull_request:
    branches:
      - main
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  patch:
    if: github.event_name == 'push' || github.event.pull_request.head.ref == 'fix/clean-legacy-position-persistence'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: fix/clean-legacy-position-persistence
          fetch-depth: 0

      - name: Remove obsolete position persistence
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          module_path = Path('code/th_05_persistence.js')
          text = module_path.read_text(encoding='utf-8')

          old_version = '// @version 1.0.0'
          if text.count(old_version) != 1:
              raise SystemExit('unexpected th_05 version marker')
          text = text.replace(old_version, '// @version 1.0.1', 1)

          old_comment = '''    // 节流或立即保存? 面板拖动结束通常不频繁，立即保存即可
    // 但为了避免连续事件，还是可以复用 savePos 的节流逻辑，或者直接保存
'''
          new_comment = '''    // 面板拖动结束通常不频繁，直接保存配置即可。
'''
          if old_comment not in text:
              raise SystemExit('panel persistence comment baseline changed')
          text = text.replace(old_comment, new_comment, 1)

          start_marker = '// =======================【工具：位置持久化】======================'
          end_marker = '// =======================【工具：配置持久化】======================'
          start = text.find(start_marker)
          end = text.find(end_marker)
          if start < 0 or end < 0 or end <= start:
              raise SystemExit('legacy position persistence section markers missing')
          removed = text[start:end]
          for marker in (
              'FloatBallAppWM.prototype.savePos = function',
              'FloatBallAppWM.prototype.loadSavedPos = function',
              'BALL_POS_X_RATIO',
              'BALL_POS_Y_RATIO',
          ):
              if marker not in removed:
                  raise SystemExit('legacy position section baseline missing: ' + marker)
          text = text[:start] + end_marker + text[end + len(end_marker):]
          if 'FloatBallAppWM.prototype.savePos = function' in text:
              raise SystemExit('savePos remains in th_05')
          if 'FloatBallAppWM.prototype.loadSavedPos = function' in text:
              raise SystemExit('loadSavedPos remains in th_05')
          module_path.write_text(text, encoding='utf-8')

          boundary_path = Path('MODULE_BOUNDARIES.json')
          data = json.loads(boundary_path.read_text(encoding='utf-8'))
          if int(data.get('schema', 0)) != 2:
              raise SystemExit('unexpected boundary schema')

          records = data.get('duplicateDefinitions') or []
          save_record = None
          load_record = None
          kept = []
          for record in records:
              method = str(record.get('method', ''))
              if method == 'savePos':
                  save_record = record
                  continue
              if method == 'loadSavedPos':
                  load_record = record
              kept.append(record)

          if not save_record or save_record.get('definitions') != [
              'th_05_persistence.js', 'th_19_position_state.js'
          ]:
              raise SystemExit('savePos boundary baseline changed')
          if not load_record or load_record.get('definitions') != [
              'th_05_persistence.js', 'th_15_extra.js', 'th_19_position_state.js'
          ]:
              raise SystemExit('loadSavedPos boundary baseline changed')

          load_record['definitions'] = [
              'th_15_extra.js', 'th_19_position_state.js'
          ]
          load_record['type'] = 'temporary_override'
          load_record['reason'] = 'th_15 旧固定位置恢复仍被 th_19 最终实现覆盖'
          data['duplicateDefinitions'] = kept

          direct = data.setdefault('directOwners', {})
          if 'savePos' in direct and direct['savePos'] != 'th_19_position_state.js':
              raise SystemExit('savePos direct owner conflicts')
          direct['savePos'] = 'th_19_position_state.js'

          candidates = data.get('cleanupCandidates') or []
          removed_candidates = []
          next_candidates = []
          for item in candidates:
              key = (str(item.get('module', '')), str(item.get('method', '')))
              if key in {
                  ('th_05_persistence.js', 'savePos'),
                  ('th_05_persistence.js', 'loadSavedPos'),
              }:
                  removed_candidates.append(key)
              else:
                  next_candidates.append(item)
          if sorted(removed_candidates) != sorted([
              ('th_05_persistence.js', 'savePos'),
              ('th_05_persistence.js', 'loadSavedPos'),
          ]):
              raise SystemExit('cleanup candidate baseline changed')
          data['cleanupCandidates'] = next_candidates

          forbidden = data.setdefault('forbiddenDefinitions', {})
          methods = list(forbidden.get('th_05_persistence.js') or [])
          for method in ('savePos', 'loadSavedPos'):
              if method not in methods:
                  methods.append(method)
          forbidden['th_05_persistence.js'] = methods

          boundary_path.write_text(
              json.dumps(data, ensure_ascii=False, indent=2) + '\n',
              encoding='utf-8',
          )
          PY

      - name: Verify cleanup
        shell: bash
        run: |
          python3 scripts/verify_module_boundaries.py
          python3 scripts/verify_js_syntax.py
          python3 scripts/verify_sqlite_persistence.py
          python3 scripts/verify_ball_position_state.py
          python3 scripts/verify_schema_validator.py
          python3 scripts/verify_pointer_issue_85.py
          python3 scripts/verify_pointer_text_release.py
          git diff --check

      - name: Commit cleanup
        shell: bash
        run: |
          rm -f .github/workflows/patch-clean-legacy-position-persistence.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add code/th_05_persistence.js MODULE_BOUNDARIES.json .github/workflows/patch-clean-legacy-position-persistence.yml
          git commit -m "清理旧位置持久化实现"
          git push origin HEAD:fix/clean-legacy-position-persistence
