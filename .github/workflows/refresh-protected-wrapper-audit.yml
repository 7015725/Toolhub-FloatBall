name: Refresh protected wrapper audit

on:
  push:
    branches:
      - agent/fix-pointer-draw-self-heal-20260715

permissions:
  contents: write

jobs:
  refresh:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Regenerate report
        run: |
          python3 scripts/report_protected_wrapper_chains.py --write PROTECTED_WRAPPER_AUDIT.md
          python3 scripts/report_protected_wrapper_chains.py --check PROTECTED_WRAPPER_AUDIT.md

      - name: Commit report
        run: |
          rm -f .github/workflows/refresh-protected-wrapper-audit.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add PROTECTED_WRAPPER_AUDIT.md
          git add -u .github/workflows/refresh-protected-wrapper-audit.yml
          git commit -m "同步受保护包装链审计报告"
          git push origin HEAD
