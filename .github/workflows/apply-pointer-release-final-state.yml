name: apply-pointer-release-final-state

on:
  push:
    branches: [fix/pointer-release-final-state]

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: fix/pointer-release-final-state
          fetch-depth: 0

      - name: Apply patch
        run: python3 scripts/apply_pointer_release_final_state.py

      - name: Commit patch
        shell: bash
        run: |
          if git diff --quiet -- code/th_18_pointer_ocr.js code/th_19_position_state.js ToolHub.js; then
            echo "No source changes required"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add code/th_18_pointer_ocr.js code/th_19_position_state.js ToolHub.js
          git commit -m "修复指针松手最终坐标与补丁竞态"
          git push origin HEAD:fix/pointer-release-final-state
