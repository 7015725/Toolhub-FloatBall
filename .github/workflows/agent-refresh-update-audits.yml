name: agent-refresh-update-audits

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: write

jobs:
  refresh:
    if: github.event.pull_request.head.ref == 'fix/update-version-page'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix/update-version-page
          fetch-depth: 0

      - name: Update audit generators and reports
        run: |
          python3 - <<'PY'
          from pathlib import Path

          dead = Path('scripts/report_dead_module_symbols.py')
          text = dead.read_text(encoding='utf-8')
          old = '    lines.append("2. 当前剩余 11 条受保护包装链均承担明确功能或生命周期职责。")'
          new = '    lines.append("2. 当前剩余 %d 条受保护包装链均承担明确功能或生命周期职责。" % len(protected))'
          if old not in text:
              raise SystemExit('dead audit count anchor missing')
          dead.write_text(text.replace(old, new, 1), encoding='utf-8')

          protected = Path('scripts/report_protected_wrapper_chains.py')
          text = protected.read_text(encoding='utf-8')
          text = text.replace('    "延迟更新包装": 5,\n', '', 1)
          block = '''    "startToolHubModuleUpdateFromSettings": (\n        "延迟更新包装",\n        "继续保留",\n        "早期模块等待设置模块加载后安装包装，依赖 deferred_retry 生命周期。",\n    ),\n'''
          if block not in text:
              raise SystemExit('protected classification anchor missing')
          text = text.replace(block, '', 1)
          text = text.replace('    lines.append("- 继续保留：`%d` 条；这些链承担指针/OCR、生命周期、页面状态或延迟加载职责。" % len(retained))', '    lines.append("- 继续保留：`%d` 条；这些链承担指针/OCR、生命周期或页面状态职责。" % len(retained))', 1)
          text = text.replace('        "延迟更新包装": "继续保留，依赖模块加载顺序",\n', '', 1)
          text = text.replace('    lines.append("2. 当前剩余 11 条包装链全部继续保留，不进入批量收敛流程。")', '    lines.append("2. 当前剩余 %d 条包装链全部继续保留，不进入批量收敛流程。" % len(rows))', 1)
          text = text.replace('    lines.append("3. 指针/OCR、ToolApp 和 deferred wrapper 仅在明确回归证据下重新审查。")', '    lines.append("3. 指针/OCR 与 ToolApp 包装仅在明确回归证据下重新审查。")', 1)
          protected.write_text(text, encoding='utf-8')
          PY
          python3 scripts/report_dead_module_symbols.py --write DEAD_CODE_AUDIT.md
          python3 scripts/report_protected_wrapper_chains.py --write PROTECTED_WRAPPER_AUDIT.md
          python3 scripts/report_dead_module_symbols.py --check DEAD_CODE_AUDIT.md
          python3 scripts/report_protected_wrapper_chains.py --check PROTECTED_WRAPPER_AUDIT.md

      - name: Commit refreshed audits
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/report_dead_module_symbols.py scripts/report_protected_wrapper_chains.py DEAD_CODE_AUDIT.md PROTECTED_WRAPPER_AUDIT.md
          git commit -m "同步更新页代码审计基线"
          git push origin HEAD:fix/update-version-page
