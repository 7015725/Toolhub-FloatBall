name: diagnose-main-panel-grid

on:
  pull_request:
    branches: [main]
    types: [synchronize]

permissions:
  contents: read

jobs:
  diagnose:
    if: github.event.pull_request.head.ref == 'fix/main-panel-grid-sizing-locked-20260714-1156'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: JavaScript syntax
        run: |
          python3 .github/scripts/es5_scan.py
          python3 scripts/verify_js_syntax.py
      - name: Runtime status
        run: python3 scripts/verify_main_panel_runtime_status.py
      - name: Drag sort
        run: python3 scripts/verify_main_panel_drag_sort.py
      - name: Paging
        run: python3 scripts/verify_main_panel_paging.py
      - name: Adaptive layout
        run: python3 scripts/verify_main_panel_adaptive_layout.py
      - name: Grid sizing
        run: python3 scripts/verify_main_panel_grid_sizing.py
      - name: Visual tuning
        run: python3 scripts/verify_main_panel_visual_tuning.py
      - name: Close lifecycle
        run: python3 scripts/verify_main_panel_close_lifecycle.py
      - name: Button direct save
        run: python3 scripts/verify_button_editor_direct_save.py
      - name: Module versions
        run: |
          python3 scripts/verify_module_versions.py
          python3 scripts/verify_changed_module_versions.py
      - name: Documentation
        run: python3 scripts/verify_documentation_consistency.py
      - name: Manifest
        run: |
          python3 scripts/verify_manifest.py
          python3 .github/scripts/verify_manifest_signature.py
