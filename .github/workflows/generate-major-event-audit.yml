name: generate-major-event-audit

on:
  push:
    branches:
      - fix/major-event-severity-filter-20260715

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix/major-event-severity-filter-20260715
          fetch-depth: 0

      - name: Generate dead code audit
        run: |
          python3 scripts/report_dead_module_symbols.py --write DEAD_CODE_AUDIT.md
          python3 scripts/report_dead_module_symbols.py --check DEAD_CODE_AUDIT.md

      - name: Upload generated audit
        uses: actions/upload-artifact@v4
        with:
          name: generated-major-event-dead-code-audit
          path: DEAD_CODE_AUDIT.md
          if-no-files-found: error
          retention-days: 1
