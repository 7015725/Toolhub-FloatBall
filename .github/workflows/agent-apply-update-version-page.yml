name: agent-apply-update-version-page

on:
  push:
    branches:
      - fix/update-version-page
  pull_request:
    branches:
      - main
    types: [opened, reopened, synchronize]

permissions:
  contents: write

concurrency:
  group: agent-apply-update-version-page
  cancel-in-progress: false

jobs:
  apply:
    if: github.event_name == 'push' || github.event.pull_request.head.ref == 'fix/update-version-page'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix/update-version-page
          fetch-depth: 0

      - name: Apply repository migration
        run: |
          set +e
          python3 .agent/apply_update_version_page.py > migration.log 2>&1
          code=$?
          cat migration.log
          echo "$code" > migration.exit
          exit "$code"

      - name: Upload migration log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: update-version-page-migration-log
          path: |
            migration.log
            migration.exit

      - name: Restore workflow files for connector update
        run: git checkout -- .github/workflows

      - name: Verify JavaScript and versions
        run: |
          python3 .github/scripts/es5_scan.py
          python3 scripts/verify_js_syntax.py
          python3 scripts/verify_changed_module_versions.py --base-ref origin/main

      - name: Verify update page and boundaries
        run: |
          python3 scripts/verify_update_version_page.py
          python3 scripts/verify_update_history.py --allow-pending
          python3 scripts/verify_module_boundaries.py
          python3 scripts/verify_toolapp_layout.py
          python3 scripts/verify_toolapp_main_thread_affinity.py

      - name: Verify diff
        run: git diff --check

      - name: Commit migration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No migration changes"
            exit 1
          fi
          git commit -m "新增更新与版本页面"
          git push origin HEAD:fix/update-version-page
