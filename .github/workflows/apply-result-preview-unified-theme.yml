name: apply-result-preview-unified-theme

on:
  push:
    branches:
      - fix/result-preview-unified-theme-20260715
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: fix/result-preview-unified-theme-20260715
          fetch-depth: 0

      - name: Apply patch
        run: python3 scripts/_apply_result_preview_unified_theme.py

      - name: Verify Rhino ES5
        run: python3 .github/scripts/es5_scan.py

      - name: Verify JavaScript syntax
        run: python3 scripts/verify_js_syntax.py

      - name: Verify result preview contracts
        run: python3 scripts/verify_result_preview.py

      - name: Verify pointer contracts
        run: |
          set -o pipefail
          python3 scripts/verify_pointer_regressions.py 2>&1 | tee pointer-regression-output.txt

      - name: Upload pointer regression output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: result-preview-pointer-regression
          path: pointer-regression-output.txt
          if-no-files-found: ignore

      - name: Verify dead code audit
        run: python3 scripts/report_dead_module_symbols.py --check DEAD_CODE_AUDIT.md

      - name: Check whitespace
        run: git diff --check

      - name: Commit source changes
        run: |
          rm -f pointer-regression-output.txt
          rm -f scripts/_apply_result_preview_unified_theme.py
          rm -f .github/workflows/apply-result-preview-unified-theme.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add code/th_21_result_preview.js scripts/verify_result_preview.py scripts/_apply_result_preview_unified_theme.py .github/workflows/apply-result-preview-unified-theme.yml
          git commit -m "统一取字预览主题判断"
          git push origin HEAD:fix/result-preview-unified-theme-20260715
