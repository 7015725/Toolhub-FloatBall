name: export-agent-source

on:
  push:
    branches:
      - agent/fix-pickword-image-lifecycle-cleanup
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
      - name: Upload source snapshot
        uses: actions/upload-artifact@v4
        with:
          name: agent-source-snapshot
          path: |
            .github
            code
            scripts
            ToolHub.js
            manifest.json
            MODULE_BOUNDARIES.json
          include-hidden-files: true
          retention-days: 1
