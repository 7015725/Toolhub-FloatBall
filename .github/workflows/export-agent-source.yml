name: apply-pickword-image-lifecycle-fix

on:
  push:
    branches:
      - fix/pickword-image-lifecycle-cleanup-20260719

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.TOOLHUB_AUTOMATION_TOKEN || github.token }}

      - name: Apply scoped fixes
        shell: bash
        env:
          PATCH_GZ_B64: ''
        run: |
          printf '%s' "$PATCH_GZ_B64" | base64 -d | gzip -d > /tmp/apply.py
          python3 /tmp/apply.py
          python3 scripts/create_update_record.py --id 20260719-pickword-image-lifecycle-cleanup --type fix --title '修复拾字截图清理与缩略图生命周期' --detail '过期分享临时副本仅在实际删除成功后结案，删除失败保留记录供后续重试。' --detail '公共文件删除移出 SQLite 写锁范围，避免 Shell 桥等待期间阻塞图片与设置写入。' --detail '图片尺寸登记不再覆盖已保存公共路径、Content URI 与保存时间。' --detail '截图管理器丢弃并回收过期缩略图任务，已保存按钮会重新校验公共副本。' --detail '保存目录测试忽略页面销毁或输入变化后的过期结果。' --non-interactive

      - name: Verify scoped changes
        shell: bash
        run: |
          set -eo pipefail
          python3 .github/scripts/es5_scan.py
          python3 scripts/verify_js_syntax.py
          python3 scripts/verify_pickword_image_viewer.py
          python3 scripts/verify_screenshot_manager.py
          python3 scripts/verify_sqlite_storage.py
          python3 scripts/verify_sqlite_debounce_race.py
          python3 scripts/verify_toolapp_layout.py
          python3 scripts/verify_toolapp_main_thread_affinity.py
          python3 scripts/verify_pickword_image_meta_handoff.py
          python3 scripts/verify_settings_color_scheme.py
          python3 scripts/verify_coloros_rhino_color_safety.py
          python3 scripts/verify_rhino_color_api_safety.py
          python3 scripts/verify_module_boundaries.py
          git diff --check

      - name: Commit fixes and remove bootstrap workflow
        shell: bash
        env:
          TOOLHUB_AUTOMATION_TOKEN: ${{ secrets.TOOLHUB_AUTOMATION_TOKEN }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git rm .github/workflows/export-agent-source.yml
          git add code/th_13_panel_ui.js code/th_22_image_viewer.js code/th_23_screenshot_manager.js scripts/verify_pickword_image_viewer.py scripts/verify_screenshot_manager.py updates/records/20260719-pickword-image-lifecycle-cleanup.json
          git commit -m '修复拾字截图清理与缩略图生命周期'
          if [ -n "$TOOLHUB_AUTOMATION_TOKEN" ]; then
            git remote set-url origin "https://x-access-token:${TOOLHUB_AUTOMATION_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          fi
          git push origin "HEAD:${GITHUB_REF_NAME}"
