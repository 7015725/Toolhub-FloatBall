name: apply-screenshot-manager-saved-fix

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize, ready_for_review]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: apply-screenshot-manager-saved-fix-${{ github.event.pull_request.number || github.ref_name }}
  cancel-in-progress: true

jobs:
  apply:
    name: apply-screenshot-manager-saved-fix
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.pull_request.base.ref == 'main' &&
        github.event.pull_request.head.repo.full_name == github.repository &&
        github.event.pull_request.head.ref == 'fix/screenshot-manager-saved-records'
      )
    runs-on: ubuntu-latest
    env:
      TARGET_BRANCH: ${{ github.event.pull_request.head.ref || github.ref_name }}
    steps:
      - name: Checkout fix branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          fetch-depth: 0
          token: ${{ secrets.TOOLHUB_AUTOMATION_TOKEN || github.token }}
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Apply screenshot manager source fix
        run: python3 .github/scripts/apply_screenshot_manager_saved_fix_core.py

      - name: Synchronize image viewer regression version
        run: python3 .github/scripts/sync_pickword_viewer_verifier.py

      - name: Fetch main baseline
        run: git fetch --no-tags origin main

      - name: Verify changed module versions
        run: python3 scripts/verify_changed_module_versions.py --base-ref origin/main

      - name: Verify pending update record
        run: python3 scripts/verify_update_history.py --require-one-pending

      - name: Verify ES5 scan
        run: python3 .github/scripts/es5_scan.py

      - name: Verify JavaScript syntax
        run: python3 scripts/verify_js_syntax.py

      - name: Verify image viewer
        run: python3 scripts/verify_pickword_image_viewer.py

      - name: Verify screenshot manager
        run: python3 scripts/verify_screenshot_manager.py

      - name: Verify module boundaries
        run: python3 scripts/verify_module_boundaries.py

      - name: Verify whitespace
        run: git diff --check

      - name: Remove one-shot patch files
        shell: bash
        run: |
          rm -f .github/scripts/apply_screenshot_manager_saved_fix.py
          rm -f .github/scripts/apply_screenshot_manager_saved_fix_core.py
          rm -f .github/scripts/sync_pickword_viewer_verifier.py
          rm -f .github/screenshot_manager_fix_error.txt
          rm -f .github/workflows/apply-screenshot-manager-saved-fix.yml

      - name: Commit applied source fix
        shell: bash
        env:
          TOOLHUB_AUTOMATION_TOKEN: ${{ secrets.TOOLHUB_AUTOMATION_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No source changes to commit"
            exit 0
          fi
          git commit -m "修复截图管理已保存记录状态"
          if [ -n "$TOOLHUB_AUTOMATION_TOKEN" ]; then
            git remote set-url origin "https://x-access-token:${TOOLHUB_AUTOMATION_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          fi
          git push origin "HEAD:${TARGET_BRANCH}"
