name: apply-module-version-baseline

on:
  push:
    branches:
      - fix/module-version-baseline

permissions:
  contents: write

concurrency:
  group: apply-module-version-baseline
  cancel-in-progress: true

jobs:
  apply:
    if: ${{ !contains(github.event.head_commit.message, '应用模块版本基线') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: fix/module-version-baseline
          fetch-depth: 0

      - name: Apply and verify
        run: |
          python3 scripts/apply_module_version_baseline.py
          python3 -m py_compile scripts/generate_signed_manifest.py scripts/verify_module_versions.py
          python3 .github/scripts/es5_scan.py
          python3 scripts/verify_js_syntax.py
          grep -q '^// @version 1.0.0' code/th_14_button_icon_editor.js
          grep -q '^// @version 1.0.0' code/th_14_schema_editor.js
          grep -q 'if module_version == "0.0.0"' scripts/generate_signed_manifest.py
          git diff --check

      - name: Commit generated files
        run: |
          if git diff --quiet -- code/th_14_button_icon_editor.js code/th_14_schema_editor.js scripts/generate_signed_manifest.py; then
            echo "Module version baseline already current"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add code/th_14_button_icon_editor.js code/th_14_schema_editor.js scripts/generate_signed_manifest.py
          git commit -m "应用模块版本基线"
          git push origin HEAD:fix/module-version-baseline
