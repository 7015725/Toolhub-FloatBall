name: apply-pointer-hover-stable-time

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: apply-pointer-hover-stable-time
  cancel-in-progress: false

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repair branch
        uses: actions/checkout@v4
        with:
          ref: fix/pointer-hover-stable-time
          fetch-depth: 0

      - name: Apply stable hover patch
        run: python3 scripts/apply_pointer_hover_stable_time.py

      - name: Validate source
        shell: bash
        run: |
          set +e
          log=scripts/pointer_hover_stable_validation.log
          : > "$log"
          failed=0
          for cmd in \
            "python3 scripts/verify_ball_position_state.py" \
            "python3 scripts/verify_schema_validator.py" \
            "python3 scripts/verify_pointer_issue_85.py" \
            "python3 .github/scripts/es5_scan.py" \
            "git diff --check"
          do
            echo "### $cmd" | tee -a "$log"
            bash -lc "$cmd" >> "$log" 2>&1
            status=$?
            echo "status=$status" | tee -a "$log"
            if [ "$status" -ne 0 ]; then failed=1; fi
          done
          cat "$log"
          if [ "$failed" -ne 0 ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add "$log"
            git commit -m "记录稳定悬停校验错误" || true
            git push origin HEAD:fix/pointer-hover-stable-time || true
            exit 1
          fi

      - name: Commit repair
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f scripts/pointer_hover_stable_validation.log
          git add code/th_17_pointer.js scripts/verify_ball_position_state.py
          if git diff --cached --quiet; then
            echo "No repair changes required"
            exit 0
          fi
          git commit -m "修复异步候选丢失稳定悬停时间"
          git push origin HEAD:fix/pointer-hover-stable-time
