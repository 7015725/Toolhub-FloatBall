name: finalize-beta-update-channel-once

on:
  push:
    branches: [agent/beta-update-channel]
    paths:
      - .github/workflows/finalize-beta-update-channel-once.yml

permissions:
  contents: read

concurrency:
  group: finalize-beta-update-channel-once
  cancel-in-progress: true

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: agent/beta-update-channel
          fetch-depth: 0
          persist-credentials: false

      - name: Regenerate audit and remove temporary hooks
        shell: bash
        run: |
          python3 scripts/report_dead_module_symbols.py --write docs/audits/DEAD_CODE_AUDIT.md
          python3 - <<'PY'
          import re
          from pathlib import Path

          path = Path('.github/workflows/sign-toolhub.yml')
          text = path.read_text(encoding='utf-8')
          pattern = re.compile(
              r'\n      - name: Apply Beta channel review fixes\n.*?(?=\n      - name: Verify changed module versions\n)',
              re.S,
          )
          text, count = pattern.subn('', text)
          if count != 1:
              raise SystemExit('temporary sign workflow hook not found exactly once')
          path.write_text(text, encoding='utf-8')
          PY
          rm -f .github/workflows/fix-beta-update-channel-review-once.yml
          rm -f scripts/fix_beta_update_channel_review_once.py
          rm -f .github/workflows/finalize-beta-update-channel-once.yml

      - name: Validate finalized repository
        shell: bash
        run: |
          python3 scripts/report_dead_module_symbols.py --check docs/audits/DEAD_CODE_AUDIT.md
          python3 scripts/verify_workflow_script_references.py
          python3 scripts/verify_repository_layout.py
          python3 scripts/verify_constraint_registry.py
          python3 scripts/verify_code_constraints.py --output final-code-constraint-report.json
          python3 .github/scripts/es5_scan.py
          python3 scripts/verify_js_syntax.py
          python3 scripts/verify_module_boundaries.py
          git diff --check

      - name: Commit finalized implementation
        env:
          TOOLHUB_AUTOMATION_TOKEN: ${{ secrets.TOOLHUB_AUTOMATION_TOKEN }}
        shell: bash
        run: |
          if [ -z "$TOOLHUB_AUTOMATION_TOKEN" ]; then
            echo "TOOLHUB_AUTOMATION_TOKEN is empty"
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "收口 Beta 更新通道实现与审计基线"
          git remote set-url origin "https://x-access-token:${TOOLHUB_AUTOMATION_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin HEAD:agent/beta-update-channel
