name: amend-pointer-final-scan-budget-fix

on:
  pull_request:
    branches: [main]
    types: [synchronize]

permissions:
  contents: write

jobs:
  amend:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'fix/pointer-final-scan-budget-20260715'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/pointer-final-scan-budget-20260715
          fetch-depth: 0
          token: ${{ github.token }}
      - run: python3 scripts/_amend_pointer_final_scan_budget_fix.py
      - run: |
          rm -f scripts/_amend_pointer_final_scan_budget_fix.py
          rm -f .github/workflows/amend-pointer-final-scan-budget-fix.yml
      - run: python3 .github/scripts/es5_scan.py
      - run: python3 scripts/verify_js_syntax.py
      - run: |
          python3 - <<'PY'
          import importlib.util
          from pathlib import Path
          path = Path('scripts/verify_pointer_regressions.py')
          spec = importlib.util.spec_from_file_location('pointer_verify', str(path))
          module = importlib.util.module_from_spec(spec)
          spec.loader.exec_module(module)
          module.verify_manifest = lambda result: None
          raise SystemExit(module.main())
          PY
      - run: git diff --check
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "收紧指针最终扫描回退边界"
          git push origin HEAD:fix/pointer-final-scan-budget-20260715
