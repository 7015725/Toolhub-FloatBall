name: apply-pointer-text-hover-credential

on:
  push:
    branches:
      - fix/pointer-text-hover-credential

permissions:
  contents: write

concurrency:
  group: apply-pointer-text-hover-credential
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout patch branch
        uses: actions/checkout@v4
        with:
          ref: fix/pointer-text-hover-credential
          fetch-depth: 0
          token: ${{ secrets.TOOLHUB_AUTOMATION_TOKEN || github.token }}

      - name: Apply independent hover credential
        run: python3 .github/scripts/apply_pointer_text_hover_credential.py

      - name: Run focused verification
        run: |
          python3 .github/scripts/es5_scan.py
          python3 scripts/verify_js_syntax.py
          python3 scripts/verify_ball_position_state.py
          python3 scripts/verify_pointer_issue_85.py
          python3 scripts/verify_pointer_text_release.py
          python3 scripts/verify_schema_validator.py
          git diff --check

      - name: Commit source changes
        env:
          TOOLHUB_AUTOMATION_TOKEN: ${{ secrets.TOOLHUB_AUTOMATION_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "恢复取字悬停凭证门槛"
          if [ -n "$TOOLHUB_AUTOMATION_TOKEN" ]; then
            git remote set-url origin "https://x-access-token:${TOOLHUB_AUTOMATION_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          fi
          git push origin HEAD:fix/pointer-text-hover-credential
