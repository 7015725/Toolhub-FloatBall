name: finalize-entry-symbol-audit-once

on:
  push:
    branches: [agent/beta-update-channel]
    paths:
      - .github/workflows/finalize-entry-symbol-audit-once.yml
  pull_request:
    branches: [main]
    types: [synchronize]

permissions:
  contents: read

concurrency:
  group: finalize-entry-symbol-audit-once
  cancel-in-progress: false

jobs:
  finalize:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.ref == 'agent/beta-update-channel'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: agent/beta-update-channel
          fetch-depth: 0
          persist-credentials: false

      - name: Regenerate entry symbol audit
        shell: bash
        run: |
          python3 scripts/report_entry_symbols.py --write docs/audits/ENTRY_SYMBOL_AUDIT.md
          python3 - <<'PY'
          from pathlib import Path

          current = 'var TOOLHUB_ENTRY_VERSION = 20260721201500;'
          obsolete = (
              'var TOOLHUB_ENTRY_VERSION = 20260719024500;',
              'var TOOLHUB_ENTRY_VERSION = 20260721193000;',
          )
          changed = []
          for path in sorted(Path('scripts').glob('*.py')):
              text = path.read_text(encoding='utf-8')
              updated = text
              for old in obsolete:
                  updated = updated.replace(old, current)
              if updated != text:
                  path.write_text(updated, encoding='utf-8')
                  changed.append(str(path))
          print('updated entry-version assertions: ' + (', '.join(changed) if changed else 'none'))
          PY
          rm -f .github/workflows/finalize-entry-symbol-audit-once.yml

      - name: Run complete ToolHub verification chain
        shell: bash
        run: |
          set -eo pipefail
          stage_file="entry-symbol-verification-stage.txt"
          run_check() {
            printf '%s\n' "$*" > "$stage_file"
            "$@"
          }
          run_check python3 .github/scripts/es5_scan.py
          run_check python3 scripts/verify_js_syntax.py
          run_check python3 scripts/report_entry_symbols.py --check docs/audits/ENTRY_SYMBOL_AUDIT.md
          run_check python3 scripts/verify_entry_redundancy_cleanup.py
          run_check python3 scripts/verify_entry_writable_probe.py
          run_check python3 scripts/verify_sqlite_storage.py
          run_check python3 scripts/verify_sqlite_debounce_race.py
          run_check python3 scripts/verify_ball_position_state.py
          run_check python3 scripts/verify_animation_callback_safety.py
          run_check python3 scripts/verify_ball_rebuild_rollback.py
          run_check python3 scripts/verify_toolapp_layout.py
          run_check python3 scripts/verify_toolapp_main_thread_affinity.py
          run_check python3 scripts/verify_settings_color_scheme.py
          run_check python3 scripts/verify_legacy_theme_cleanup.py
          run_check python3 scripts/verify_settings_color_roles.py
          run_check python3 scripts/verify_coloros_rhino_color_safety.py
          run_check python3 scripts/verify_rhino_color_api_safety.py
          run_check python3 scripts/verify_button_editor_layout.py
          run_check python3 scripts/verify_button_editor_direct_save.py
          run_check python3 scripts/verify_button_shortcut_thread_affinity.py
          run_check python3 scripts/verify_schema_validator.py
          run_check python3 scripts/verify_pickword_translate_settings.py
          run_check python3 scripts/verify_pickword_long_click_api34.py
          run_check python3 scripts/verify_pickword_share_close_cleanup.py
          run_check python3 scripts/verify_pickword_unified_cleanup.py
          run_check python3 scripts/verify_pickword_emoji_grapheme.py
          run_check python3 scripts/verify_entry_lifecycle.py
          run_check python3 scripts/verify_atomic_update.py
          run_check python3 scripts/verify_release_transaction.py
          run_check python3 scripts/verify_startup_status.py
          run_check python3 scripts/verify_main_panel_runtime_status.py
          run_check python3 scripts/verify_main_panel_drag_sort.py
          run_check python3 scripts/verify_main_panel_more_menu.py
          run_check python3 scripts/verify_main_panel_paging.py
          run_check python3 scripts/verify_main_panel_adaptive_layout.py
          run_check python3 scripts/verify_panel_layout_settings_cleanup.py
          run_check python3 scripts/verify_legacy_main_panel_cleanup.py
          run_check python3 scripts/verify_main_panel_grid_sizing.py
          run_check python3 scripts/verify_main_panel_visual_tuning.py
          run_check python3 scripts/verify_main_panel_close_lifecycle.py
          run_check python3 scripts/verify_update_security_mode.py
          run_check python3 scripts/verify_shell_bridge_security.py
          run_check python3 scripts/verify_shell_log_redaction.py
          run_check python3 scripts/verify_shortcut_security.py
          run_check python3 scripts/verify_content_security.py
          run_check python3 scripts/verify_major_event_logging.py
          run_check python3 scripts/verify_manifest.py
          run_check python3 scripts/verify_module_versions.py
          run_check python3 scripts/verify_changed_module_versions.py
          run_check python3 scripts/verify_documentation_consistency.py
          run_check python3 scripts/verify_github_only_source.py
          run_check python3 scripts/verify_pointer_regressions.py
          run_check python3 scripts/verify_result_preview.py
          run_check python3 scripts/verify_pickword_image_viewer.py
          run_check python3 scripts/verify_pickword_image_meta_handoff.py
          run_check python3 scripts/verify_screenshot_manager.py
          run_check python3 .github/scripts/verify_manifest_signature.py
          run_check git diff --check
          printf '%s\n' PASS > "$stage_file"

      - name: Upload verification stage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: entry-symbol-verification-stage
          path: |
            entry-symbol-verification-stage.txt
            docs/audits/ENTRY_SYMBOL_AUDIT.md
          if-no-files-found: error
          retention-days: 3

      - name: Commit finalized audit
        env:
          TOOLHUB_AUTOMATION_TOKEN: ${{ secrets.TOOLHUB_AUTOMATION_TOKEN }}
        shell: bash
        run: |
          if [ -z "$TOOLHUB_AUTOMATION_TOKEN" ]; then
            echo "TOOLHUB_AUTOMATION_TOKEN is empty"
            exit 1
          fi
          rm -f entry-symbol-verification-stage.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "同步 Beta 更新通道入口符号审计"
          git remote set-url origin "https://x-access-token:${TOOLHUB_AUTOMATION_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin HEAD:agent/beta-update-channel
