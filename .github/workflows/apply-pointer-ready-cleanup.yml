name: apply pointer ready cleanup

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: apply-pointer-ready-cleanup
  cancel-in-progress: true

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    environment: signing
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: agent/cleanup-pointer-ready-redundancy
          fetch-depth: 0
          token: ${{ secrets.TOOLHUB_AUTOMATION_TOKEN || github.token }}
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Apply cleanup
        run: python3 .github/scripts/cleanup_pointer_ready_redundancy.py

      - name: Install signing key
        shell: bash
        env:
          TOOLHUB_SIGNING_PRIVATE_KEY_PEM: ${{ secrets.TOOLHUB_SIGNING_PRIVATE_KEY_PEM }}
        run: |
          if [ -z "$TOOLHUB_SIGNING_PRIVATE_KEY_PEM" ]; then
            echo "TOOLHUB_SIGNING_PRIVATE_KEY_PEM is empty"
            exit 1
          fi
          mkdir -p "$HOME/.hermes/toolhub_signing"
          printf '%s\n' "$TOOLHUB_SIGNING_PRIVATE_KEY_PEM" > "$HOME/.hermes/toolhub_signing/private_key.pem"
          chmod 600 "$HOME/.hermes/toolhub_signing/private_key.pem"

      - name: Generate signed manifest
        shell: bash
        run: |
          python3 scripts/generate_signed_manifest.py --yes \
            --title "清理指针就绪链路冗余代码" \
            --change "移除已停用的绿色候选缓存与就绪快照提交链"

      - name: Verify ES5
        run: python3 .github/scripts/es5_scan.py

      - name: Verify pointer position state
        shell: bash
        run: |
          set -o pipefail
          python3 scripts/verify_ball_position_state.py 2>&1 | tee pointer-ready-cleanup.log

      - name: Upload cleanup assertion log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pointer-ready-cleanup-log
          path: pointer-ready-cleanup.log
          if-no-files-found: error
          retention-days: 1

      - name: Verify pointer issue 85
        run: python3 scripts/verify_pointer_issue_85.py

      - name: Verify pointer text release
        run: python3 scripts/verify_pointer_text_release.py

      - name: Verify manifest and signature
        shell: bash
        run: |
          python3 scripts/verify_manifest.py
          python3 .github/scripts/verify_manifest_signature.py

      - name: Verify remaining checks
        shell: bash
        run: |
          python3 scripts/verify_sqlite_persistence.py
          python3 scripts/verify_button_icon_blob.py
          python3 scripts/verify_toolapp_single_root.py
          python3 scripts/verify_toolapp_adaptive_size.py
          python3 scripts/verify_button_editor_layout.py
          python3 scripts/verify_schema_validator.py
          git diff --check

      - name: Commit cleanup
        shell: bash
        env:
          TOOLHUB_AUTOMATION_TOKEN: ${{ secrets.TOOLHUB_AUTOMATION_TOKEN }}
        run: |
          if [ -z "$TOOLHUB_AUTOMATION_TOKEN" ]; then
            echo "TOOLHUB_AUTOMATION_TOKEN is empty"
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            code/th_17_pointer.js \
            code/th_19_position_state.js \
            ToolHub.js \
            ToolHub.js.sha256 \
            manifest.json \
            manifest.sig \
            scripts/verify_ball_position_state.py \
            scripts/verify_pointer_text_release.py
          git commit -m "清理指针就绪链路冗余代码"
          git remote set-url origin "https://x-access-token:${TOOLHUB_AUTOMATION_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin "HEAD:agent/cleanup-pointer-ready-redundancy"
