name: apply-channel-switch-update-discovery

on:
  push:
    branches: [fix/channel-switch-update-discovery]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-channel-switch-update-discovery
  cancel-in-progress: true

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: fix/channel-switch-update-discovery
          fetch-depth: 0
          token: ${{ secrets.TOOLHUB_AUTOMATION_TOKEN || github.token }}
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Apply and verify
        shell: bash
        run: |
          set -eo pipefail
          python3 scripts/apply_channel_switch_update_discovery_once.py
          python3 .github/scripts/es5_scan.py
          python3 scripts/verify_js_syntax.py
          python3 scripts/verify_update_version_page.py
          python3 scripts/verify_update_history.py --require-one-pending
          python3 scripts/verify_code_constraints.py --output channel-switch-constraints.json
          rm -f channel-switch-constraints.json
          git diff --check

      - name: Commit
        shell: bash
        env:
          TOOLHUB_AUTOMATION_TOKEN: ${{ secrets.TOOLHUB_AUTOMATION_TOKEN }}
        run: |
          if [ -z "$TOOLHUB_AUTOMATION_TOKEN" ]; then
            echo "TOOLHUB_AUTOMATION_TOKEN is empty"
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "增强通道切换后的更新发现提示"
          git remote set-url origin "https://x-access-token:${TOOLHUB_AUTOMATION_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin HEAD:fix/channel-switch-update-discovery
