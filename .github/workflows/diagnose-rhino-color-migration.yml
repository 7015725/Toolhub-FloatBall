name: diagnose-rhino-color-migration

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    name: check-${{ matrix.script }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        script:
          - verify_toolapp_layout.py
          - verify_settings_color_scheme.py
          - verify_legacy_theme_cleanup.py
          - verify_settings_color_roles.py
          - verify_coloros_rhino_color_safety.py
          - verify_rhino_color_api_safety.py
          - verify_button_editor_layout.py
          - verify_schema_validator.py
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          show-progress: false

      - name: Apply migration
        run: python3 scripts/apply_rhino_color_api_full_migration.py

      - name: Run check
        run: python3 scripts/${{ matrix.script }}
