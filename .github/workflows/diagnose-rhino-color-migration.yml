name: diagnose-rhino-color-migration

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  scan:
    name: scan-${{ matrix.file }}-${{ matrix.kind }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        file: [th_04_theme.js, th_14_button_shortcut.js]
        kind: [setColor, setStroke, setTextColor, setColorFilter, colorStateList, addState, colorMethod]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          show-progress: false

      - name: Apply migration
        run: python3 scripts/apply_rhino_color_api_full_migration.py

      - name: Scan category
        env:
          MODULE_FILE: ${{ matrix.file }}
          CHECK_KIND: ${{ matrix.kind }}
        run: python3 scripts/verify_rhino_color_api_safety.py
