name: apply-pointer-scan-partial-log-fix

on:
  pull_request:
    branches: [main]
    types: [opened]

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'fix/pointer-scan-partial-log-20260715'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/pointer-scan-partial-log-20260715
          fetch-depth: 0
          token: ${{ github.token }}
      - run: python3 scripts/_apply_pointer_scan_partial_log_fix.py
      - run: |
          rm -f scripts/_apply_pointer_scan_partial_log_fix.py
          rm -f .github/workflows/apply-pointer-scan-partial-log-fix.yml
      - run: python3 .github/scripts/es5_scan.py
      - run: python3 scripts/verify_js_syntax.py
      - run: |
          python3 - <<'PY'
          import importlib.util
          from pathlib import Path
          path = Path('scripts/verify_pointer_regressions.py')
          spec = importlib.util.spec_from_file_location('pointer_verify', str(path))
          module = importlib.util.module_from_spec(spec)
          spec.loader.exec_module(module)
          module.verify_manifest = lambda result: None
          raise SystemExit(module.main())
          PY
      - run: python3 scripts/report_dead_module_symbols.py --check DEAD_CODE_AUDIT.md
      - run: git diff --check
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "修正指针扫描超时分类与日志换行"
          git push origin HEAD:fix/pointer-scan-partial-log-20260715
