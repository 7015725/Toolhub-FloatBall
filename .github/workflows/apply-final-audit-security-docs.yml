name: apply-final-audit-security-docs

on:
  push:
    branches:
      - fix/final-audit-security-docs

permissions:
  contents: write

concurrency:
  group: apply-final-audit-security-docs
  cancel-in-progress: true

jobs:
  apply:
    if: ${{ !contains(github.event.head_commit.message, '应用最终复审安全与文档修复') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: fix/final-audit-security-docs
          fetch-depth: 0

      - name: Apply and verify
        run: |
          python3 scripts/apply_final_audit_security_docs.py
          python3 scripts/verify_update_security_mode.py
          python3 scripts/verify_documentation_consistency.py
          python3 .github/scripts/es5_scan.py
          python3 scripts/verify_js_syntax.py
          python3 scripts/verify_module_versions.py
          git diff --check

      - name: Commit generated changes
        run: |
          if git diff --quiet; then
            echo "Final audit patch already current"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ToolHub.js README.md ARCHITECTURE.md STRUCTURE.md SQLITE_STORAGE.md .github/workflows/verify.yml
          git commit -m "应用最终复审安全与文档修复"
          git push origin HEAD:fix/final-audit-security-docs
