name: One-shot screenshot cache recovery

on:
  pull_request:
    types:
      - synchronize

permissions:
  contents: write

jobs:
  apply:
    if: >
      github.event.pull_request.draft == true &&
      github.event.pull_request.head.ref == 'fix/screenshot-cache-recovery'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout recovery branch
        uses: actions/checkout@v4
        with:
          ref: fix/screenshot-cache-recovery
          fetch-depth: 0

      - name: Apply exact business patch
        run: python3 scripts/oneshot_screenshot_cache_cleanup.py

      - name: JavaScript syntax
        run: |
          node --check code/th_22_image_viewer.js
          node --check code/th_23_screenshot_manager.js

      - name: Screenshot image viewer verification
        run: python3 scripts/verify_pickword_image_viewer.py

      - name: Screenshot manager verification
        run: python3 scripts/verify_screenshot_manager.py

      - name: Strict ES5 token check
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          for path in (Path('code/th_22_image_viewer.js'), Path('code/th_23_screenshot_manager.js')):
              text = path.read_text(encoding='utf-8')
              for token in (r'\blet\b', r'\bconst\b', r'=>', r'`'):
                  if re.search(token, text):
                      raise SystemExit('FAIL ES5 %s token=%s' % (path, token))
          print('OK strict ES5')
          PY

      - name: Remove temporary executor files
        run: |
          rm -f scripts/oneshot_screenshot_cache_cleanup.py
          rm -f .github/workflows/oneshot-screenshot-cache-cleanup-pr.yml

      - name: Validate atomic recovery diff
        run: |
          git add -A
          printf '%s\n' \
            .github/workflows/oneshot-screenshot-cache-cleanup-pr.yml \
            code/th_22_image_viewer.js \
            code/th_23_screenshot_manager.js \
            scripts/oneshot_screenshot_cache_cleanup.py \
            scripts/verify_pickword_image_viewer.py \
            scripts/verify_screenshot_manager.py \
            updates/records/20260720-screenshot-cache-lifecycle-cleanup.json \
            | sort > /tmp/expected-files
          git diff --cached --name-only | sort > /tmp/actual-files
          diff -u /tmp/expected-files /tmp/actual-files
          test ! -e scripts/oneshot_screenshot_cache_cleanup.py
          test ! -e .github/workflows/oneshot-screenshot-cache-cleanup-pr.yml
          git diff --cached --check

      - name: Commit and push recovery
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m "fix: close screenshot thumbnail cache lifecycle"
          git push origin HEAD:fix/screenshot-cache-recovery
