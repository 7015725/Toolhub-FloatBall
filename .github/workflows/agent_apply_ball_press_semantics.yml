name: Apply ball press feedback semantics

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]

permissions:
  contents: write
  pull-requests: read

jobs:
  apply:
    if: >
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'fix/ball-press-feedback-semantics-20260715'
    runs-on: ubuntu-latest
    environment: signing
    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: fix/ball-press-feedback-semantics-20260715
          fetch-depth: 0
          token: ${{ secrets.TOOLHUB_AUTOMATION_TOKEN || github.token }}
          persist-credentials: false

      - name: Apply targeted migration
        run: python3 scripts/apply_ball_press_feedback_semantics.py

      - name: Commit source changes and remove temporary executor
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/agent_apply_ball_press_semantics.yml
          git rm scripts/apply_ball_press_feedback_semantics.py
          git add code/th_01_base.js code/th_04_theme.js scripts/verify_coloros_rhino_color_safety.py
          git commit -m "修复悬浮球按压反馈默认值语义"

      - name: Verify committed changes
        shell: bash
        run: |
          git fetch --no-tags origin main
          python3 scripts/verify_changed_module_versions.py --base-ref origin/main
          python3 scripts/verify_coloros_rhino_color_safety.py
          python3 scripts/verify_rhino_color_api_safety.py
          python3 scripts/verify_settings_color_scheme.py
          python3 scripts/verify_settings_color_roles.py
          python3 .github/scripts/es5_scan.py
          python3 scripts/verify_js_syntax.py
          git diff --check origin/main...HEAD

      - name: Push source commit
        shell: bash
        env:
          TOOLHUB_AUTOMATION_TOKEN: ${{ secrets.TOOLHUB_AUTOMATION_TOKEN }}
        run: |
          if [ -z "$TOOLHUB_AUTOMATION_TOKEN" ]; then
            echo "TOOLHUB_AUTOMATION_TOKEN is empty"
            exit 1
          fi
          git remote set-url origin "https://x-access-token:${TOOLHUB_AUTOMATION_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin "HEAD:fix/ball-press-feedback-semantics-20260715"
