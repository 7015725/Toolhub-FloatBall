name: update-readme-main-panel-docs

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  update:
    if: github.event.pull_request.head.ref == 'docs/readme-main-panel-settings-20260714'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ secrets.TOOLHUB_AUTOMATION_TOKEN || github.token }}
          persist-credentials: false

      - name: Update README
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('README.md')
          text = path.read_text(encoding='utf-8')

          old_core = '- 主按钮面板采用可配置自适应网格，宽度占比只用于确定列数预算，由卡片、精确间距和可视行数计算网格，再由网格决定面板宽高；WindowManager 使用同一精确尺寸，避免右侧额外空白；布局支持 35%～100% 宽度预算、最多 10 列、48～200dp 分列参考宽度和 48～160dp 按钮高度；主面板按悬浮球停靠边缘自动展开，球与面板距离支持 0dp；默认背景透明度为 0.92，并继续支持实时运行状态、拖动排序、分页吸附、新增和编辑按钮直接保存、单页隐藏分页圆点和关闭闪烁。'
          new_core = '''- 主按钮面板采用可配置自适应网格：宽度占比只用于确定列数预算，网格根据卡片尺寸、精确间距和可视行数计算，面板与 WindowManager 使用同一精确宽高，避免右侧额外空白。
          - 主面板支持实时运行状态、拖动排序、分页吸附、新增和编辑按钮直接保存、单页隐藏分页圆点和关闭闪烁；默认背景透明度为 0.92。'''
          if old_core not in text:
              raise SystemExit('README core capability anchor missing')
          text = text.replace(old_core, new_core, 1)

          old_example = '''BALL_SIZE_DP          integer  45
          PANEL_BG_ALPHA        real     0.85
          ENABLE_ANIMATIONS     boolean  1
          BALL_POSITION_SIDE    text     right
          THEME_DAY_BG_HEX      null'''
          new_example = '''BALL_SIZE_DP          integer  45
          PANEL_BG_ALPHA        real     0.92
          PANEL_WIDTH_PERCENT   integer  90
          BALL_PANEL_GAP_DP     integer  10
          ENABLE_ANIMATIONS     boolean  1
          BALL_POSITION_SIDE    text     right'''
          if old_example not in text:
              raise SystemExit('README SQLite example anchor missing')
          text = text.replace(old_example, new_example, 1)

          anchor = '''---

          ## 按钮动作'''
          section = '''---

          ## 主面板布局与吸边

          ### 布局计算

          主面板采用“网格决定面板宽高”的尺寸链：

          ```text
          安全区域与宽度占比
                  ↓
          计算可用宽度预算和实际列数
                  ↓
          计算卡片宽度、精确间距与网格宽高
                  ↓
          由网格反推面板宽高
                  ↓
          WindowManager 使用同一精确尺寸
          ```

          宽度占比只决定可用预算，不会直接把面板拉伸到对应屏幕宽度。最后一行按钮不足一整行时，只保留正常的空网格槽位，不会额外扩大面板右侧。

          | 设置项 | 有效范围 | 默认值 | 说明 |
          |---|---:|---:|---|
          | 主面板宽度占比 | 35%～100% | 90% | 用于计算列数的宽度预算 |
          | 自动最大列数 | 1～10 | 6 | 实际列数仍受安全宽度和按钮宽度限制 |
          | 按钮最小宽度 | 48～200dp | 92dp | 自动分列使用的参考最小宽度 |
          | 按钮高度 | 48～160dp | 78dp | 卡片固定高度 |
          | 面板可视行数 | 1～10 | 4 | 超出后按页滚动 |
          | 按钮间距 | 4～24dp | 8dp | 奇数像素会拆分为前后精确间距 |
          | 面板内边距 | 8～32dp | 12dp | 参与最终面板宽度计算 |
          | 球与面板距离 | 0～50dp | 10dp | `0dp` 是有效配置，不会回退到默认值 |

          ### 吸边设置

          - `停靠边缘` 和 `高度位置(%)` 决定悬浮球固定位置。
          - `吸边露出比例` 决定吸边状态下悬浮球保留在屏幕内的比例。
          - `启用空闲自动回边` 只控制空闲状态下的自动回边计时。
          - `无面板时回边延迟` 仅在没有面板显示时生效。
          - `面板显示时回边延迟` 只控制悬浮球回边，不会自动关闭主面板。
          - 主面板根据悬浮球停靠边缘自动选择展开方向，并在安全区域内完成最终裁剪。

          以下旧设置已从设置页和运行时语义中移除，启动规范化时会清理旧 SQLite 和旧 Schema 数据：

          ```text
          面板默认位置
          手动垂直偏移
          保存位置节流
          ```

          设置页预览与正式主面板共用同一套精确宽高和位置计算，保存布局参数后会按当前配置重新构建主面板。

          ---

          ## 按钮动作'''
          if anchor not in text:
              raise SystemExit('README main panel section anchor missing')
          text = text.replace(anchor, section, 1)

          old_modules = '| `th_15_extra.js` | 主面板、ToolApp Shell、页面栈和响应式布局 |'
          new_modules = '''| `th_15_extra.js` | ToolApp Shell、页面栈、面板显示和精确 WindowManager 尺寸 |
          | `th_15_main_panel.js` | 主按钮面板、自适应网格、分页、拖动排序和运行状态 |'''
          if old_modules not in text:
              raise SystemExit('README module responsibility anchor missing')
          text = text.replace(old_modules, new_modules, 1)

          text = text.replace(
              'python3 scripts/verify_sqlite_persistence.py',
              'python3 scripts/verify_sqlite_storage.py',
              1,
          )

          update_anchor = '''## 更新记录

          ### 2026-07-13'''
          update_section = '''## 更新记录

          ### 2026-07-14

          **完善主面板自适应布局与吸边设置**

          - 主面板改为由网格实际宽高反推面板和 WindowManager 精确尺寸，修复右侧额外空白。
          - 主面板宽度预算扩大为 35%～100%，自动最大列数扩大为 1～10。
          - 按钮分列参考宽度扩大为 48～200dp，按钮高度扩大为 48～160dp。
          - 球与面板距离支持有效的 `0dp` 配置。
          - 设置页预览复用正式主面板的尺寸和位置计算。
          - 清理“面板默认位置”“手动垂直偏移”“保存位置节流”三个无效设置。
          - 调整吸边设置名称，使文案与实际运行行为一致。

          ### 2026-07-13'''
          if update_anchor not in text:
              raise SystemExit('README update record anchor missing')
          text = text.replace(update_anchor, update_section, 1)

          required = (
              '可配置自适应网格',
              '实时运行状态',
              '拖动排序',
              '分页吸附',
              '新增和编辑按钮直接保存',
              '单页隐藏分页圆点',
              '关闭闪烁',
              '默认背景透明度为 0.92',
              '35%～100%',
              '1～10',
              '48～200dp',
              '48～160dp',
              '网格决定面板宽高',
              '面板默认位置',
              '手动垂直偏移',
              '保存位置节流',
              'th_15_main_panel.js',
              'verify_sqlite_storage.py',
          )
          for marker in required:
              if marker not in text:
                  raise SystemExit('README missing marker: ' + marker)

          path.write_text(text, encoding='utf-8', newline='\n')
          PY

      - name: Remove temporary workflow
        shell: bash
        run: rm -f .github/workflows/update-readme-main-panel-docs.yml

      - name: Validate documentation
        shell: bash
        run: |
          python3 scripts/verify_documentation_consistency.py
          python3 scripts/verify_main_panel_runtime_status.py
          python3 scripts/verify_main_panel_drag_sort.py
          python3 scripts/verify_main_panel_paging.py
          python3 scripts/verify_main_panel_adaptive_layout.py
          python3 scripts/verify_main_panel_grid_sizing.py
          python3 scripts/verify_main_panel_visual_tuning.py
          python3 scripts/verify_main_panel_close_lifecycle.py
          git diff --check

      - name: Commit README update
        shell: bash
        env:
          TOOLHUB_AUTOMATION_TOKEN: ${{ secrets.TOOLHUB_AUTOMATION_TOKEN }}
          TARGET_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          if [ -z "$TOOLHUB_AUTOMATION_TOKEN" ]; then
            echo "TOOLHUB_AUTOMATION_TOKEN is empty"
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md .github/workflows/update-readme-main-panel-docs.yml
          git commit -m "更新 README 主面板与吸边说明"
          git remote set-url origin "https://x-access-token:${TOOLHUB_AUTOMATION_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin "HEAD:$TARGET_BRANCH"
