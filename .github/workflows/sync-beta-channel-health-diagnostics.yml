name: sync-beta-channel-health-diagnostics

on:
  push:
    branches: [fix/beta-channel-health-diagnostics]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-beta-channel-health-diagnostics
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/beta-channel-health-diagnostics
          fetch-depth: 0
          token: ${{ secrets.TOOLHUB_AUTOMATION_TOKEN || github.token }}
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Sync verified Stable files
        env:
          TOOLHUB_AUTOMATION_TOKEN: ${{ secrets.TOOLHUB_AUTOMATION_TOKEN }}
        run: |
          git fetch --no-tags origin main beta
          for file in \
            .github/workflows/verify.yml \
            code/th_08_content.js \
            docs/audits/ENTRY_SYMBOL_AUDIT.md \
            scripts/verify_channel_health_diagnostics.py \
            scripts/verify_content_security.py
          do
            git show "origin/main:${file}" > "${file}"
          done
          cat > updates/records/20260721-beta-channel-health-diagnostics.json <<'JSON'
          {
            "schema": 1,
            "id": "20260721-beta-channel-health-diagnostics",
            "type": "feature",
            "title": "Beta 新增通道健康自检与诊断报告",
            "details": [
              "在 Beta 运行记录中增加通道健康自检，核对活动通道、分支、根目录、启动状态、签名清单与 SQLite 存储",
              "诊断结果保存到 ToolHub-Beta/diagnostics/channel-health-last.txt，不读取或覆盖 Stable 诊断结果",
              "支持一键复制诊断报告，报告不包含翻译密钥、按钮内容或其他敏感配置",
              "不修改 ToolHub.js，不联网、不自动修复"
            ],
            "manifestVersion": 0
          }
          JSON
          rm -f .github/workflows/sync-beta-channel-health-diagnostics.yml
          python3 .github/scripts/es5_scan.py
          python3 scripts/verify_js_syntax.py
          python3 scripts/verify_channel_health_diagnostics.py
          python3 scripts/verify_content_security.py
          python3 scripts/verify_update_history.py --require-one-pending
          git diff --check
          if [ -z "$TOOLHUB_AUTOMATION_TOKEN" ]; then
            echo "TOOLHUB_AUTOMATION_TOKEN is empty"
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Beta 同步通道健康自检与诊断报告"
          git remote set-url origin "https://x-access-token:${TOOLHUB_AUTOMATION_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin HEAD:fix/beta-channel-health-diagnostics
