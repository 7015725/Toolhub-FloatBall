name: diagnose-legacy-main-panel-cleanup

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  diagnose:
    if: github.event.pull_request.head.ref == 'fix/remove-legacy-main-panel-20260714'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout head branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - name: Write reference report
        run: |
          set -u
          {
            printf '%s\n' '=== active/config references ==='
            grep -RIn --exclude-dir=.git \
              --exclude='diagnose-legacy-main-panel-cleanup.yml' \
              --exclude='LEGACY_MAIN_PANEL_REFERENCES.txt' \
              -E 'PANEL_COLS|PANEL_ITEM_SIZE_DP|computePanelX|tryAdjustPanelY|buildPanelView = function' \
              code scripts README.md ARCHITECTURE.md STRUCTURE.md .github || true
            printf '%s\n' '=== main panel builders/calls ==='
            grep -RIn --exclude-dir=.git \
              --exclude='LEGACY_MAIN_PANEL_REFERENCES.txt' \
              -E 'buildMainPanelView = function|buildPanelView\("main"\)|buildPanelView\(' \
              code scripts || true
          } > LEGACY_MAIN_PANEL_REFERENCES.txt
          cat LEGACY_MAIN_PANEL_REFERENCES.txt
      - name: Commit report
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add LEGACY_MAIN_PANEL_REFERENCES.txt
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "记录旧主面板引用"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
      - name: Keep PR locked
        run: exit 1
