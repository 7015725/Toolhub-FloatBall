name: agent-export-update-version-page

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: read

jobs:
  export:
    if: github.event.pull_request.head.ref == 'fix/update-version-page'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix/update-version-page
          fetch-depth: 0

      - name: Build snapshot
        run: |
          tar --exclude=.git -czf /tmp/toolhub-update-version-page.tar.gz .

      - name: Upload snapshot
        uses: actions/upload-artifact@v4
        with:
          name: toolhub-update-version-page-snapshot
          path: /tmp/toolhub-update-version-page.tar.gz
