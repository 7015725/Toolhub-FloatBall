name: merge-gesture-into-th18

on:
  push:
    branches:
      - fix/pgesture

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/pgesture
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Merge gesture file
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          p18 = Path('code/th_18_pointer_ocr.js')
          p19 = Path('code/th_19_pointer_gesture.js')
          s18 = p18.read_text(encoding='utf-8')
          s19 = p19.read_text(encoding='utf-8') if p19.exists() else ''
          if '// @version 1.0.3' in s18:
              s18 = s18.replace('// @version 1.0.3', '// @version 1.0.4', 1)
          if '__toolHubFixedEdgePointerGesturePatchInstalled' not in s18 and s19:
              s18 = s18.rstrip() + '\n\n' + s19 + '\n'
          p18.write_text(s18, encoding='utf-8')
          PY
          git rm -f code/th_19_pointer_gesture.js .github/workflows/merge_gesture_into_th18.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add code/th_18_pointer_ocr.js
          git commit -m "合并固定边缘指针手势"
          git push origin HEAD:fix/pgesture
