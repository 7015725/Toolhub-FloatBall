name: Final branch cleanup

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]
    paths:
      - '.github/workflows/final-branch-cleanup.yml'

permissions:
  contents: write

jobs:
  cleanup:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Delete all other non-main branches
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
          GH_API_URL: ${{ github.api_url }}
          CURRENT_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          python3 - <<'PY'
          import json
          import os
          from urllib.error import HTTPError
          from urllib.parse import quote
          from urllib.request import Request, urlopen

          token = os.environ['GH_TOKEN']
          repository = os.environ['GH_REPOSITORY']
          api_root = os.environ['GH_API_URL'].rstrip('/')
          current = os.environ['CURRENT_BRANCH']

          def request(method, path):
              req = Request(
                  api_root + path,
                  method=method,
                  headers={
                      'Accept': 'application/vnd.github+json',
                      'Authorization': 'Bearer ' + token,
                      'X-GitHub-Api-Version': '2022-11-28',
                  },
              )
              try:
                  with urlopen(req, timeout=60) as response:
                      raw = response.read()
                      return None if not raw else json.loads(raw.decode('utf-8'))
              except HTTPError as exc:
                  detail = exc.read().decode('utf-8', 'replace')
                  raise RuntimeError('HTTP %s %s: %s' % (exc.code, path, detail))

          branches = []
          page = 1
          while True:
              items = request('GET', '/repos/%s/branches?per_page=100&page=%d' % (repository, page))
              if not items:
                  break
              branches.extend(str(item['name']) for item in items)
              if len(items) < 100:
                  break
              page += 1

          deleted = []
          failures = []
          for name in sorted(set(branches)):
              if name in ('main', current):
                  continue
              ref = quote('heads/' + name, safe='/')
              try:
                  request('DELETE', '/repos/%s/git/refs/%s' % (repository, ref))
                  deleted.append(name)
              except Exception as exc:
                  failures.append({'branch': name, 'error': str(exc)})

          result = {
              'repository': repository,
              'current_branch': current,
              'before': sorted(set(branches)),
              'deleted': deleted,
              'failures': failures,
          }
          with open('branch-cleanup-result.json', 'w', encoding='utf-8') as handle:
              json.dump(result, handle, ensure_ascii=False, indent=2)
              handle.write('\n')
          print(json.dumps(result, ensure_ascii=False, indent=2))
          if failures:
              raise SystemExit('branch cleanup failures')
          PY

      - name: Upload cleanup result
        uses: actions/upload-artifact@v4
        with:
          name: final-branch-cleanup-result
          path: branch-cleanup-result.json
          if-no-files-found: error
          retention-days: 7

      - name: Delete cleanup branch
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
          GH_API_URL: ${{ github.api_url }}
          CURRENT_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          python3 - <<'PY'
          import os
          from urllib.error import HTTPError
          from urllib.parse import quote
          from urllib.request import Request, urlopen

          branch = os.environ['CURRENT_BRANCH']
          path = '/repos/%s/git/refs/%s' % (
              os.environ['GH_REPOSITORY'],
              quote('heads/' + branch, safe='/'),
          )
          req = Request(
              os.environ['GH_API_URL'].rstrip('/') + path,
              method='DELETE',
              headers={
                  'Accept': 'application/vnd.github+json',
                  'Authorization': 'Bearer ' + os.environ['GH_TOKEN'],
                  'X-GitHub-Api-Version': '2022-11-28',
              },
          )
          try:
              with urlopen(req, timeout=60):
                  pass
          except HTTPError as exc:
              detail = exc.read().decode('utf-8', 'replace')
              raise SystemExit('delete cleanup branch failed: HTTP %s %s' % (exc.code, detail))
          print('deleted cleanup branch:', branch)
          PY
