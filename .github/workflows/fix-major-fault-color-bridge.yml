name: fix-major-fault-color-bridge

on:
  push:
    branches:
      - fix/major-fault-detail-view-20260715

permissions:
  contents: write

jobs:
  fix:
    if: ${{ !contains(github.event.head_commit.message, '修正故障详情颜色桥') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix/major-fault-detail-view-20260715
          fetch-depth: 0

      - name: Apply color bridge fix
        run: python3 scripts/fix_major_fault_color_bridge.py

      - name: Verify JavaScript syntax
        run: node --check code/th_08_content.js

      - name: Verify full Rhino color safety
        run: python3 scripts/verify_rhino_color_api_safety.py

      - name: Verify major event contracts
        run: python3 scripts/verify_major_event_logging.py

      - name: Verify Content security
        run: python3 scripts/verify_content_security.py

      - name: Check dead code audit
        run: python3 scripts/report_dead_module_symbols.py --check DEAD_CODE_AUDIT.md

      - name: Check whitespace
        run: git diff --check

      - name: Remove temporary files
        run: |
          rm -f scripts/fix_major_fault_color_bridge.py
          rm -f .github/workflows/fix-major-fault-color-bridge.yml

      - name: Commit result
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add code/th_08_content.js
          git add -u scripts/fix_major_fault_color_bridge.py .github/workflows/fix-major-fault-color-bridge.yml
          git commit -m "修正故障详情颜色桥"
          git push origin HEAD:fix/major-fault-detail-view-20260715
