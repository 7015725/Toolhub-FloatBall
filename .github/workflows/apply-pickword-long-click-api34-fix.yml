name: apply-pickword-long-click-api34-fix

on:
  push:
    branches:
      - fix/pickword-long-click-api34-20260717
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-pickword-long-click-api34-fix
  cancel-in-progress: false

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fix branch
        uses: actions/checkout@v4
        with:
          ref: fix/pickword-long-click-api34-20260717
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Apply guarded patch
        run: python3 scripts/apply_pickword_long_click_api34_fix.py

      - name: Fetch main baseline
        run: git fetch --no-tags origin main

      - name: Verify focused fix
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/verify_pickword_long_click_api34.py
          python3 .github/scripts/es5_scan.py
          python3 scripts/verify_js_syntax.py
          python3 scripts/verify_changed_module_versions.py --base-ref origin/main
          python3 scripts/verify_update_history.py --require-one-pending
          git diff --check

      - name: Remove one-time patch files
        run: |
          git rm -- scripts/apply_pickword_long_click_api34_fix.py
          git rm -- .github/workflows/apply-pickword-long-click-api34-fix.yml

      - name: Commit focused fix
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add code/th_20_pickword.js
          git add scripts/verify_pickword_long_click_api34.py
          git add .github/workflows/verify.yml
          git add updates/records/fix-pickword-long-click-api34.json
          git diff --cached --check
          git commit -m "修复拾字长按监听 API 34 兼容"
          git push origin HEAD:fix/pickword-long-click-api34-20260717
