name: apply-pickword-reference-replica-once

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: apply-pickword-reference-replica-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'fix/pickword-reference-replica-20260717'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: fix/pickword-reference-replica-20260717
          fetch-depth: 0
          token: ${{ secrets.TOOLHUB_AUTOMATION_TOKEN || github.token }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Apply reference replica patch
        run: python3 scripts/apply_pickword_reference_replica_once.py

      - name: Verify changed module versions
        run: |
          git fetch --no-tags origin main
          python3 scripts/verify_changed_module_versions.py --base-ref origin/main

      - name: Verify Rhino ES5 and JavaScript syntax
        run: |
          python3 .github/scripts/es5_scan.py
          python3 scripts/verify_js_syntax.py

      - name: Verify module boundaries
        run: python3 scripts/verify_module_boundaries.py

      - name: Verify result preview integration
        run: python3 scripts/verify_result_preview.py

      - name: Verify settings color scheme
        run: python3 scripts/verify_settings_color_scheme.py

      - name: Verify settings color roles
        run: python3 scripts/verify_settings_color_roles.py

      - name: Verify ColorOS Rhino color safety
        run: python3 scripts/verify_coloros_rhino_color_safety.py

      - name: Verify full Rhino color API safety
        run: python3 scripts/verify_rhino_color_api_safety.py

      - name: Verify pending update record
        run: python3 scripts/verify_update_history.py --require-one-pending

      - name: Verify reference replica markers
        run: |
          python3 - <<'PY'
          from pathlib import Path
          text = Path('code/th_20_pickword.js').read_text(encoding='utf-8')
          checks = {
              'version': '// @version 1.0.6' in text,
              'title_accent': 'titleAccentView' in text and 'replicaAccent20()' in text,
              'size_selector': '字号    " + getFontSizeLevel20() + " ⌄' in text,
              'large_text_box': 'textAreaMinHeight' in text and 'createStrokeRoundRectDrawable(replicaSoftSurface20(), replicaOutline20()' in text,
              'middle_actions': all(x in text for x in ['复制全部', '去重换行', '分享', '钉屏']),
              'bottom_actions': all(x in text for x in ['"复制"', '"翻译"', '"全选"', '"清空"']),
              'canvas_icons': 'function createReplicaIcon20' in text and all(('kind === "' + x + '"') in text for x in ['copy', 'cleanup', 'share', 'pin', 'globe', 'select', 'trash']),
              'existing_logic': all(x in text for x in ['setupTextViewTouch', 'doTranslate: function()', 'pinSelectedText', 'editPreviewText', 'removeSelectedSpaces']),
              'new_actions': 'copyAllText: function()' in text and 'sharePickwordText: function()' in text,
          }
          failed = [name for name, ok in checks.items() if not ok]
          if failed:
              raise SystemExit('FAIL reference replica markers: ' + ', '.join(failed))
          print('OK pickword_reference_replica ' + ' '.join(name + '=1' for name in checks))
          PY

      - name: Remove one-time automation files
        run: |
          rm -f scripts/apply_pickword_reference_replica_once.py
          rm -f .github/workflows/apply_pickword_reference_replica_once.yml

      - name: Check final diff
        run: |
          git diff --check
          git status --short
          test -n "$(git status --porcelain)"

      - name: Commit implementation
        env:
          TARGET_BRANCH: fix/pickword-reference-replica-20260717
          TOOLHUB_AUTOMATION_TOKEN: ${{ secrets.TOOLHUB_AUTOMATION_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "高保真复刻拾字参考界面"
          if [ -n "$TOOLHUB_AUTOMATION_TOKEN" ]; then
            git remote set-url origin "https://x-access-token:${TOOLHUB_AUTOMATION_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          fi
          git push origin "HEAD:${TARGET_BRANCH}"
