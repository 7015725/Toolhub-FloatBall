name: pointer-final-position-patch

on:
  push:
    branches:
      - fix/pointer-final-position

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/pointer-final-position
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Patch final pointer position
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          p = Path('code/th_18_pointer_ocr.js')
          s = p.read_text(encoding='utf-8')
          s = s.replace('// @version 1.0.4', '// @version 1.0.5', 1)
          s = s.replace('状态补丁：拖动悬浮球时球体固定边缘，指针跟随手指；点击仍打开主面板，长按仍打开设置。', '状态补丁：拖动悬浮球时球体固定边缘，指针跟随手指；识别只使用最终拖动位置。', 1)
          s = s.replace('function schedulePointerMoveRaw18(appObj, rawX, rawY) {', 'function schedulePointerMoveRaw18(appObj, rawX, rawY, immediate) {', 1)
          marker = '      st.pointerY = st.pendingPointerY;\n      if (!st.handler)'
          insert = '''      st.pointerY = st.pendingPointerY;
      if (immediate === true && st.lp) {
        try {
          st.lp.x = st.pendingPointerX;
          st.lp.y = st.pendingPointerY;
          st.pointerX = st.lp.x;
          st.pointerY = st.lp.y;
          if (st.root && st.wm) st.wm.updateViewLayout(st.root, st.lp);
        } catch(eNow) { safeLog(appObj.L, 'e', 'pointer immediate update fail: ' + String(eNow)); }
      }
      if (!st.handler)'''
          if marker in s and 'pointer immediate update fail' not in s:
              s = s.replace(marker, insert, 1)
          s = s.replace('this.schedulePointerMoveRaw18(rawX, rawY);', 'this.schedulePointerMoveRaw18(rawX, rawY, true);')
          tap_marker = '''      proto.onPointerBallTap = function(rawX, rawY) {
        try { this.toast("拖动指针取字，悬停后框选识别"); } catch(eToast) {}
        return true;
      };
'''
          drag_end_patch = '''      var oldPointerDragEnd = proto.onPointerBallDragEnd;
      proto.onPointerBallDragEnd = function(rawX, rawY, action) {
        var st = this.ensurePointerToolState ? this.ensurePointerToolState() : null;
        if (st && st.__th18FixedEdgePointerMode === true && rawX !== undefined && rawY !== undefined) {
          this.schedulePointerMoveRaw18(rawX, rawY, true);
          st.dragging = false;
          try { if (st.root) st.root.invalidate(); } catch(eInv) {}
          if (action === android.view.MotionEvent.ACTION_CANCEL) {
            this.setPointerToolResult({ ok: false, type: "cancel", code: "ACTION_CANCEL", message: "指针取消" });
            try { this.toast("指针已取消"); } catch(eToast) {}
            this.closePointerTool("ACTION_CANCEL", true);
            return true;
          }
          if (st.mode === "area_capture") this.finishPointerAreaCapture();
          else if (st.mode === "text_pick") this.scheduleFinishPointerTextPick();
          return true;
        }
        return oldPointerDragEnd.call(this, rawX, rawY, action);
      };

'''
          if 'oldPointerDragEnd = proto.onPointerBallDragEnd' not in s and tap_marker in s:
              s = s.replace(tap_marker, drag_end_patch + tap_marker, 1)
          old_start = '''            pointerStarted = true;
            try { self.onPointerBallDragStart(startRawX, startRawY); } catch(eStart) { safeLog(self.L, 'e', 'fixed pointer start fail: ' + String(eStart)); }
            try { self.onPointerBallDragging(self.state.ballLp.x, self.state.ballLp.y, rawX, rawY); } catch(eDrag0) { safeLog(self.L, 'e', 'fixed pointer first drag fail: ' + String(eDrag0)); }
'''
          new_start = '''            if (pst) {
              pst.dragging = true;
              pst.dragStarted = true;
              pst.moved = true;
              pst.currentText = "";
              pst.currentRect = null;
              pst.currentKey = "";
              pst.hoverKey = "";
              pst.hoverSince = 0;
            }
            pointerStarted = true;
            try { self.schedulePointerMoveRaw18(rawX, rawY, true); } catch(eMoveNow) { safeLog(self.L, 'e', 'fixed pointer first position fail: ' + String(eMoveNow)); }
            try { self.onPointerBallDragging(self.state.ballLp.x, self.state.ballLp.y, rawX, rawY); } catch(eDrag0) { safeLog(self.L, 'e', 'fixed pointer first drag fail: ' + String(eDrag0)); }
'''
          if old_start in s:
              s = s.replace(old_start, new_start, 1)
          p.write_text(s, encoding='utf-8')
          PY
          git rm -f .github/workflows/pointer_final_pos_patch.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add code/th_18_pointer_ocr.js
          git commit -m "修复指针最终位置识别"
          git push origin HEAD:fix/pointer-final-position
