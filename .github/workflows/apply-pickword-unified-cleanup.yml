name: apply-pickword-unified-cleanup

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize]

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'fix/pickword-unified-cleanup-20260718'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix/pickword-unified-cleanup-20260718
          fetch-depth: 0
          token: ${{ secrets.TOOLHUB_AUTOMATION_TOKEN || github.token }}
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Apply cleanup patch
        shell: bash
        run: |
          set -o pipefail
          python3 scripts/apply_pickword_unified_cleanup.py 2>&1 | tee pickword-patch-log.txt

      - name: Upload patch failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pickword-patch-failure
          path: pickword-patch-log.txt
          if-no-files-found: error
          retention-days: 7

      - name: Verify focused boundaries
        shell: bash
        run: |
          set -euo pipefail
          python3 .github/scripts/es5_scan.py
          python3 scripts/verify_js_syntax.py
          python3 scripts/verify_pickword_long_click_api34.py
          python3 scripts/verify_pickword_share_close_cleanup.py
          python3 scripts/verify_pickword_unified_cleanup.py
          python3 scripts/verify_changed_module_versions.py --base-ref origin/main
          python3 scripts/verify_update_history.py --require-one-pending
          git diff --check

      - name: Commit patched files
        shell: bash
        env:
          TOOLHUB_AUTOMATION_TOKEN: ${{ secrets.TOOLHUB_AUTOMATION_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "$TOOLHUB_AUTOMATION_TOKEN" ]; then
            echo "TOOLHUB_AUTOMATION_TOKEN is empty"
            exit 1
          fi
          rm -f scripts/apply_pickword_unified_cleanup.py
          rm -f .github/workflows/apply-pickword-unified-cleanup.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add code/th_20_pickword.js \
            scripts/verify_pickword_long_click_api34.py \
            scripts/verify_pickword_unified_cleanup.py \
            .github/workflows/verify.yml \
            updates/records/optimize-pickword-unified-cleanup.json \
            scripts/apply_pickword_unified_cleanup.py \
            .github/workflows/apply-pickword-unified-cleanup.yml
          git commit -m "统一清理拾字冗余状态与窗口生命周期"
          git remote set-url origin "https://x-access-token:${TOOLHUB_AUTOMATION_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin HEAD:fix/pickword-unified-cleanup-20260718
