name: sign-toolhub

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]

permissions:
  contents: write

concurrency:
  group: update-th09-audit-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  update-audit:
    runs-on: ubuntu-latest
    if: >
      github.event.pull_request.draft == true &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'fix/complete-rhino-color-api-migration-20260714'
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix/complete-rhino-color-api-migration-20260714
          fetch-depth: 0
          token: ${{ secrets.TOOLHUB_AUTOMATION_TOKEN || github.token }}
          persist-credentials: false

      - name: Update and verify audit
        run: python3 scripts/update_th09_audit_metadata.py

      - name: Commit audit report
        env:
          TOOLHUB_AUTOMATION_TOKEN: ${{ secrets.TOOLHUB_AUTOMATION_TOKEN }}
        run: |
          test -n "$TOOLHUB_AUTOMATION_TOKEN"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add TH09_ANIMATION_AUDIT.md
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "更新颜色迁移后的 th09 审计报告"
          git remote set-url origin "https://x-access-token:${TOOLHUB_AUTOMATION_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin HEAD:fix/complete-rhino-color-api-migration-20260714
