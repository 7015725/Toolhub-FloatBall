name: sign-toolhub

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]

permissions:
  contents: write

concurrency:
  group: sync-color-contracts-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  sync-contracts:
    runs-on: ubuntu-latest
    if: >
      github.event.pull_request.draft == true &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'fix/complete-rhino-color-api-migration-20260714'
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix/complete-rhino-color-api-migration-20260714
          fetch-depth: 0
          token: ${{ secrets.TOOLHUB_AUTOMATION_TOKEN || github.token }}
          persist-credentials: false

      - name: Sync and verify contracts
        run: python3 scripts/sync_color_contract_validators.py

      - name: Remove one-time synchronizer
        run: rm -f scripts/sync_color_contract_validators.py

      - name: Commit contract updates
        env:
          TOOLHUB_AUTOMATION_TOKEN: ${{ secrets.TOOLHUB_AUTOMATION_TOKEN }}
        run: |
          test -n "$TOOLHUB_AUTOMATION_TOKEN"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/verify_main_panel_visual_tuning.py \
            scripts/verify_main_panel_close_lifecycle.py \
            scripts/sync_color_contract_validators.py
          git commit -m "同步颜色迁移后的主面板校验契约"
          git remote set-url origin "https://x-access-token:${TOOLHUB_AUTOMATION_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin HEAD:fix/complete-rhino-color-api-migration-20260714
