name: apply-sqlite-debounce-locking

on:
  push:
    branches:
      - fix/sqlite-debounce-race

permissions:
  contents: write

concurrency:
  group: apply-sqlite-debounce-locking
  cancel-in-progress: true

jobs:
  apply:
    if: ${{ !contains(github.event.head_commit.message, '应用 SQLite 防抖并发修复') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: fix/sqlite-debounce-race
          fetch-depth: 0

      - name: Apply and verify
        run: |
          python3 scripts/apply_sqlite_debounce_locking.py
          python3 .github/scripts/es5_scan.py
          python3 scripts/verify_js_syntax.py
          python3 scripts/verify_sqlite_storage.py
          git diff --check

      - name: Commit generated module
        run: |
          if git diff --quiet -- code/th_02_core.js; then
            echo "SQLite debounce locking already current"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add code/th_02_core.js
          git commit -m "应用 SQLite 防抖并发修复"
          git push origin HEAD:fix/sqlite-debounce-race
