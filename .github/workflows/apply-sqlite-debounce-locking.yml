name: apply-sqlite-debounce-locking

on:
  push:
    branches:
      - fix/sqlite-debounce-race
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: apply-sqlite-debounce-locking
  cancel-in-progress: true

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: fix/sqlite-debounce-race
          fetch-depth: 0

      - name: Apply, verify and commit
        shell: bash
        run: |
          set +e
          {
            python3 scripts/apply_sqlite_debounce_locking.py
            s1=$?
            echo "apply_status=$s1"
            if [ "$s1" -eq 0 ]; then python3 .github/scripts/es5_scan.py; else false; fi
            s2=$?
            echo "es5_status=$s2"
            if [ "$s1" -eq 0 ] && [ "$s2" -eq 0 ]; then python3 scripts/verify_js_syntax.py; else false; fi
            s3=$?
            echo "syntax_status=$s3"
            if [ "$s1" -eq 0 ] && [ "$s2" -eq 0 ] && [ "$s3" -eq 0 ]; then python3 scripts/verify_sqlite_storage.py; else false; fi
            s4=$?
            echo "storage_status=$s4"
            if [ "$s1" -eq 0 ] && [ "$s2" -eq 0 ] && [ "$s3" -eq 0 ] && [ "$s4" -eq 0 ]; then git diff --check; else false; fi
            s5=$?
            echo "whitespace_status=$s5"
          } > sqlite-debounce-patch.log 2>&1
          cat sqlite-debounce-patch.log

          if [ "$s1" -ne 0 ] || [ "$s2" -ne 0 ] || [ "$s3" -ne 0 ] || [ "$s4" -ne 0 ] || [ "$s5" -ne 0 ]; then
            git checkout -- code/th_02_core.js
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add sqlite-debounce-patch.log
            if ! git diff --cached --quiet; then
              git commit -m "и®°еҪ• SQLite йҳІжҠ–иЎҘдёҒеӨұиҙҘ"
              git push origin HEAD:fix/sqlite-debounce-race
            fi
            exit 0
          fi

          rm -f sqlite-debounce-patch.log
          if git diff --quiet -- code/th_02_core.js; then
            echo "SQLite debounce locking already current"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add code/th_02_core.js
          git commit -m "еә”з”Ё SQLite йҳІжҠ–е№¶еҸ‘дҝ®еӨҚ"
          git push origin HEAD:fix/sqlite-debounce-race
