name: Apply one-shot docs and Python files

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]
    paths:
      - '.github/workflows/oneshot-apply-docs-python-files.yml'

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Apply docs and Python files
        shell: bash
        env:
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          python3 - <<'PY'
          import textwrap
          from pathlib import Path

          workflow = Path('.github/workflows/oneshot-docs-python-cleanup.yml')
          text = workflow.read_text(encoding='utf-8')
          start_marker = "          python3 - <<'PY'\n"
          end_marker = "\n          PY\n\n      - name: Validate cleanup"
          start = text.find(start_marker)
          end = text.find(end_marker, start + len(start_marker))
          if start < 0 or end < 0:
              raise SystemExit('one-shot Python block not found')
          source = textwrap.dedent(text[start + len(start_marker):end])
          exec(compile(source, str(workflow), 'exec'), {'__name__': '__main__'})
          PY
          git checkout HEAD -- .github/workflows
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md ARCHITECTURE.md STRUCTURE.md SQLITE_STORAGE.md
          git add scripts/verify_pointer_regressions.py scripts/verify_manifest.py
          git add scripts/verify_documentation_consistency.py scripts/verify_workflow_script_references.py
          git commit -m "整理文档与 Python 校验"
          git push origin "HEAD:$HEAD_BRANCH"
