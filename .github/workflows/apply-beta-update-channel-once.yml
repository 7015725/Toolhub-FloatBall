name: apply-beta-update-channel-once

on:
  push:
    branches: [agent/beta-update-channel]
    paths:
      - scripts/apply_beta_update_channel_once.py
      - .github/workflows/apply-beta-update-channel-once.yml
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  apply:
    if: github.event_name == 'push' || github.event.pull_request.head.ref == 'agent/beta-update-channel'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: agent/beta-update-channel
          fetch-depth: 0

      - name: Apply repository patch
        run: python3 scripts/apply_beta_update_channel_once.py

      - name: Validate patched sources
        run: |
          python3 -m py_compile scripts/generate_signed_manifest.py scripts/verify_manifest.py
          python3 .github/scripts/es5_scan.py
          python3 scripts/verify_js_syntax.py
          git diff --check

      - name: Commit patched implementation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # 工作流文件由连接器在成功后删除，避免 GITHUB_TOKEN 修改 workflow 路径。
          git checkout HEAD -- .github/workflows/apply-beta-update-channel-once.yml
          git add -A
          git commit -m "增加 Stable 与 Beta 更新通道"
          git push origin HEAD:agent/beta-update-channel
