name: cleanup-beta-update-channel-once

on:
  push:
    branches: [agent/beta-update-channel]
    paths:
      - .github/workflows/apply-beta-update-channel-once.yml
  pull_request:
    branches: [main]
    types: [synchronize]

permissions:
  contents: read

concurrency:
  group: cleanup-beta-update-channel-once
  cancel-in-progress: true

jobs:
  cleanup:
    if: github.event_name == 'push' || github.event.pull_request.head.ref == 'agent/beta-update-channel'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: agent/beta-update-channel
          fetch-depth: 0
          persist-credentials: false

      - name: Remove temporary files
        env:
          TOOLHUB_AUTOMATION_TOKEN: ${{ secrets.TOOLHUB_AUTOMATION_TOKEN }}
        run: |
          rm -rf verified-beta-update-channel
          rm -f scripts/apply_beta_update_channel_once.py
          git add -A
          if git diff --cached --quiet; then
            echo "No temporary files remain"
            exit 0
          fi
          if [ -z "$TOOLHUB_AUTOMATION_TOKEN" ]; then
            echo "TOOLHUB_AUTOMATION_TOKEN is empty"
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "清理 Beta 通道临时产物"
          git remote set-url origin "https://x-access-token:${TOOLHUB_AUTOMATION_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin HEAD:agent/beta-update-channel
