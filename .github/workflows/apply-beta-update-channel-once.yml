name: apply-beta-update-channel-once

on:
  push:
    branches: [agent/beta-update-channel]
    paths:
      - scripts/apply_beta_update_channel_once.py
      - .github/workflows/apply-beta-update-channel-once.yml
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]

permissions:
  contents: read

jobs:
  apply:
    if: github.event_name == 'push' || github.event.pull_request.head.ref == 'agent/beta-update-channel'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: agent/beta-update-channel
          fetch-depth: 0

      - name: Apply repository patch
        run: python3 scripts/apply_beta_update_channel_once.py

      - name: Validate patched sources
        run: |
          python3 -m py_compile scripts/generate_signed_manifest.py scripts/verify_manifest.py
          python3 .github/scripts/es5_scan.py
          python3 scripts/verify_js_syntax.py
          git diff --check

      - name: Build verified patch bundle
        run: |
          mkdir -p verified-beta-update-channel
          files=(
            ToolHub.js
            code/th_14_panels.js
            scripts/generate_signed_manifest.py
            scripts/verify_manifest.py
            .github/workflows/verify.yml
            .github/workflows/sign-toolhub.yml
            .github/workflows/publish-release.yml
            docs/ARCHITECTURE.md
            updates/records/20260721-beta-update-channel.json
          )
          for file in "${files[@]}"; do
            mkdir -p "verified-beta-update-channel/$(dirname "$file")"
            cp "$file" "verified-beta-update-channel/$file"
          done
          printf '%s\n' "${files[@]}" > verified-beta-update-channel/FILES.txt

      - name: Upload verified patch bundle
        uses: actions/upload-artifact@v4
        with:
          name: verified-beta-update-channel
          path: verified-beta-update-channel
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 3
