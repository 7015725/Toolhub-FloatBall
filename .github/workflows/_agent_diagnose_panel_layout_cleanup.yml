name: diagnose-panel-layout-cleanup

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  diagnose:
    if: github.event.pull_request.head.ref == 'agent/panel-layout-position-settings-20260714'
    runs-on: ubuntu-latest
    environment: signing
    env:
      TARGET_BRANCH: ${{ github.event.pull_request.head.ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ secrets.TOOLHUB_AUTOMATION_TOKEN || github.token }}
          persist-credentials: false

      - name: Skip completed diagnostic
        id: existing
        run: |
          if [ -f FORMALIZE_DIAGNOSTIC.txt ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare patched tree
        if: steps.existing.outputs.skip != 'true'
        env:
          TOOLHUB_SIGNING_PRIVATE_KEY_PEM: ${{ secrets.TOOLHUB_SIGNING_PRIVATE_KEY_PEM }}
        run: |
          python3 scripts/_agent_apply_panel_layout_cleanup.py
          python3 scripts/report_dead_module_symbols.py --write DEAD_CODE_AUDIT.md
          python3 scripts/report_protected_wrapper_chains.py --write PROTECTED_WRAPPER_AUDIT.md
          python3 scripts/report_th15_extra_symbols.py --write TH15_EXTRA_AUDIT.md
          python3 scripts/report_th09_animation_symbols.py --write TH09_ANIMATION_AUDIT.md
          python3 scripts/report_entry_symbols.py --write ENTRY_SYMBOL_AUDIT.md
          mkdir -p "$HOME/.hermes/toolhub_signing"
          printf '%s\n' "$TOOLHUB_SIGNING_PRIVATE_KEY_PEM" > "$HOME/.hermes/toolhub_signing/private_key.pem"
          chmod 600 "$HOME/.hermes/toolhub_signing/private_key.pem"
          python3 scripts/generate_signed_manifest.py --yes --title "清理无效面板设置并扩大布局范围" --date "2026-07-14" --change "移除无效位置设置，扩大自适应布局范围并统一主面板预览位置"
          git fetch --no-tags origin main --depth=1

      - name: Record first failing validation
        if: steps.existing.outputs.skip != 'true'
        run: |
          python3 - <<'PY'
          import subprocess
          from pathlib import Path

          commands = [
              "python3 -m py_compile scripts/verify_schema_validator.py scripts/verify_main_panel_adaptive_layout.py scripts/verify_panel_layout_settings_cleanup.py",
              "python3 .github/scripts/es5_scan.py",
              "python3 scripts/verify_js_syntax.py",
              "python3 scripts/verify_schema_validator.py",
              "python3 scripts/verify_main_panel_runtime_status.py",
              "python3 scripts/verify_main_panel_drag_sort.py",
              "python3 scripts/verify_main_panel_paging.py",
              "python3 scripts/verify_main_panel_adaptive_layout.py",
              "python3 scripts/verify_panel_layout_settings_cleanup.py",
              "python3 scripts/verify_main_panel_grid_sizing.py",
              "python3 scripts/verify_main_panel_visual_tuning.py",
              "python3 scripts/verify_main_panel_close_lifecycle.py",
              "python3 scripts/verify_ball_position_state.py",
              "python3 scripts/verify_sqlite_storage.py",
              "python3 scripts/verify_toolapp_layout.py",
              "python3 scripts/verify_module_boundaries.py",
              "python3 scripts/report_dead_module_symbols.py --check DEAD_CODE_AUDIT.md",
              "python3 scripts/report_protected_wrapper_chains.py --check PROTECTED_WRAPPER_AUDIT.md",
              "python3 scripts/report_th15_extra_symbols.py --check TH15_EXTRA_AUDIT.md",
              "python3 scripts/report_th09_animation_symbols.py --check TH09_ANIMATION_AUDIT.md",
              "python3 scripts/report_entry_symbols.py --check ENTRY_SYMBOL_AUDIT.md",
              "python3 scripts/verify_changed_module_versions.py --base-ref origin/main",
              "python3 scripts/verify_documentation_consistency.py",
              "python3 scripts/verify_manifest.py",
              "python3 .github/scripts/verify_manifest_signature.py",
              "git diff --check",
          ]
          report = []
          failed = False
          for command in commands:
              proc = subprocess.run(command, shell=True, text=True, stdout=subprocess.PIPE, stderr=subprocess.STDOUT)
              report.append("$ " + command)
              report.append(proc.stdout.rstrip())
              report.append("exit=%d" % proc.returncode)
              report.append("")
              if proc.returncode != 0:
                  failed = True
                  break
          report.insert(0, "status=%s" % ("failed" if failed else "passed"))
          Path("FORMALIZE_DIAGNOSTIC.txt").write_text("\n".join(report) + "\n", encoding="utf-8")
          PY

      - name: Commit diagnostic result
        if: steps.existing.outputs.skip != 'true'
        env:
          TOOLHUB_AUTOMATION_TOKEN: ${{ secrets.TOOLHUB_AUTOMATION_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add FORMALIZE_DIAGNOSTIC.txt
          git commit -m "记录主面板设置修复验证结果"
          git remote set-url origin "https://x-access-token:${TOOLHUB_AUTOMATION_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin "HEAD:$TARGET_BRANCH"
