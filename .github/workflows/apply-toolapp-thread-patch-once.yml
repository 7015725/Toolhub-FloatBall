name: apply-toolapp-thread-patch-once

on:
  push:
    branches:
      - fix/toolapp-main-thread-affinity-20260716

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix/toolapp-main-thread-affinity-20260716
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Apply patch
        run: python3 scripts/apply_toolapp_thread_patch_once.py

      - name: Verify ToolApp thread affinity
        run: python3 scripts/verify_toolapp_thread_affinity.py

      - name: Verify JavaScript
        run: |
          python3 .github/scripts/es5_scan.py
          python3 scripts/verify_js_syntax.py

      - name: Remove one-shot helpers
        run: |
          rm -f scripts/apply_toolapp_thread_patch_once.py
          rm -f .github/workflows/apply-toolapp-thread-patch-once.yml

      - name: Commit branch changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add code/th_16_entry.js scripts/verify_toolapp_thread_affinity.py
          git add -u scripts/apply_toolapp_thread_patch_once.py .github/workflows/apply-toolapp-thread-patch-once.yml
          git diff --cached --check
          git commit -m "修复 ToolApp 输入法线程归属"
          git push origin HEAD:fix/toolapp-main-thread-affinity-20260716
