name: sync-main-panel-version-contract

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: sync-main-panel-version-contract
  cancel-in-progress: false

jobs:
  sync:
    if: github.event.pull_request.head.ref == 'fix/coloros-rhino-color-safety-20260714'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repair branch
        uses: actions/checkout@v4
        with:
          ref: fix/coloros-rhino-color-safety-20260714
          fetch-depth: 0

      - name: Sync verifier contracts
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          root = Path('.')
          changed = []
          for path in sorted((root / 'scripts').glob('verify_*.py')):
              text = path.read_text(encoding='utf-8')
              if '1.5.5' not in text:
                  continue
              updated = text.replace('1.5.5', '1.5.6')
              path.write_text(updated, encoding='utf-8', newline='\n')
              changed.append(str(path))

          if not changed:
              raise SystemExit('no stale main-panel 1.5.5 contracts found')
          print('updated contracts:')
          for item in changed:
              print(item)
          PY
          rm -f .github/workflows/sync-main-panel-version-contract.yml

      - name: Verify synchronized contracts
        shell: bash
        run: |
          python3 scripts/verify_main_panel_runtime_status.py
          python3 scripts/verify_main_panel_drag_sort.py
          python3 scripts/verify_main_panel_more_menu.py
          python3 scripts/verify_main_panel_paging.py
          python3 scripts/verify_main_panel_adaptive_layout.py
          python3 scripts/verify_panel_layout_settings_cleanup.py
          python3 scripts/verify_legacy_main_panel_cleanup.py
          python3 scripts/verify_main_panel_grid_sizing.py
          python3 scripts/verify_main_panel_visual_tuning.py
          python3 scripts/verify_main_panel_close_lifecycle.py

      - name: Commit synchronized contracts
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/verify_*.py .github/workflows/sync-main-panel-version-contract.yml
          git commit -m "同步主面板 1.5.6 验证契约"
          git push origin HEAD:fix/coloros-rhino-color-safety-20260714
