name: diagnose-coloros-verify

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnose-main-panel:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Runtime status
        run: python3 scripts/verify_main_panel_runtime_status.py

      - name: Drag sort
        run: python3 scripts/verify_main_panel_drag_sort.py

      - name: More menu
        run: python3 scripts/verify_main_panel_more_menu.py

      - name: Paging
        run: python3 scripts/verify_main_panel_paging.py

      - name: Adaptive layout
        run: python3 scripts/verify_main_panel_adaptive_layout.py

      - name: Layout settings cleanup
        run: python3 scripts/verify_panel_layout_settings_cleanup.py

      - name: Legacy main panel cleanup
        run: python3 scripts/verify_legacy_main_panel_cleanup.py

      - name: Grid sizing
        run: python3 scripts/verify_main_panel_grid_sizing.py

      - name: Visual tuning
        run: python3 scripts/verify_main_panel_visual_tuning.py

      - name: Close lifecycle
        run: python3 scripts/verify_main_panel_close_lifecycle.py
