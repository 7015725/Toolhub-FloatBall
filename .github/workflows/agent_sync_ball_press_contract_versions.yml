name: Sync ball press contract versions

on:
  pull_request:
    branches: [main]
    types: [synchronize]

permissions:
  contents: write
  pull-requests: read

jobs:
  sync:
    if: github.event.pull_request.head.ref == 'fix/ball-press-feedback-semantics-20260715'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: fix/ball-press-feedback-semantics-20260715
          fetch-depth: 0

      - name: Sync th_01 contract baselines
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          paths = [
              Path('scripts/verify_main_panel_adaptive_layout.py'),
              Path('scripts/verify_legacy_main_panel_cleanup.py'),
              Path('scripts/verify_main_panel_visual_tuning.py'),
              Path('scripts/verify_panel_layout_settings_cleanup.py'),
          ]
          for path in paths:
              text = path.read_text(encoding='utf-8')
              count = text.count('"1.1.10"')
              if count < 1:
                  raise SystemExit('FAIL missing old th_01 baseline in %s' % path)
              path.write_text(text.replace('"1.1.10"', '"1.1.11"'), encoding='utf-8')
              print('OK updated', path, 'count', count)
          PY

      - name: Verify synchronized contracts
        shell: bash
        run: |
          python3 scripts/verify_main_panel_adaptive_layout.py
          python3 scripts/verify_legacy_main_panel_cleanup.py
          python3 scripts/verify_main_panel_visual_tuning.py
          python3 scripts/verify_panel_layout_settings_cleanup.py

      - name: Commit contract updates and remove executors
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/agent_sync_ball_press_contract_versions.yml
          git rm .github/workflows/agent_diagnose_ball_press_remaining.yml
          git add scripts/verify_main_panel_adaptive_layout.py
          git add scripts/verify_legacy_main_panel_cleanup.py
          git add scripts/verify_main_panel_visual_tuning.py
          git add scripts/verify_panel_layout_settings_cleanup.py
          git commit -m "同步悬浮球按压语义版本契约"
          git push origin HEAD:fix/ball-press-feedback-semantics-20260715
