name: agent-runtime-record-commit

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write

jobs:
  commit-fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: fix/runtime-record-scroll-20260715
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Apply and normalize patch
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import textwrap

          workflow = Path('.github/workflows/agent-runtime-record-scroll.yml').read_text(encoding='utf-8')
          marker = "          python3 - <<'PY'\n"
          start = workflow.index(marker) + len(marker)
          end = workflow.index("\n          PY\n", start)
          script = textwrap.dedent(workflow[start:end])
          exec(compile(script, 'runtime-record-patch.py', 'exec'), {})

          def shift_block(text, marker_text, end_text, spaces):
              marker_pos = text.index(marker_text)
              block_start = text.rfind('\n', 0, marker_pos) + 1
              end_pos = text.index(end_text, marker_pos)
              block = text[block_start:end_pos]
              prefix = ' ' * spaces
              fixed = []
              for line in block.splitlines(True):
                  if line.startswith(prefix):
                      line = line[spaces:]
                  fixed.append(line)
              return text[:block_start] + ''.join(fixed) + text[end_pos:]

          panels_path = Path('code/th_14_panels.js')
          panels = panels_path.read_text(encoding='utf-8')
          panels = shift_block(
              panels,
              'FloatBallAppWM.prototype.startColorSafetyRuntimeSelfTestFromSettings = function()',
              '    FloatBallAppWM.prototype.buildSettingsGroupDetailPane = function',
              4
          )
          panels = panels.replace(
              '    FloatBallAppWM.prototype.buildSettingsGroupDetailPane = function',
              'FloatBallAppWM.prototype.buildSettingsGroupDetailPane = function',
              1
          )
          panels = shift_block(
              panels,
              '      if (String(groupKey || "") === "debug" && this.createColorSafetyRuntimeDiagnosticCard)',
              '  scroll.setOnTouchListener',
              4
          )
          panels = shift_block(
              panels,
              '      if (activeGroupKey === "debug" && this.createColorSafetyRuntimeDiagnosticCard)',
              '  scroll.setOnTouchListener',
              4
          )
          panels_path.write_text(panels, encoding='utf-8')

          verify_path = Path('scripts/verify_coloros_rhino_color_safety.py')
          verify = verify_path.read_text(encoding='utf-8')
          marker_pos = verify.index('"FloatBallAppWM.prototype.startColorSafetyRuntimeSelfTestFromSettings = function"')
          section_start = verify.rfind('for token in (', 0, marker_pos)
          section_end = verify.index('if not argb:', marker_pos)
          lines = [
              'for token in (',
              '    "FloatBallAppWM.prototype.startColorSafetyRuntimeSelfTestFromSettings = function",',
              '    "FloatBallAppWM.prototype.copyColorSafetyRuntimeSelfTestSummaryFromSettings = function",',
              '    "FloatBallAppWM.prototype.startSettingsInteractionStressTestFromSettings = function",',
              '    "FloatBallAppWM.prototype.copySettingsInteractionStressSummaryFromSettings = function",',
              '    "FloatBallAppWM.prototype.createColorSafetyRuntimeDiagnosticCard = function",',
              '    \'card.setContentDescription("ToolHub 运行记录")\',',
              '    \'box.addView(colorSafetyCard, colorSafetyCardLp);\',',
              '    \'box.addView(colorSafetyCardCompact, colorSafetyCardCompactLp);\',',
              '    "create runtime records card fail",',
              '    "create compact runtime records card fail",',
              '):',
              '    if token not in PANELS:',
              '        errors.append("runtime records scroll contract missing: %s" % token)',
              '',
              'for forbidden in (',
              '    "self.runColorSafetyRuntimeSelfTest(160)",',
              '    "self.runSettingsInteractionStressTest(120)",',
              '    "运行 160 次自检",',
              '    "运行 120 次设置控件压力测试",',
              '    "复制诊断摘要",',
              '    "复制控件压力摘要",',
              '    "root.addView(colorSafetyCard, colorSafetyCardLp);",',
              '    "panel.addView(colorSafetyCardCompact, colorSafetyCardCompactLp);",',
              '):',
              '    if forbidden in PANELS:',
              '        errors.append("removed runtime diagnostic UI remains: %s" % forbidden)',
              '',
              'if ALL_JS.count(".runColorSafetyRuntimeSelfTest(") != 0:',
              '    errors.append("runtime color self-test must not have a settings invocation")',
              'if ALL_JS.count(".runSettingsInteractionStressTest(") != 0:',
              '    errors.append("settings interaction stress test must not have a settings invocation")',
              '',
              'for token in (',
              '    "FloatBallAppWM.prototype.runSettingsInteractionStressTest = function",',
              '    "new android.widget.Switch(context)",',
              '    "new android.widget.SeekBar(context)",',
              '    "createTransparentPressedStateDrawable(rowPressedColor",',
              '    \'createSolidButton(this, "压力测试"\',',
              '    "ToolHub/diagnostics/settings-interaction-last.json",',
              '    "settings interaction stress start",',
              '    "settings interaction stress pass",',
              '    "settings interaction stress fail",',
              '    "loops = Math.max(1, Math.min(200, loops))",',
              '):',
              '    if token not in PANEL_UI:',
              '        errors.append("settings interaction stress implementation missing: %s" % token)',
              '',
              'stress_block = re.search(r"FloatBallAppWM.prototype.runSettingsInteractionStressTest = function\\(iterations\\) \\{.*?\\n\\};", PANEL_UI, re.S)',
              'if not stress_block:',
              '    errors.append("settings interaction stress method missing")',
              'else:',
              '    block = stress_block.group(0)',
              '    for forbidden in ("setPendingValue(", "commitPendingUserCfg(", "state.wm.addView", "setOnCheckedChangeListener("):',
              '        if forbidden in block:',
              '            errors.append("settings interaction stress test mutates live settings or window state: %s" % forbidden)',
              '',
              'records_block = re.search(r"FloatBallAppWM.prototype.createColorSafetyRuntimeDiagnosticCard = function\\(\\) \\{.*?\\n\\};", PANELS, re.S)',
              'if not records_block:',
              '    errors.append("runtime records card method missing")',
              'else:',
              '    block = records_block.group(0)',
              '    for token in (\'new android.widget.LinearLayout(context)\', \'card.setContentDescription("ToolHub 运行记录")\', \'return card;\'):',
              '        if token not in block:',
              '            errors.append("runtime records card contract missing: %s" % token)',
              '    for forbidden in ("运行 160 次自检", "运行 120 次设置控件压力测试", "ColorOS 颜色安全自检"):',
              '        if forbidden in block:',
              '            errors.append("runtime records card still exposes diagnostic test: %s" % forbidden)',
              '',
              'argb = re.search(r"function _th_argb\\(c\\) \\{.*?\\n\\}", THEME, re.S)',
              '',
          ]
          correct = '\n'.join(lines)
          verify = verify[:section_start] + correct + verify[section_end:]
          verify_path.write_text(verify, encoding='utf-8')
          PY

      - name: Verify changes
        shell: bash
        run: |
          set -o pipefail
          {
            git fetch --no-tags origin main
            python3 .github/scripts/es5_scan.py
            python3 scripts/verify_js_syntax.py
            python3 scripts/verify_coloros_rhino_color_safety.py
            python3 scripts/verify_toolapp_layout.py
            python3 scripts/verify_major_event_logging.py
            python3 scripts/verify_changed_module_versions.py --base-ref origin/main
            git diff --check
          } 2>&1 | tee verify-output.txt

      - name: Upload verification log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-record-commit-verification
          path: |
            verify-output.txt
            scripts/verify_coloros_rhino_color_safety.py
            code/th_14_panels.js
          if-no-files-found: warn
          retention-days: 3

      - name: Commit fix
        shell: bash
        run: |
          rm -f \
            .github/workflows/agent-runtime-record-scroll.yml \
            .github/workflows/agent-runtime-record-debug.yml \
            .github/workflows/agent-runtime-record-finalize.yml \
            .github/workflows/agent-runtime-record-commit.yml \
            patch-error.txt verify-output.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add code/th_14_panels.js scripts/verify_coloros_rhino_color_safety.py .github/workflows
          git commit -m "取消运行自检并修复记录滚动"
          git push origin HEAD:fix/runtime-record-scroll-20260715
