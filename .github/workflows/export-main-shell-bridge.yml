name: export-main-shell-bridge

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
      - name: Pack current main
        run: tar --exclude='.git' -czf /tmp/toolhub-main-shell-bridge.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: toolhub-main-shell-bridge
          path: /tmp/toolhub-main-shell-bridge.tar.gz
          retention-days: 1
