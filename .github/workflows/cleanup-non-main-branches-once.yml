name: Cleanup non-main branches once

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/cleanup-non-main-branches-once.yml

permissions:
  contents: write
  issues: write

jobs:
  cleanup:
    if: github.repository == '7015725/Toolhub-FloatBall'
    runs-on: ubuntu-latest
    steps:
      - name: Delete every branch except main
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
          GH_API_URL: ${{ github.api_url }}
        run: |
          python3 - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from urllib.error import HTTPError
          from urllib.parse import quote
          from urllib.request import Request, urlopen

          token = os.environ["GH_TOKEN"]
          repo = os.environ["GH_REPOSITORY"]
          api_root = os.environ["GH_API_URL"].rstrip("/")
          keep_branch = "main"

          def request(method, path, payload=None):
              data = None
              if payload is not None:
                  data = json.dumps(payload).encode("utf-8")
              req = Request(
                  api_root + path,
                  data=data,
                  method=method,
                  headers={
                      "Accept": "application/vnd.github+json",
                      "Authorization": "Bearer " + token,
                      "X-GitHub-Api-Version": "2022-11-28",
                      "Content-Type": "application/json",
                  },
              )
              try:
                  with urlopen(req, timeout=60) as resp:
                      raw = resp.read()
                      return None if not raw else json.loads(raw.decode("utf-8"))
              except HTTPError as exc:
                  detail = exc.read().decode("utf-8", "replace")
                  raise RuntimeError("HTTP %s %s: %s" % (exc.code, path, detail))

          def list_branches():
              names = []
              page = 1
              while True:
                  items = request(
                      "GET",
                      "/repos/%s/branches?per_page=100&page=%d" % (repo, page),
                  )
                  if not items:
                      break
                  for item in items:
                      names.append(str(item["name"]))
                  if len(items) < 100:
                      break
                  page += 1
              return sorted(set(names))

          repo_info = request("GET", "/repos/%s" % repo)
          default_branch = str(repo_info.get("default_branch", ""))
          if default_branch != keep_branch:
              raise SystemExit(
                  "Refusing cleanup: default branch is %r, expected %r"
                  % (default_branch, keep_branch)
              )

          before = list_branches()
          deleted = []
          failures = []

          for name in before:
              if name == keep_branch:
                  continue
              ref = quote("heads/" + name, safe="/")
              try:
                  request("DELETE", "/repos/%s/git/refs/%s" % (repo, ref))
                  deleted.append(name)
                  print("deleted:", name)
              except Exception as exc:
                  failures.append({"branch": name, "error": str(exc)})
                  print("failed:", name, exc)

          remaining = list_branches()
          ok = remaining == [keep_branch] and not failures
          result = {
              "ok": ok,
              "repository": repo,
              "kept": keep_branch,
              "before_count": len(before),
              "deleted_count": len(deleted),
              "deleted": deleted,
              "remaining": remaining,
              "failures": failures,
              "completed_at_utc": datetime.now(timezone.utc).isoformat(),
          }

          comment = (
              "<!-- toolhub-branch-cleanup-result -->\n"
              "一次性分支清理结果：\n\n```json\n"
              + json.dumps(result, ensure_ascii=False, indent=2)
              + "\n```"
          )
          request(
              "POST",
              "/repos/%s/issues/340/comments" % repo,
              {"body": comment},
          )

          if not ok:
              raise SystemExit("Branch cleanup incomplete: " + json.dumps(result))
          PY
