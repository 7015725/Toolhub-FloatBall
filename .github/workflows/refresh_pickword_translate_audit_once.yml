name: refresh-pickword-translate-audit-once

on:
  push:
    branches:
      - fix/pickword-translate-settings-20260717
    paths:
      - .github/workflows/refresh_pickword_translate_audit_once.yml

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix/pickword-translate-settings-20260717
          fetch-depth: 0
          token: ${{ secrets.TOOLHUB_AUTOMATION_TOKEN || github.token }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Refresh deterministic audits
        run: |
          python3 scripts/report_dead_module_symbols.py --write DEAD_CODE_AUDIT.md
          python3 scripts/report_dead_module_symbols.py --check DEAD_CODE_AUDIT.md
          python3 scripts/report_protected_wrapper_chains.py --check PROTECTED_WRAPPER_AUDIT.md
          python3 scripts/report_th15_extra_symbols.py --check TH15_EXTRA_AUDIT.md
          python3 scripts/report_th09_animation_symbols.py --check TH09_ANIMATION_AUDIT.md

      - name: Remove temporary workflow and commit
        env:
          TARGET_BRANCH: fix/pickword-translate-settings-20260717
          TOOLHUB_AUTOMATION_TOKEN: ${{ secrets.TOOLHUB_AUTOMATION_TOKEN }}
        run: |
          rm -f .github/workflows/refresh_pickword_translate_audit_once.yml
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "更新拾字翻译设置审计报告"
          if [ -n "$TOOLHUB_AUTOMATION_TOKEN" ]; then
            git remote set-url origin "https://x-access-token:${TOOLHUB_AUTOMATION_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          fi
          git push origin "HEAD:${TARGET_BRANCH}"
