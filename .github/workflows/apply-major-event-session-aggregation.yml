name: apply-major-event-session-aggregation-retry

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  apply:
    if: ${{ github.event.pull_request.head.ref == 'fix/major-event-session-aggregation-20260715' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix/major-event-session-aggregation-20260715
          fetch-depth: 0

      - name: Apply aggregation patch
        run: python3 scripts/apply_major_event_session_aggregation.py

      - name: Check JavaScript syntax
        run: node --check code/th_08_content.js

      - name: Verify major event aggregation
        run: python3 scripts/verify_major_event_logging.py

      - name: Verify Content security
        run: python3 scripts/verify_content_security.py

      - name: Verify dead code audit
        run: python3 scripts/report_dead_module_symbols.py --check DEAD_CODE_AUDIT.md

      - name: Check whitespace
        run: git diff --check

      - name: Remove temporary patch files
        run: |
          rm -f scripts/apply_major_event_session_aggregation.py
          rm -f .github/workflows/apply-major-event-session-aggregation.yml

      - name: Commit result
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add code/th_08_content.js scripts/verify_major_event_logging.py scripts/verify_content_security.py
          git add -u scripts/apply_major_event_session_aggregation.py .github/workflows/apply-major-event-session-aggregation.yml
          git commit -m "完成故障会话聚合与重复折叠"
          git push origin HEAD:fix/major-event-session-aggregation-20260715
