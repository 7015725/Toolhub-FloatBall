name: apply-channel-health-diagnostics

on:
  push:
    branches: [fix/channel-health-diagnostics]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-channel-health-diagnostics
  cancel-in-progress: true

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/channel-health-diagnostics
          fetch-depth: 0
          token: ${{ secrets.TOOLHUB_AUTOMATION_TOKEN || github.token }}
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Apply and verify
        env:
          TOOLHUB_AUTOMATION_TOKEN: ${{ secrets.TOOLHUB_AUTOMATION_TOKEN }}
        run: |
          python3 scripts/apply_channel_health_diagnostics_once.py
          python3 .github/scripts/es5_scan.py
          python3 scripts/verify_js_syntax.py
          python3 scripts/verify_channel_health_diagnostics.py
          python3 scripts/verify_update_history.py --require-one-pending
          git diff --check
          rm -f scripts/apply_channel_health_diagnostics_once.py
          rm -f .github/workflows/apply-channel-health-diagnostics.yml
          if [ -z "$TOOLHUB_AUTOMATION_TOKEN" ]; then
            echo "TOOLHUB_AUTOMATION_TOKEN is empty"
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "新增通道健康自检与诊断报告"
          git remote set-url origin "https://x-access-token:${TOOLHUB_AUTOMATION_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin HEAD:fix/channel-health-diagnostics
