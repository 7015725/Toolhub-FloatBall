name: generate-shell-diagnostic-analysis

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  generate:
    if: >
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'audit/shell-diagnostic-wrappers' &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: audit/shell-diagnostic-wrappers
          fetch-depth: 0
          token: ${{ secrets.TOOLHUB_AUTOMATION_TOKEN || github.token }}
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate and verify analysis
        shell: bash
        run: |
          python3 scripts/verify_shell_diagnostic_wrappers.py --write SHELL_DIAGNOSTIC_WRAPPER_ANALYSIS.md
          python3 scripts/verify_shell_diagnostic_wrappers.py --check SHELL_DIAGNOSTIC_WRAPPER_ANALYSIS.md
          python3 scripts/report_protected_wrapper_chains.py --check PROTECTED_WRAPPER_AUDIT.md
          python3 scripts/verify_module_boundaries.py
          python3 -m compileall -q scripts .github/scripts
          git diff --check

      - name: Remove one-shot workflow
        run: rm -f .github/workflows/generate-shell-diagnostic-analysis.yml

      - name: Commit analysis
        shell: bash
        env:
          TOOLHUB_AUTOMATION_TOKEN: ${{ secrets.TOOLHUB_AUTOMATION_TOKEN }}
        run: |
          if [ -z "$TOOLHUB_AUTOMATION_TOKEN" ]; then
            echo "TOOLHUB_AUTOMATION_TOKEN is empty"
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "生成 Shell 诊断包装分析报告"
          git remote set-url origin "https://x-access-token:${TOOLHUB_AUTOMATION_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin HEAD:audit/shell-diagnostic-wrappers
