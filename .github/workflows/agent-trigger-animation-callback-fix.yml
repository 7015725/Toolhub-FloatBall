name: agent-trigger-animation-callback-fix

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]

permissions:
  contents: write

concurrency:
  group: agent-trigger-animation-callback-fix-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  repair:
    if: >
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'fix/animation-callback-crash-20260716'
    runs-on: ubuntu-latest
    environment: signing
    steps:
      - name: Checkout repair branch
        uses: actions/checkout@v4
        with:
          ref: fix/animation-callback-crash-20260716
          fetch-depth: 0
          token: ${{ secrets.TOOLHUB_AUTOMATION_TOKEN || github.token }}
          persist-credentials: false

      - name: Extract and apply source patch
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          bootstrap = Path('.github/workflows/agent-fix-animation-callback-crash.yml')
          text = bootstrap.read_text(encoding='utf-8')
          marker = "          python3 - <<'PY'\n"
          start = text.index(marker) + len(marker)
          end = text.index("\n          PY\n", start)
          block = text[start:end]
          lines = []
          for line in block.splitlines():
              if line.startswith('          '):
                  line = line[10:]
              lines.append(line)
          script = '\n'.join(lines) + '\n'

          for target in ('.github/workflows/verify.yml', '.github/workflows/sign-toolhub.yml'):
              call = "replace_once(\n    '%s'," % target
              pos = script.find(call)
              if pos < 0:
                  raise SystemExit('workflow replacement block missing: ' + target)
              end_pos = script.find('\n)\n', pos)
              if end_pos < 0:
                  raise SystemExit('workflow replacement block end missing: ' + target)
              script = script[:pos] + script[end_pos + 3:]

          Path('/tmp/apply_animation_callback_fix.py').write_text(script, encoding='utf-8')
          PY
          python3 /tmp/apply_animation_callback_fix.py

          python3 - <<'PY'
          from pathlib import Path

          position_path = Path('scripts/verify_ball_position_state.py')
          text = position_path.read_text(encoding='utf-8')
          start_token = '    if animation.count("ballAnimationToken") < 4:'
          end_token = '\n\n    reflow = section('
          start = text.index(start_token)
          end = text.index(end_token, start)
          replacement = (
              '    if animation.count("ballAnimationToken") < 4:\n'
              '        fail("animation generation guard is incomplete")\n'
              '    for forbidden in (\n'
              '        "try { if (endCb) endCb(); } catch",\n'
              '        "catch (eCb) {}",\n'
              '    ):\n'
              '        if forbidden in animation:\n'
              '            fail("unsafe animation callback pattern remains: " + forbidden)'
          )
          text = text[:start] + replacement + text[end:]
          text = text.replace(
              'typeof stateObj.wm.updateViewLayout !== "function"',
              'typeof stateObj.wm.updateViewLayout === "function"'
          )
          position_path.write_text(text, encoding='utf-8', newline='\n')

          callback_path = Path('scripts/verify_animation_callback_safety.py')
          callback_text = callback_path.read_text(encoding='utf-8')
          callback_text = callback_text.replace(
              'typeof stateObj.wm.updateViewLayout !== "function"',
              'typeof stateObj.wm.updateViewLayout === "function"'
          )
          callback_path.write_text(callback_text, encoding='utf-8', newline='\n')
          PY

      - name: Regenerate deterministic audits
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/report_dead_module_symbols.py --write DEAD_CODE_AUDIT.md
          python3 scripts/report_protected_wrapper_chains.py --write PROTECTED_WRAPPER_AUDIT.md
          python3 scripts/report_th15_extra_symbols.py --write TH15_EXTRA_AUDIT.md
          python3 scripts/report_th09_animation_symbols.py --write TH09_ANIMATION_AUDIT.md
          python3 scripts/report_entry_symbols.py --write ENTRY_SYMBOL_AUDIT.md

      - name: Verify Rhino ES5 and JavaScript syntax
        shell: bash
        run: |
          set -euo pipefail
          python3 .github/scripts/es5_scan.py
          python3 scripts/verify_js_syntax.py

      - name: Verify ball position state
        shell: bash
        run: python3 scripts/verify_ball_position_state.py

      - name: Verify animation callback safety
        id: callback_safety
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          python3 scripts/verify_animation_callback_safety.py 2>&1 | tee animation-callback-verifier-output.txt

      - name: Upload animation callback verifier details
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: animation-callback-verifier-details
          path: |
            animation-callback-verifier-output.txt
            scripts/verify_animation_callback_safety.py
            code/th_01_base.js
            code/th_08_content.js
            code/th_09_animation.js
            code/th_15_extra.js
            code/th_19_position_state.js
          if-no-files-found: error
          retention-days: 3

      - name: Stop on animation callback verifier failure
        if: steps.callback_safety.outcome != 'success'
        run: exit 1

      - name: Verify crash logging and panel lifecycle
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/verify_major_event_logging.py
          python3 scripts/verify_main_panel_close_lifecycle.py

      - name: Verify module boundaries and versions
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/verify_module_boundaries.py
          python3 scripts/verify_changed_module_versions.py --base-ref origin/main

      - name: Verify whitespace
        shell: bash
        run: git diff --check

      - name: Commit source patch
        shell: bash
        env:
          TOOLHUB_AUTOMATION_TOKEN: ${{ secrets.TOOLHUB_AUTOMATION_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "$TOOLHUB_AUTOMATION_TOKEN" ]; then
            echo "TOOLHUB_AUTOMATION_TOKEN is empty"
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add code scripts DEAD_CODE_AUDIT.md PROTECTED_WRAPPER_AUDIT.md TH15_EXTRA_AUDIT.md TH09_ANIMATION_AUDIT.md ENTRY_SYMBOL_AUDIT.md
          git commit -m "修复动画回调异常与崩溃处理器累积"
          git remote set-url origin "https://x-access-token:${TOOLHUB_AUTOMATION_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin HEAD:fix/animation-callback-crash-20260716
