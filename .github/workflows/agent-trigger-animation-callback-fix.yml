name: agent-trigger-animation-callback-fix

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]

permissions:
  contents: write

concurrency:
  group: agent-trigger-animation-callback-fix-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  trigger:
    if: >
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'fix/animation-callback-crash-20260716'
    runs-on: ubuntu-latest
    environment: signing
    steps:
      - name: Checkout repair branch
        uses: actions/checkout@v4
        with:
          ref: fix/animation-callback-crash-20260716
          fetch-depth: 0
          token: ${{ secrets.TOOLHUB_AUTOMATION_TOKEN || github.token }}
          persist-credentials: false

      - name: Trigger or clean bootstrap workflow
        shell: bash
        env:
          TOOLHUB_AUTOMATION_TOKEN: ${{ secrets.TOOLHUB_AUTOMATION_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "$TOOLHUB_AUTOMATION_TOKEN" ]; then
            echo "TOOLHUB_AUTOMATION_TOKEN is empty"
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${TOOLHUB_AUTOMATION_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          bootstrap=".github/workflows/agent-fix-animation-callback-crash.yml"
          trigger_file=".github/agent-animation-callback-fix-trigger"
          self_file=".github/workflows/agent-trigger-animation-callback-fix.yml"

          if [ -f "$bootstrap" ]; then
            if [ -f "$trigger_file" ]; then
              echo "bootstrap already triggered"
              exit 0
            fi
            printf 'triggered_at=%s\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > "$trigger_file"
            git add "$trigger_file"
            git commit -m "触发动画回调修复工作流"
            git push origin HEAD:fix/animation-callback-crash-20260716
            exit 0
          fi

          git rm -f "$self_file"
          if [ -f "$trigger_file" ]; then
            git rm -f "$trigger_file"
          fi
          git commit -m "清理动画回调修复引导文件"
          git push origin HEAD:fix/animation-callback-crash-20260716
