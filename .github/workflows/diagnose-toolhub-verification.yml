name: Diagnose ToolHub verification

on:
  push:
    branches:
      - agent/fix-pointer-draw-self-heal-20260715

permissions:
  contents: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run verification commands
        shell: bash
        run: |
          set +e
          : > toolhub-verification-log.txt
          status=0
          commands=(
            "python3 .github/scripts/es5_scan.py"
            "python3 scripts/verify_js_syntax.py"
            "python3 scripts/report_entry_symbols.py --check ENTRY_SYMBOL_AUDIT.md"
            "python3 scripts/verify_entry_redundancy_cleanup.py"
            "python3 scripts/verify_entry_writable_probe.py"
            "python3 scripts/verify_sqlite_storage.py"
            "python3 scripts/verify_sqlite_debounce_race.py"
            "python3 scripts/verify_ball_position_state.py"
            "python3 scripts/verify_ball_rebuild_rollback.py"
            "python3 scripts/verify_toolapp_layout.py"
            "python3 scripts/verify_settings_color_scheme.py"
            "python3 scripts/verify_legacy_theme_cleanup.py"
            "python3 scripts/verify_settings_color_roles.py"
            "python3 scripts/verify_coloros_rhino_color_safety.py"
            "python3 scripts/verify_rhino_color_api_safety.py"
            "python3 scripts/verify_button_editor_layout.py"
            "python3 scripts/verify_button_editor_direct_save.py"
            "python3 scripts/verify_schema_validator.py"
            "python3 scripts/verify_entry_lifecycle.py"
            "python3 scripts/verify_atomic_update.py"
            "python3 scripts/verify_release_transaction.py"
            "python3 scripts/verify_startup_status.py"
            "python3 scripts/verify_main_panel_runtime_status.py"
            "python3 scripts/verify_main_panel_drag_sort.py"
            "python3 scripts/verify_main_panel_more_menu.py"
            "python3 scripts/verify_main_panel_paging.py"
            "python3 scripts/verify_main_panel_adaptive_layout.py"
            "python3 scripts/verify_panel_layout_settings_cleanup.py"
            "python3 scripts/verify_legacy_main_panel_cleanup.py"
            "python3 scripts/verify_main_panel_grid_sizing.py"
            "python3 scripts/verify_main_panel_visual_tuning.py"
            "python3 scripts/verify_main_panel_close_lifecycle.py"
            "python3 scripts/verify_update_security_mode.py"
            "python3 scripts/verify_shell_bridge_security.py"
            "python3 scripts/verify_shell_log_redaction.py"
            "python3 scripts/verify_shortcut_security.py"
            "python3 scripts/verify_content_security.py"
            "python3 scripts/verify_module_versions.py"
            "python3 scripts/verify_changed_module_versions.py"
            "python3 scripts/verify_documentation_consistency.py"
            "python3 scripts/verify_github_only_source.py"
            "python3 scripts/verify_pointer_regressions.py"
            "python3 scripts/verify_result_preview.py"
            "python3 .github/scripts/verify_manifest_signature.py"
          )
          for cmd in "${commands[@]}"; do
            printf '\n===== %s =====\n' "$cmd" | tee -a toolhub-verification-log.txt
            bash -lc "$cmd" 2>&1 | tee -a toolhub-verification-log.txt
            rc=${PIPESTATUS[0]}
            printf 'EXIT=%s\n' "$rc" | tee -a toolhub-verification-log.txt
            if [ "$rc" -ne 0 ]; then status=1; fi
          done
          echo "$status" > toolhub-verification-status.txt

      - name: Upload diagnostic log
        uses: actions/upload-artifact@v4
        with:
          name: toolhub-verification-diagnostic
          path: |
            toolhub-verification-log.txt
            toolhub-verification-status.txt
          if-no-files-found: error
          retention-days: 7

      - name: Remove temporary workflow
        if: always()
        run: |
          rm -f .github/workflows/diagnose-toolhub-verification.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -u .github/workflows/diagnose-toolhub-verification.yml
          git commit -m "移除完整校验诊断工作流"
          git push origin HEAD

      - name: Report result
        if: always()
        run: exit "$(cat toolhub-verification-status.txt)"
