name: apply-pointer-lifecycle-ocr-fix-pr

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]

permissions:
  contents: write
  pull-requests: read

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'fix/pointer-lifecycle-ocr-20260715'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fix branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ secrets.TOOLHUB_AUTOMATION_TOKEN || github.token }}

      - name: Apply scoped fixes
        run: python3 scripts/_apply_pointer_lifecycle_ocr_fix.py

      - name: Remove temporary patch files
        shell: bash
        run: |
          rm -f scripts/_apply_pointer_lifecycle_ocr_fix.py
          rm -f .github/workflows/apply-pointer-lifecycle-ocr-fix.yml
          rm -f .github/workflows/apply-pointer-lifecycle-ocr-fix-pr.yml

      - name: Verify Rhino ES5
        run: python3 .github/scripts/es5_scan.py

      - name: Verify JavaScript syntax
        run: python3 scripts/verify_js_syntax.py

      - name: Verify pointer code contracts
        shell: bash
        run: |
          python3 - <<'PY'
          import importlib.util
          from pathlib import Path

          path = Path('scripts/verify_pointer_regressions.py')
          spec = importlib.util.spec_from_file_location('pointer_verify', str(path))
          module = importlib.util.module_from_spec(spec)
          spec.loader.exec_module(module)

          pointer = module.read_text(module.POINTER)
          ocr = module.read_text(module.POINTER_OCR)
          position = module.read_text(module.POSITION)
          animation = module.read_text(module.ANIMATION)
          panels = module.read_text(module.PANELS)
          entry = module.read_text(module.ENTRY)
          result = module.CheckResult()

          module.verify_issue_85(result, pointer, ocr, position, animation)
          module.verify_text_release(result, pointer, position, panels, entry)
          module.verify_pointer_core(result, pointer, ocr)
          module.verify_pointer_draw_visibility(result, pointer)

          for name in result.passed:
              print('PASS ' + name)
          if result.failed:
              for name, detail in result.failed:
                  print('FAIL ' + name + ': ' + detail)
              raise SystemExit(1)
          print('OK pointer_code_contracts total=%d' % len(result.passed))
          PY

      - name: Check whitespace
        run: git diff --check

      - name: Commit fixes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "修复指针生命周期与 OCR 调度竞态"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
