name: Settings interaction stress test migration

on:
  push:
    branches:
      - fix/settings-interaction-stress-test-20260715
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write

jobs:
  migrate:
    if: github.event_name == 'push' || github.head_ref == 'fix/settings-interaction-stress-test-20260715'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: fix/settings-interaction-stress-test-20260715
          fetch-depth: 0

      - name: Fix migration escape
        run: python3 scripts/fix_settings_interaction_migrator_escape.py

      - name: Apply settings interaction stress test
        run: python3 scripts/apply_settings_interaction_stress_test.py

      - name: Refresh dead code audit
        run: python3 scripts/report_dead_module_symbols.py --write DEAD_CODE_AUDIT.md

      - name: Remove temporary executor
        run: |
          rm -f scripts/fix_settings_interaction_migrator_escape.py
          rm -f scripts/apply_settings_interaction_stress_test.py
          rm -f .github/workflows/agent_settings_interaction_stress_test.yml

      - name: Commit source changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "增加设置页真实控件压力测试"

      - name: Fetch main
        run: git fetch origin main

      - name: Verify changed module versions
        run: python3 scripts/verify_changed_module_versions.py --base-ref origin/main

      - name: Verify stress test and syntax
        shell: bash
        run: |
          set +e
          : > settings-interaction-validation.log
          status=0
          for cmd in \
            "python3 scripts/verify_coloros_rhino_color_safety.py" \
            "python3 scripts/verify_rhino_color_api_safety.py" \
            "python3 .github/scripts/es5_scan.py" \
            "python3 scripts/verify_js_syntax.py" \
            "python3 scripts/verify_toolapp_layout.py" \
            "python3 scripts/verify_settings_color_scheme.py"
          do
            echo "== $cmd ==" | tee -a settings-interaction-validation.log
            bash -lc "$cmd" 2>&1 | tee -a settings-interaction-validation.log
            rc=${PIPESTATUS[0]}
            echo "exit=$rc" | tee -a settings-interaction-validation.log
            if [ "$rc" -ne 0 ]; then status=1; fi
          done
          exit "$status"

      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: settings-interaction-validation
          path: settings-interaction-validation.log
          if-no-files-found: warn
          retention-days: 3

      - name: Push source commit
        run: git push origin HEAD:fix/settings-interaction-stress-test-20260715
