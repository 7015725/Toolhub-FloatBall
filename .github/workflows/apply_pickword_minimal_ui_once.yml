name: apply-pickword-minimal-ui-once

on:
  push:
    branches:
      - fix/pickword-minimal-ui-20260717
    paths:
      - .github/workflows/apply_pickword_minimal_ui_once.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: fix/pickword-minimal-ui-20260717
          fetch-depth: 0
          token: ${{ secrets.TOOLHUB_AUTOMATION_TOKEN || github.token }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Apply precise minimal UI patch
        run: python3 scripts/apply_pickword_minimal_ui_once.py

      - name: Verify changed module versions
        run: |
          git fetch --no-tags origin main
          python3 scripts/verify_changed_module_versions.py --base-ref origin/main

      - name: Verify Rhino ES5 and JavaScript syntax
        run: |
          python3 .github/scripts/es5_scan.py
          python3 scripts/verify_js_syntax.py

      - name: Verify module and UI boundaries
        run: |
          python3 scripts/verify_module_boundaries.py
          python3 scripts/verify_result_preview.py
          python3 scripts/verify_settings_color_scheme.py
          python3 scripts/verify_settings_color_roles.py
          python3 scripts/verify_coloros_rhino_color_safety.py
          python3 scripts/verify_rhino_color_api_safety.py
          python3 scripts/verify_update_history.py --require-one-pending

      - name: Verify minimal visual markers
        run: |
          python3 - <<'PY'
          from pathlib import Path
          text = Path('code/th_20_pickword.js').read_text(encoding='utf-8')
          checks = {
              'version': '// @version 1.0.5' in text,
              'height_cap': 'TEXT_AREA_HEIGHT_DP: 320' in text,
              'flat_preview': 'previewBox.setBackground(createRoundRectDrawable(Color.TRANSPARENT, 0));' in text,
              'compact_actions': 'new LinearLayout.LayoutParams(0, uiDp(38, 42), 2)' in text,
              'blog_action': 'titleContainer.setContentDescription("拾字；点击复制博客链接")' in text,
              'no_button_widget': 'new Button(appContext)' not in text[text.find('createPrimaryBtn: function'):text.find('createFingerPreview: function')],
          }
          failed = [name for name, ok in checks.items() if not ok]
          if failed:
              raise SystemExit('FAIL minimal markers: ' + ', '.join(failed))
          print('OK pickword_minimal_ui ' + ' '.join(name + '=1' for name in checks))
          PY

      - name: Remove one-time automation files
        run: |
          rm -f scripts/apply_pickword_minimal_ui_once.py
          rm -f .github/workflows/apply_pickword_minimal_ui_once.yml

      - name: Check final diff
        run: |
          git diff --check
          git status --short
          test -n "$(git status --porcelain)"

      - name: Commit implementation
        env:
          TARGET_BRANCH: fix/pickword-minimal-ui-20260717
          TOOLHUB_AUTOMATION_TOKEN: ${{ secrets.TOOLHUB_AUTOMATION_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "拾字窗口改为极简布局"
          if [ -n "$TOOLHUB_AUTOMATION_TOKEN" ]; then
            git remote set-url origin "https://x-access-token:${TOOLHUB_AUTOMATION_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          fi
          git push origin "HEAD:${TARGET_BRANCH}"

