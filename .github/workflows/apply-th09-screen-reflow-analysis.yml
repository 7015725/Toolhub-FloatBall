name: apply-th09-screen-reflow-analysis

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: apply-th09-screen-reflow-analysis
  cancel-in-progress: false

jobs:
  apply:
    if: >
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'audit/th09-screen-reflow-pair' &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout analysis branch
        uses: actions/checkout@v4
        with:
          ref: audit/th09-screen-reflow-pair
          fetch-depth: 0
          token: ${{ secrets.TOOLHUB_AUTOMATION_TOKEN || github.token }}
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate analysis
        run: python3 scripts/verify_th09_screen_reflow_pair.py --write TH09_SCREEN_REFLOW_ANALYSIS.md

      - name: Verify analysis
        shell: bash
        run: |
          python3 scripts/verify_module_boundaries.py
          python3 scripts/report_dead_module_symbols.py --check DEAD_CODE_AUDIT.md
          python3 scripts/report_th09_animation_symbols.py --check TH09_ANIMATION_AUDIT.md
          python3 scripts/verify_th09_screen_reflow_pair.py --check TH09_SCREEN_REFLOW_ANALYSIS.md
          python3 scripts/verify_ball_position_state.py
          python3 -m compileall -q scripts .github/scripts
          git diff --check

      - name: Remove temporary workflow
        run: rm -f .github/workflows/apply-th09-screen-reflow-analysis.yml

      - name: Commit analysis report
        shell: bash
        env:
          TOOLHUB_AUTOMATION_TOKEN: ${{ secrets.TOOLHUB_AUTOMATION_TOKEN }}
        run: |
          if [ -z "$TOOLHUB_AUTOMATION_TOKEN" ]; then
            echo "TOOLHUB_AUTOMATION_TOKEN is empty"
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "生成 th_09 屏幕重排分析"
          git remote set-url origin "https://x-access-token:${TOOLHUB_AUTOMATION_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin HEAD:audit/th09-screen-reflow-pair
