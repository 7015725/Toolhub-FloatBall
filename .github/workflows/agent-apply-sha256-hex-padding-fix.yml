name: agent-apply-sha256-hex-padding-fix

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]

permissions:
  contents: write

concurrency:
  group: agent-apply-sha256-hex-padding-fix
  cancel-in-progress: false

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'fix/sha256-hex-padding'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix/sha256-hex-padding
          fetch-depth: 0

      - name: Apply fix
        run: python3 .agent/apply_sha256_hex_padding_fix.py

      - name: Restore workflow files for connector cleanup
        run: git checkout -- .github/workflows

      - name: Verify JavaScript and versions
        run: |
          python3 .github/scripts/es5_scan.py
          python3 scripts/verify_js_syntax.py
          python3 scripts/verify_changed_module_versions.py --base-ref origin/main

      - name: Verify SHA256 and update page
        run: |
          python3 scripts/verify_update_version_page.py
          python3 scripts/verify_sqlite_storage.py
          python3 scripts/verify_module_boundaries.py
          python3 scripts/report_dead_module_symbols.py --check DEAD_CODE_AUDIT.md

      - name: Verify diff
        run: git diff --check

      - name: Commit fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add code/th_03_icon.js code/th_14_panels.js scripts/verify_update_version_page.py updates/records/fix-sha256-hex-padding.json
          if git diff --cached --quiet; then
            echo "No fix changes"
            exit 1
          fi
          git commit -m "修复 SHA256 十六进制前导零"
          git push origin HEAD:fix/sha256-hex-padding
