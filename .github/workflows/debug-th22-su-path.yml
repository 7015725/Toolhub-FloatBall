name: debug-th22-su-path

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]

permissions:
  contents: read

jobs:
  debug:
    if: github.event.pull_request.head.ref == 'fix/pickword-image-su-path-20260719'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Run patch diagnostic
        shell: bash
        run: |
          set +e
          python3 scripts/apply_th22_su_path_fix.py > th22-su-path-debug.log 2>&1
          code=$?
          echo "exit_code=$code" >> th22-su-path-debug.log
          git status --short >> th22-su-path-debug.log 2>&1
          exit 0
      - name: Upload diagnostic
        uses: actions/upload-artifact@v4
        with:
          name: th22-su-path-debug
          path: th22-su-path-debug.log
          if-no-files-found: error
