name: tmp-patch-pointer-screenshot-dir

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: tmp-patch-pointer-screenshot-dir-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  patch:
    if: github.event.pull_request.head.ref == 'fix/pointer-screenshot-shortx-dir-20260714'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repair branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ secrets.TOOLHUB_AUTOMATION_TOKEN || github.token }}
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Apply focused patch
        run: python3 .github/scripts/tmp_patch_pointer_screenshot_dir.py

      - name: Verify changed module version
        run: |
          git fetch --no-tags origin main --depth=1
          python3 scripts/verify_changed_module_versions.py --base-ref origin/main

      - name: Verify Rhino ES5 and JavaScript syntax
        run: |
          python3 .github/scripts/es5_scan.py
          python3 scripts/verify_js_syntax.py

      - name: Verify focused source contract
        run: |
          python3 - <<'PY'
          from pathlib import Path
          source = Path('code/th_17_pointer.js').read_text(encoding='utf-8')
          verify = Path('scripts/verify_pointer_regressions.py').read_text(encoding='utf-8')
          required = (
              '// @version 1.2.2',
              'shortx.getShortXDir()',
              'new java.io.File(base, "ToolHub/screenshots")',
              'dir.mkdirs() !== true',
          )
          for fragment in required:
              if fragment not in source:
                  raise SystemExit('missing source contract: ' + fragment)
          for fragment in ('base + "/data/screenshots"', 'getToolHubAndroidContext ? getToolHubAndroidContext() : null'):
              if fragment in source:
                  raise SystemExit('stale source contract: ' + fragment)
          if 'N9 screenshot directory is ShortX ToolHub/screenshots' not in verify:
              raise SystemExit('missing regression contract')
          print('OK focused pointer screenshot path contract')
          PY

      - name: Check whitespace
        run: git diff --check

      - name: Remove temporary files
        run: |
          rm -f .github/scripts/tmp_patch_pointer_screenshot_dir.py
          rm -f .github/workflows/tmp-patch-pointer-screenshot-dir.yml

      - name: Commit repair
        env:
          TOOLHUB_AUTOMATION_TOKEN: ${{ secrets.TOOLHUB_AUTOMATION_TOKEN }}
        run: |
          if [ -z "$TOOLHUB_AUTOMATION_TOKEN" ]; then
            echo "TOOLHUB_AUTOMATION_TOKEN is empty"
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "修改指针框选截图保存目录"
          git remote set-url origin "https://x-access-token:${TOOLHUB_AUTOMATION_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
