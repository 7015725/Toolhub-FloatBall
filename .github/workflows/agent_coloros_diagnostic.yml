name: Diagnose Rhino color safety

on:
  pull_request:
    branches: [main]
    types: [synchronize]

permissions:
  contents: read

jobs:
  diagnose:
    if: github.event.pull_request.head.ref == 'fix/coloros-press-feedback-safety-corrective-20260715'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix/coloros-press-feedback-safety-corrective-20260715
          fetch-depth: 0

      - name: Capture Rhino color safety output
        id: capture
        continue-on-error: true
        shell: bash
        run: |
          python3 scripts/verify_rhino_color_api_safety.py > agent_rhino_color_safety.log 2>&1
          rc=$?
          cat agent_rhino_color_safety.log
          exit "$rc"

      - name: Upload Rhino diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rhino-color-safety-diagnostics
          path: agent_rhino_color_safety.log
          if-no-files-found: error
          retention-days: 1

      - name: Preserve failure status
        if: steps.capture.outcome != 'success'
        run: exit 1
