name: fix-result-preview-terminal-verifier

on:
  pull_request:
    branches: [main]
    types: [synchronize]

permissions:
  contents: write
  pull-requests: read

jobs:
  fix:
    if: github.event.pull_request.head.ref == 'fix/result-preview-terminal-state-cleanup-20260716'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout head branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ secrets.TOOLHUB_AUTOMATION_TOKEN || github.token }}

      - name: Clean verifier
        run: python3 scripts/fix_result_preview_terminal_verifier.py

      - name: Remove temporary fixer
        run: |
          rm scripts/fix_result_preview_terminal_verifier.py
          rm .github/workflows/fix-result-preview-terminal-verifier.yml

      - name: Verify focused invariants
        run: |
          python3 .github/scripts/es5_scan.py
          python3 scripts/verify_js_syntax.py
          python3 scripts/verify_result_preview.py
          git diff --check

      - name: Commit verifier cleanup
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add scripts/verify_result_preview.py scripts/fix_result_preview_terminal_verifier.py .github/workflows/fix-result-preview-terminal-verifier.yml
          git commit -m "整理结果预览终审门禁"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
