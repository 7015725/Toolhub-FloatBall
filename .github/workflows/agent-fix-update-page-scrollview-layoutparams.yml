name: agent-fix-update-page-scrollview-layoutparams

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  fix:
    if: github.event.pull_request.head.ref == 'fix/update-page-scrollview-layoutparams'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix/update-page-scrollview-layoutparams
          fetch-depth: 0

      - name: Apply focused fix
        run: |
          python3 - <<'PY'
          from pathlib import Path

          target = Path('code/th_14_panels.js')
          text = target.read_text(encoding='utf-8')
          old_version = '// @version 1.1.0'
          new_version = '// @version 1.1.1'
          old_line = 'scroll.addView(root, new android.widget.ScrollView.LayoutParams(-1, -2));'
          new_line = 'scroll.addView(root, new android.widget.FrameLayout.LayoutParams(-1, -2));'
          if text.count(old_version) != 1:
              raise SystemExit('unexpected th_14 version marker')
          if text.count(old_line) != 1:
              raise SystemExit('unexpected ScrollView.LayoutParams occurrence')
          text = text.replace(old_version, new_version, 1)
          text = text.replace(old_line, new_line, 1)
          target.write_text(text, encoding='utf-8')

          verifier = Path('scripts/verify_update_version_page.py')
          vtext = verifier.read_text(encoding='utf-8')
          anchor = '    "分页固定十条": "var HISTORY_PAGE_SIZE = 10" in TH14,\n'
          insert = (
              anchor
              + '    "禁止 Rhino 不兼容 ScrollView.LayoutParams": "android.widget.ScrollView.LayoutParams" not in TH14,\n'
              + '    "ScrollView 子布局使用 FrameLayout.LayoutParams": "scroll.addView(root, new android.widget.FrameLayout.LayoutParams(-1, -2));" in TH14,\n'
          )
          if vtext.count(anchor) != 1:
              raise SystemExit('update verifier anchor missing')
          vtext = vtext.replace(anchor, insert, 1)
          verifier.write_text(vtext, encoding='utf-8')
          PY

      - name: Verify focused fix
        run: |
          python3 .github/scripts/es5_scan.py
          python3 scripts/verify_js_syntax.py
          python3 scripts/verify_changed_module_versions.py --base-ref origin/main
          python3 scripts/verify_update_version_page.py
          python3 scripts/verify_toolapp_layout.py
          python3 scripts/verify_toolapp_main_thread_affinity.py
          git diff --check

      - name: Keep workflow file out of runtime commit
        run: git checkout -- .github/workflows/agent-fix-update-page-scrollview-layoutparams.yml

      - name: Commit fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add code/th_14_panels.js scripts/verify_update_version_page.py
          git commit -m "修复更新页 ScrollView 布局参数"
          git push origin HEAD:fix/update-page-scrollview-layoutparams
