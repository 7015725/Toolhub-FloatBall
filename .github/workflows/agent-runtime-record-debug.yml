name: agent-runtime-record-debug

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: read

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: fix/runtime-record-scroll-20260715
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Reuse patch script
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import textwrap

          workflow = Path('.github/workflows/agent-runtime-record-scroll.yml').read_text(encoding='utf-8')
          marker = "          python3 - <<'PY'\n"
          start = workflow.index(marker) + len(marker)
          end = workflow.index("\n          PY\n", start)
          script = textwrap.dedent(workflow[start:end])
          exec(compile(script, 'runtime-record-patch.py', 'exec'), {})
          PY

      - name: Run verification with log
        shell: bash
        run: |
          set -o pipefail
          {
            git fetch --no-tags origin main
            echo '== ES5 scan =='
            python3 .github/scripts/es5_scan.py
            echo '== JS syntax =='
            python3 scripts/verify_js_syntax.py
            echo '== ColorOS Rhino color safety =='
            python3 scripts/verify_coloros_rhino_color_safety.py
            echo '== ToolApp layout =='
            python3 scripts/verify_toolapp_layout.py
            echo '== Major event logging =='
            python3 scripts/verify_major_event_logging.py
            echo '== Changed module versions =='
            python3 scripts/verify_changed_module_versions.py --base-ref origin/main
            echo '== Whitespace =='
            git diff --check
          } 2>&1 | tee verify-output.txt

      - name: Upload verification log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-record-verification-log
          path: |
            verify-output.txt
            patch-error.txt
          if-no-files-found: warn
          retention-days: 3
