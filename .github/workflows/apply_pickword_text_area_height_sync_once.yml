name: apply-pickword-text-area-height-sync-once

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: read

jobs:
  apply:
    if: github.head_ref == 'fix/pickword-text-area-height-sync-20260717'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: fix/pickword-text-area-height-sync-20260717
          fetch-depth: 0
          token: ${{ secrets.TOOLHUB_AUTOMATION_TOKEN || github.token }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Apply text-area height synchronization
        run: python3 scripts/apply_pickword_text_area_height_sync_once.py

      - name: Verify changed module versions
        run: |
          git fetch --no-tags origin main
          python3 scripts/verify_changed_module_versions.py --base-ref origin/main

      - name: Verify Rhino ES5 and JavaScript syntax
        run: |
          python3 .github/scripts/es5_scan.py
          python3 scripts/verify_js_syntax.py

      - name: Verify module boundaries
        run: python3 scripts/verify_module_boundaries.py

      - name: Verify result preview integration
        run: python3 scripts/verify_result_preview.py

      - name: Verify settings color scheme
        run: python3 scripts/verify_settings_color_scheme.py

      - name: Verify settings color roles
        run: python3 scripts/verify_settings_color_roles.py

      - name: Verify ColorOS Rhino color safety
        run: python3 scripts/verify_coloros_rhino_color_safety.py

      - name: Verify full Rhino color API safety
        run: python3 scripts/verify_rhino_color_api_safety.py

      - name: Verify pending update record
        run: python3 scripts/verify_update_history.py --require-one-pending

      - name: Verify text-area height contract
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path('code/th_20_pickword.js').read_text(encoding='utf-8')
          checks = {
              'version': '// @version 1.0.8' in p,
              'canvas minimum': 'Math.max(Math.round(state.contentHeight), Math.round(uiDp(80, 96)))' in p,
              'parent minimum': 'textAreaMinHeight = Math.min(textAreaHeight, Math.round(uiDp(80, 96)));' in p,
              'screen percentage removed': 'screenHeight * 0.105' not in p,
              'extra padding removed': 'contentHeight + uiDp(8, 10)' not in p,
              'bounded adaptive height': 'Math.min(Math.max(adaptiveHeight, textAreaMinHeight), textAreaHeight)' in p,
              'fill viewport unchanged': 'scrollView.setFillViewport(false)' in p,
          }
          failed = [name for name, ok in checks.items() if not ok]
          for name, ok in checks.items():
              print(('PASS ' if ok else 'FAIL ') + name)
          if failed:
              raise SystemExit('failed markers: ' + ', '.join(failed))
          PY

      - name: Remove one-time automation files
        run: |
          rm -f scripts/apply_pickword_text_area_height_sync_once.py
          rm -f .github/workflows/apply_pickword_text_area_height_sync_once.yml

      - name: Check final diff
        run: |
          git diff --check
          git status --short
          test -n "$(git status --porcelain)"

      - name: Commit implementation
        env:
          TARGET_BRANCH: fix/pickword-text-area-height-sync-20260717
          TOOLHUB_AUTOMATION_TOKEN: ${{ secrets.TOOLHUB_AUTOMATION_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "修复拾字短文本区域底部空条"
          if [ -n "$TOOLHUB_AUTOMATION_TOKEN" ]; then
            git remote set-url origin "https://x-access-token:${TOOLHUB_AUTOMATION_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          fi
          git push origin "HEAD:${TARGET_BRANCH}"
