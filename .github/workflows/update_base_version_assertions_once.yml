name: update-base-version-assertions-once

on:
  push:
    branches:
      - fix/pickword-translate-settings-20260717
    paths:
      - .github/workflows/update_base_version_assertions_once.yml

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix/pickword-translate-settings-20260717
          fetch-depth: 0
          token: ${{ secrets.TOOLHUB_AUTOMATION_TOKEN || github.token }}

      - name: Update exact version assertions
        run: |
          python3 - <<'PY'
          from pathlib import Path
          paths = [
              Path('scripts/verify_main_panel_adaptive_layout.py'),
              Path('scripts/verify_main_panel_visual_tuning.py'),
          ]
          for path in paths:
              text = path.read_text(encoding='utf-8')
              old = 'version(BASE, "1.1.16", "th_01_base.js")'
              new = 'version(BASE, "1.1.17", "th_01_base.js")'
              if text.count(old) != 1:
                  raise SystemExit('%s expected one old assertion' % path)
              path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
          python3 scripts/verify_main_panel_adaptive_layout.py
          python3 scripts/verify_main_panel_visual_tuning.py

      - name: Remove temporary workflow and commit
        env:
          TARGET_BRANCH: fix/pickword-translate-settings-20260717
          TOOLHUB_AUTOMATION_TOKEN: ${{ secrets.TOOLHUB_AUTOMATION_TOKEN }}
        run: |
          rm -f .github/workflows/update_base_version_assertions_once.yml
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "同步基础模块版本校验"
          if [ -n "$TOOLHUB_AUTOMATION_TOKEN" ]; then
            git remote set-url origin "https://x-access-token:${TOOLHUB_AUTOMATION_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          fi
          git push origin "HEAD:${TARGET_BRANCH}"
