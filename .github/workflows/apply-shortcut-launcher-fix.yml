name: apply-shortcut-launcher-fix

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize]

permissions:
  contents: write

jobs:
  apply:
    if: ${{ github.head_ref == 'fix/shortcut-launcher-save-20260716' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix/shortcut-launcher-save-20260716
          fetch-depth: 0

      - name: Check patch marker
        id: guard
        shell: bash
        run: |
          set -euo pipefail
          if git log -1 --pretty=%B | grep -Fq '[shortcut-patch-applied]'; then
            echo 'apply=false' >> "$GITHUB_OUTPUT"
          else
            echo 'apply=true' >> "$GITHUB_OUTPUT"
          fi

      - name: Apply focused patch
        if: steps.guard.outputs.apply == 'true'
        run: python3 scripts/apply_shortcut_launcher_fix.py

      - name: Compile Python checks
        if: steps.guard.outputs.apply == 'true'
        run: python3 -m py_compile scripts/verify_shortcut_security.py scripts/verify_shortcut_launcher_path.py

      - name: ES5 scan
        if: steps.guard.outputs.apply == 'true'
        run: python3 .github/scripts/es5_scan.py

      - name: JavaScript syntax
        if: steps.guard.outputs.apply == 'true'
        run: python3 scripts/verify_js_syntax.py

      - name: Diff whitespace
        if: steps.guard.outputs.apply == 'true'
        run: git diff --check

      - name: Button editor layout
        if: steps.guard.outputs.apply == 'true'
        run: python3 scripts/verify_button_editor_layout.py

      - name: Button editor direct save
        if: steps.guard.outputs.apply == 'true'
        run: python3 scripts/verify_button_editor_direct_save.py

      - name: Shortcut picker thread affinity
        if: steps.guard.outputs.apply == 'true'
        run: python3 scripts/verify_button_shortcut_thread_affinity.py

      - name: Shortcut security
        if: steps.guard.outputs.apply == 'true'
        run: python3 scripts/verify_shortcut_security.py

      - name: Shortcut launcher path
        if: steps.guard.outputs.apply == 'true'
        run: python3 scripts/verify_shortcut_launcher_path.py

      - name: Commit patch
        if: steps.guard.outputs.apply == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add code/th_11_action.js code/th_14_button_editor.js code/th_14_button_shortcut.js scripts/verify_shortcut_security.py scripts/verify_shortcut_launcher_path.py
          git commit -m "修复快捷方式保存与结构化启动 [shortcut-patch-applied]"
          git push origin HEAD:fix/shortcut-launcher-save-20260716
