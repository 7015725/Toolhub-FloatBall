name: apply-result-preview-settings-flicker

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize]

permissions:
  contents: write
  pull-requests: read

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'fix/result-preview-settings-flicker' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ secrets.TOOLHUB_AUTOMATION_TOKEN || github.token }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Prepare verification patch
        run: python3 scripts/prepare_result_preview_settings_flicker.py

      - name: Apply precise fix
        run: python3 scripts/apply_result_preview_settings_flicker.py

      - name: Regenerate deterministic audits
        run: |
          python3 scripts/report_th15_extra_symbols.py --write TH15_EXTRA_AUDIT.md
          python3 scripts/report_dead_module_symbols.py --write DEAD_CODE_AUDIT.md
          python3 scripts/report_th15_extra_symbols.py --check TH15_EXTRA_AUDIT.md
          python3 scripts/report_dead_module_symbols.py --check DEAD_CODE_AUDIT.md

      - name: Verify ES5 and JavaScript syntax
        run: |
          python3 .github/scripts/es5_scan.py
          python3 scripts/verify_js_syntax.py

      - name: Verify changed module versions
        run: |
          git fetch --no-tags origin main
          python3 scripts/verify_changed_module_versions.py --base-ref origin/main

      - name: Verify module boundaries
        run: python3 scripts/verify_module_boundaries.py

      - name: Verify protected wrapper audit
        run: python3 scripts/report_protected_wrapper_chains.py --check PROTECTED_WRAPPER_AUDIT.md

      - name: Verify th09 audit
        run: python3 scripts/report_th09_animation_symbols.py --check TH09_ANIMATION_AUDIT.md

      - name: Verify entry audit
        run: python3 scripts/report_entry_symbols.py --check ENTRY_SYMBOL_AUDIT.md

      - name: Verify result preview stability
        run: python3 scripts/verify_result_preview.py

      - name: Verify update entry local refresh
        run: python3 scripts/verify_update_version_page.py

      - name: Verify ToolApp stable layout
        run: python3 scripts/verify_toolapp_layout.py

      - name: Verify ToolApp main-thread affinity
        run: python3 scripts/verify_toolapp_main_thread_affinity.py

      - name: Verify schema and release record
        run: |
          python3 scripts/verify_schema_validator.py
          python3 scripts/verify_update_history.py --require-one-pending

      - name: Check whitespace
        run: git diff --check

      - name: Remove temporary executor files
        run: |
          git rm .github/workflows/apply-result-preview-settings-flicker.yml
          git rm scripts/apply_result_preview_settings_flicker.py
          git rm scripts/prepare_result_preview_settings_flicker.py

      - name: Stage and commit final fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add code scripts TH15_EXTRA_AUDIT.md DEAD_CODE_AUDIT.md updates/records
          git status --short
          git commit -m "修复结果预览与设置页闪烁"

      - name: Push final fix
        env:
          TOOLHUB_AUTOMATION_TOKEN: ${{ secrets.TOOLHUB_AUTOMATION_TOKEN }}
        run: |
          if [ -n "$TOOLHUB_AUTOMATION_TOKEN" ]; then
            git remote set-url origin "https://x-access-token:${TOOLHUB_AUTOMATION_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          fi
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
