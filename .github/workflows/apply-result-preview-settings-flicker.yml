name: apply-result-preview-settings-flicker

on:
  pull_request:
    branches: [main]
    types: [opened]

permissions:
  contents: write
  pull-requests: read

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'fix/result-preview-settings-flicker' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Apply precise fix
        run: python3 scripts/apply_result_preview_settings_flicker.py

      - name: Regenerate th15 audit
        run: |
          python3 scripts/report_th15_extra_symbols.py --write TH15_EXTRA_AUDIT.md
          python3 scripts/report_th15_extra_symbols.py --check TH15_EXTRA_AUDIT.md

      - name: Run focused verification
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags origin main
          python3 .github/scripts/es5_scan.py
          python3 scripts/verify_js_syntax.py
          python3 scripts/verify_changed_module_versions.py --base-ref origin/main
          python3 scripts/verify_module_boundaries.py
          python3 scripts/report_dead_module_symbols.py --check DEAD_CODE_AUDIT.md
          python3 scripts/report_protected_wrapper_chains.py --check PROTECTED_WRAPPER_AUDIT.md
          python3 scripts/report_th09_animation_symbols.py --check TH09_ANIMATION_AUDIT.md
          python3 scripts/report_entry_symbols.py --check ENTRY_SYMBOL_AUDIT.md
          python3 scripts/verify_result_preview.py
          python3 scripts/verify_update_version_page.py
          python3 scripts/verify_toolapp_layout.py
          python3 scripts/verify_toolapp_main_thread_affinity.py
          python3 scripts/verify_schema_validator.py
          python3 scripts/verify_update_history.py --require-one-pending
          git diff --check

      - name: Commit applied fix
        shell: bash
        run: |
          set -euo pipefail
          git rm .github/workflows/apply-result-preview-settings-flicker.yml
          git rm scripts/apply_result_preview_settings_flicker.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add code scripts TH15_EXTRA_AUDIT.md updates/records
          git commit -m "修复结果预览与设置页闪烁"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
