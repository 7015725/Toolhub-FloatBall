name: diagnose-pointer-reference

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  capture:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/pointer-reference-release
          fetch-depth: 0
      - name: Capture verifier output
        shell: bash
        run: |
          set +e
          python3 scripts/verify_ball_position_state.py > scripts/pointer_position_verify.log 2>&1
          status=$?
          echo "exit_status=$status" >> scripts/pointer_position_verify.log
          cat scripts/pointer_position_verify.log
          exit 0
      - name: Commit diagnostic output
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/pointer_position_verify.log
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "记录指针状态校验错误"
          git push origin HEAD:fix/pointer-reference-release
