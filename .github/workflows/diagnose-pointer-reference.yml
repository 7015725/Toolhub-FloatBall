name: diagnose-pointer-reference

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/pointer-reference-release
          fetch-depth: 0
      - name: Fix verifier assertion
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('scripts/verify_ball_position_state.py')
          text = path.read_text(encoding='utf-8')
          old = '''    candidate_at = finalizer.index("pointerCandidateMatchesFinalHotspot")
              extract_at = finalizer.index("extractCurrentPointerText(true, st.releaseTs)")
              scan_at = finalizer.index('schedulePointerInspectAsync(true, "release_final", true)')
          '''
          new = '''    candidate_at = finalizer.index("pointerCandidateMatchesFinalHotspot")
              extract_at = finalizer.index("extractCurrentPointerText(true, st.releaseTs)", candidate_at)
              scan_at = finalizer.index('schedulePointerInspectAsync(true, "release_final", true)', extract_at)
          '''
          if old not in text:
              raise SystemExit('verifier assertion block not found')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
          rm -f .github/workflows/diagnose-pointer-reference.yml
          rm -f scripts/pointer_position_verify.log
      - name: Verify final tree
        run: |
          python3 scripts/verify_ball_position_state.py
          python3 scripts/verify_pointer_issue_85.py
          python3 .github/scripts/es5_scan.py
          git diff --check
      - name: Commit verifier fix and cleanup
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A .github/workflows/diagnose-pointer-reference.yml scripts/verify_ball_position_state.py scripts/pointer_position_verify.log
          git commit -m "修正最近候选提交顺序校验"
          git push origin HEAD:fix/pointer-reference-release
