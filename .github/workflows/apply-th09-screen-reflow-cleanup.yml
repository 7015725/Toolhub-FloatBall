name: apply-th09-screen-reflow-cleanup

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: apply-th09-screen-reflow-cleanup
  cancel-in-progress: false

jobs:
  apply:
    if: >
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'fix/remove-th09-screen-reflow-fallbacks' &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout cleanup branch
        uses: actions/checkout@v4
        with:
          ref: fix/remove-th09-screen-reflow-fallbacks
          fetch-depth: 0
          token: ${{ secrets.TOOLHUB_AUTOMATION_TOKEN || github.token }}
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Apply cleanup
        run: python3 scripts/apply_th09_screen_reflow_cleanup.py

      - name: Refresh audits
        shell: bash
        run: |
          python3 scripts/report_dead_module_symbols.py --write DEAD_CODE_AUDIT.md
          python3 scripts/report_th09_animation_symbols.py --write TH09_ANIMATION_AUDIT.md

      - name: Verify cleanup before signing
        shell: bash
        run: |
          python3 .github/scripts/es5_scan.py
          python3 scripts/verify_js_syntax.py
          python3 scripts/verify_module_boundaries.py
          python3 scripts/report_dead_module_symbols.py --check DEAD_CODE_AUDIT.md
          python3 scripts/report_th15_extra_symbols.py --check TH15_EXTRA_AUDIT.md
          python3 scripts/report_th09_animation_symbols.py --check TH09_ANIMATION_AUDIT.md
          python3 scripts/verify_ball_position_state.py
          python3 scripts/verify_sqlite_storage.py
          python3 scripts/verify_toolapp_layout.py
          python3 scripts/verify_button_editor_layout.py
          python3 scripts/verify_schema_validator.py
          python3 -m compileall -q scripts .github/scripts
          git diff --check

      - name: Remove temporary files
        run: |
          rm -f scripts/apply_th09_screen_reflow_cleanup.py
          rm -f .github/workflows/apply-th09-screen-reflow-cleanup.yml

      - name: Commit cleanup
        shell: bash
        env:
          TOOLHUB_AUTOMATION_TOKEN: ${{ secrets.TOOLHUB_AUTOMATION_TOKEN }}
        run: |
          if [ -z "$TOOLHUB_AUTOMATION_TOKEN" ]; then
            echo "TOOLHUB_AUTOMATION_TOKEN is empty"
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "删除 th_09 屏幕重排旧实现"
          git remote set-url origin "https://x-access-token:${TOOLHUB_AUTOMATION_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin HEAD:fix/remove-th09-screen-reflow-fallbacks
