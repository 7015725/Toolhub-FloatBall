name: ci-python-execution-inventory

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - 'scripts/**'
      - '.github/scripts/**'
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - 'scripts/**'
      - '.github/scripts/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  inventory:
    name: ci-python-execution-inventory
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Verify workflow script references
        run: python3 scripts/verify_workflow_script_references.py

      - name: Build CI Python execution inventory
        shell: bash
        run: |
          set -o pipefail
          python3 scripts/report_ci_python_execution.py --output ci-python-execution-inventory.md 2>&1 | tee ci-python-execution-inventory-log.txt

      - name: Upload CI Python execution inventory
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-python-execution-inventory
          path: |
            ci-python-execution-inventory.md
            ci-python-execution-inventory-log.txt
          if-no-files-found: error
          retention-days: 7

      - name: Profile overlapping Python checks
        shell: bash
        timeout-minutes: 15
        run: |
          set -eo pipefail
          python3 scripts/profile_ci_python_checks.py --runs 5 --output-dir ci-python-timing 2>&1 | tee ci-python-timing-log.txt
          cat ci-python-timing/summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload CI Python timing sample
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-python-timing-sample
          path: |
            ci-python-timing/
            ci-python-timing-log.txt
          if-no-files-found: warn
          retention-days: 7

      - name: Audit Markdown and Python organization
        shell: bash
        run: |
          set -eo pipefail
          python3 scripts/audit_md_py_organization.py
          cat md-py-organization-audit.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Markdown and Python organization audit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: md-py-organization-audit
          path: |
            md-py-organization-audit.md
            md-py-organization-audit.json
          if-no-files-found: error
          retention-days: 7

      - name: Build repository maintenance snapshot
        shell: bash
        run: |
          tar \
            --exclude=.git \
            --exclude=ci-python-timing \
            --exclude=ci-python-timing-log.txt \
            --exclude=md-py-organization-audit.md \
            --exclude=md-py-organization-audit.json \
            --exclude=ci-python-execution-inventory-log.txt \
            -czf "$RUNNER_TEMP/repository-maintenance-snapshot.tar.gz" .

      - name: Upload repository maintenance snapshot
        uses: actions/upload-artifact@v4
        with:
          name: repository-maintenance-snapshot
          path: ${{ runner.temp }}/repository-maintenance-snapshot.tar.gz
          if-no-files-found: error
          retention-days: 1

      - name: Check git whitespace
        shell: bash
        run: git diff --check
