name: sync-beta-channel-switch-observability

on:
  push:
    branches: [fix/beta-channel-switch-observability]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-beta-channel-switch-observability
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/beta-channel-switch-observability
          fetch-depth: 0
          token: ${{ secrets.TOOLHUB_AUTOMATION_TOKEN || github.token }}
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Sync and commit
        env:
          TOOLHUB_AUTOMATION_TOKEN: ${{ secrets.TOOLHUB_AUTOMATION_TOKEN }}
        run: |
          git fetch --no-tags origin main
          python3 scripts/sync_beta_channel_switch_observability_once.py
          rm -f .github/workflows/sync-beta-channel-switch-observability.yml
          git diff --check
          if [ -z "$TOOLHUB_AUTOMATION_TOKEN" ]; then
            echo "TOOLHUB_AUTOMATION_TOKEN is empty"
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Beta 同步通道切换可观测性"
          git remote set-url origin "https://x-access-token:${TOOLHUB_AUTOMATION_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin HEAD:fix/beta-channel-switch-observability
