name: commit-main-panel-grid-sizing

on:
  pull_request:
    branches: [main]
    types: [synchronize, ready_for_review]

permissions:
  contents: write
  pull-requests: read

jobs:
  commit:
    if: github.event.pull_request.head.ref == 'fix/main-panel-grid-sizing-locked-20260714-1156'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ secrets.TOOLHUB_AUTOMATION_TOKEN || github.token }}
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Apply formal patch
        run: python3 .github/scripts/apply_main_panel_grid_sizing.py

      - name: Rebuild deterministic audits
        run: |
          python3 scripts/report_dead_module_symbols.py --write DEAD_CODE_AUDIT.md
          python3 scripts/report_protected_wrapper_chains.py --write PROTECTED_WRAPPER_AUDIT.md
          python3 scripts/report_th15_extra_symbols.py --write TH15_EXTRA_AUDIT.md
          python3 scripts/report_th09_animation_symbols.py --write TH09_ANIMATION_AUDIT.md
          python3 scripts/report_entry_symbols.py --write ENTRY_SYMBOL_AUDIT.md

      - name: Basic syntax check
        run: |
          node --check code/th_15_main_panel.js
          node --check code/th_15_extra.js
          python3 .github/scripts/es5_scan.py
          python3 scripts/verify_js_syntax.py
          git diff --exit-code origin/main -- ToolHub.js
          git diff --check

      - name: Remove bootstrap files
        run: |
          rm -f .github/scripts/apply_main_panel_grid_sizing.py
          rm -f .github/workflows/apply-main-panel-grid-sizing.yml
          rm -f .github/workflows/commit-main-panel-grid-sizing.yml

      - name: Commit and push formal patch
        env:
          TOOLHUB_AUTOMATION_TOKEN: ${{ secrets.TOOLHUB_AUTOMATION_TOKEN }}
        run: |
          test -n "$TOOLHUB_AUTOMATION_TOKEN"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "修复主面板网格与窗口尺寸不一致"
          git remote set-url origin "https://x-access-token:${TOOLHUB_AUTOMATION_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
