name: pointer-rect-patch

on:
  push:
    branches:
      - fix/pointer-ocr-rect

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/pointer-ocr-rect
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - name: Apply rect OCR patch
        shell: bash
        run: |
          git fetch origin fix/pclip
          git show origin/fix/pclip:code/th_18_pointer_ocr.js > code/th_18_pointer_ocr.js
          git rm -f .github/workflows/pointer_rect_patch.yml
          git rm -f .ci_touch_pointer_rect || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add code/th_18_pointer_ocr.js
          git commit -m "使用区域识别方法处理框选文本"
          git push origin HEAD:fix/pointer-ocr-rect
