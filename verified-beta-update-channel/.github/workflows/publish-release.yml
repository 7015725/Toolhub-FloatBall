name: publish-release

on:
  workflow_dispatch:
  workflow_run:
    workflows: [verify]
    types: [completed]

permissions:
  contents: write

concurrency:
  group: publish-release-${{ github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: false

jobs:
  publish:
    name: publish-release
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main'
      )
    steps:
      - name: Checkout verified revision
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || 'main' }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Verify signed release bundle
        shell: bash
        run: |
          python3 scripts/verify_manifest.py
          python3 .github/scripts/verify_manifest_signature.py

      - name: Build release metadata
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          import subprocess
          from pathlib import Path

          manifest = json.loads(Path('manifest.json').read_text(encoding='utf-8'))
          if str(manifest.get('channel', '')).strip() != 'stable' or str(manifest.get('branch', '')).strip() != 'main':
              raise SystemExit('publish-release only accepts stable/main manifests')
          version = int(manifest.get('version', 0) or 0)
          release = manifest.get('release') or {}
          title = str(release.get('title', '')).strip()
          date = str(release.get('date', '')).strip()
          changes = [str(item).strip() for item in (release.get('changes') or []) if str(item).strip()]
          if version <= 0:
              raise SystemExit('manifest.version missing or invalid')
          if not title or not date or not changes:
              raise SystemExit('manifest.release title, date, and changes are required')

          tag = 'v%s' % version
          target = subprocess.check_output(['git', 'rev-parse', 'HEAD'], text=True).strip()
          notes = ['发布日期：' + date, ''] + ['- ' + item for item in changes]
          Path('.release_tag').write_text(tag + '\n', encoding='utf-8')
          Path('.release_target').write_text(target + '\n', encoding='utf-8')
          Path('.release_title').write_text(title + '\n', encoding='utf-8')
          Path('.release_notes').write_text('\n'.join(notes) + '\n', encoding='utf-8')
          print('release_tag=' + tag)
          print('release_target=' + target)
          print('release_title=' + title)
          PY

      - name: Publish GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="$(cat .release_tag)"
          target="$(cat .release_target)"
          title="$(cat .release_title)"
          git fetch --force --tags origin
          tagged="$(git rev-list -n 1 "$tag" 2>/dev/null || true)"
          if [ -n "$tagged" ] && [ "$tagged" != "$target" ]; then
            echo "Release tag $tag points to $tagged, expected $target"
            exit 1
          fi
          assets=(ToolHub.js ToolHub.js.sha256 manifest.json manifest.sig update_history.json)
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" --title "$title" --notes-file .release_notes
            gh release upload "$tag" "${assets[@]}" --clobber
          else
            gh release create "$tag" "${assets[@]}" --target "$target" --title "$title" --notes-file .release_notes
          fi
